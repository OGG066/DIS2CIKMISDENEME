apikal bölgede bulunması","C":"Kanalın çok kısa olması","D":"Lingual omuzcuğun yeterince kaldırılmaması","E":"Furkasyon kanallarının bulunması"},"c":"D","e":"Alt kesicilerde ikinci (lingual) kanal, lingual omuzcuk (shoulder) yeterince kaldırılmazsa gözden kaçar. Giriş kavitesini linguale doğru genişletmek gerekir."},{"k":8,"n":32,"s":"Endodonti","q":"Kalsifiye kanallarda kanal ağızlarını bulmak için aşağıdaki yöntemlerden hangisi en uygun yardımcı yaklaşımlardan biridir?","o":{"A":"Kalın Gates-Glidden ile derin preparasyon yapmak","B":"Kanal boyunu tahmini belirlemek","C":"Furkasyon bölgesini aşındırmak","D":"Kanalı körlemesine genişletmek","E":"Champagne bubble testinden yararlanmak"},"c":"E","e":"NaOCl damlatılınca kanal ağzından çıkan oksijen kabarcıkları (\"şampanya kabarcığı\") kanalın yerini gösterir. Körlemesine aşındırmak perforasyona yol açar."},{"k":8,"n":33,"s":"Endodonti","q":"Teşhis ve Tedavi Planlaması Aşağıdakilerden hangisi çürük derinliği/teşhisinde yapılan bir değerlendirme hatasıdır?","o":{"A":"Klinik muayeneyi atlayıp yalnız radyografiye güvenmek","B":"Hastanın bildirdiği semptomları göz ardı etmek","C":"Pulpa odasının anatomisinin yanlış değerlendirilmesi","D":"Bite-wing radyografi alınması","E":"CEJ seviyesinin dikkate alınması"},"c":"C","e":"Pulpa odası anatomisini yanlış okumak, çürüğün derinliğini hatalı değerlendirmeye yol açar. Bite-wing almak ve CEJ seviyesini dikkate almak ise doğru yaklaşımlardır.","note":"A ve B şıkları orijinal fotoğrafta okunamadığı için konuya uygun çeldirici olarak eklenmiştir; doğru cevap (C)"},{"k":8,"n":34,"s":"Endodonti","q":"orijinalde işaretliydi. Kanal tedavisinin seans sayısı ile ilgili aşağıdakilerden hangisi yanlıştır?","o":{"A":"Kanal ağız ortamına açılmışsa bitirmemekte fayda vardır.","B":"Hastanın yüzünde şişlik ve ağrısı varsa bitirmemekte fayda vardır.","C":"Mikroorganizma aktivitesi gösteren kötü koku varsa bitirmemekte fayda vardır.","D":"Eksuda var, kanal kurulanamıyor ise bitirmemekte fayda vardır.","E":"Nekrotik pulpalı dişler mutlaka en az 2 seansta tamamlanmalıdır."},"c":"E","e":"\"Mutlaka\" ifadesi yanlış! Uygun vaka seçiminde nekrotik dişler bile tek seansta bitirilebilir. Şişlik, eksuda, kötü koku gibi durumlarda ise seansı bölmek mantıklıdır."},{"k":8,"n":35,"s":"Radyoloji","q":"DENTAL RADYOLOJİ Röntgen Fiziği ve Cihaz Aşağıdakilerden hangisi röntgen apareyinde yer almaz?","o":{"A":"Tungsten filament","B":"Kolimatör","C":"Kon","D":"Step-down transformatör","E":"Glutaldehit"},"c":"E","e":"Glutaraldehit bir dezenfektan/sterilizan kimyasaldır, röntgen cihazının parçası değildir. Filament, kolimatör, kon ve transformatörler cihazın gerçek bileşenleridir."},{"k":8,"n":36,"s":"Radyoloji","q":"Coolidge tüpüyle ilgili aşağıdaki bilgilerden hangisi doğrudur?","o":{"A":"Anodda katoddan gelen yüksek hızlı elektronların çarptığı bir target ve bunu saran bakır gövde vardır.","B":"Fokal spot büyük olursa, oluşacak görüntü çevresinde spektrum denilen gölge oluşur.","C":"İdeal hedef materyalinin atom numarası düşük olmalıdır.","D":"Katodda elektron kaynağı olarak görev yapan bir filament ve bunu çevreleyen pencere bölümü vardır.","E":"Hepsi"},"c":"A","e":"Anotta tungsten target + ısıyı dağıtan bakır gövde bulunur. Hedefin atom numarası yüksek olmalı (tungsten); pencere katotta değildir; fokal spot büyürse görüntü bulanıklaşır (kalite düşer)."},{"k":8,"n":37,"s":"Radyoloji","q":"X ışınları ne zaman keşfedilmiştir?","o":{"A":"16 Mayıs 1899","B":"5 Ekim 1896","C":"27 Nisan 1898","D":"8 Kasım 1895","E":"28 Temmuz 1881"},"c":"D","e":"Wilhelm Conrad Röntgen, X ışınlarını 8 Kasım 1895'te keşfetti. Bu tarih radyolojinin doğum günü olarak ezberlenir."},{"k":8,"n":38,"s":"Radyoloji","q":"Aşağıdakilerden hangisi röntgen ışınlarının özelliklerinden biri değildir?","o":{"A":"X ışınları elektromanyetik titreşimlerdir.","B":"Röntgen ışınlarını oluşturan fotonların sahip olduğu enerji miktarına Quantum denilmektedir.","C":"Röntgen ışınlarının ışın şiddeti, uzaklığın karesi ile doğru orantılıdır.","D":"Röntgen ışınlarının dalga boyları küçüldükçe penetrasyon özellikleri artar.","E":"Röntgen ışınlarının enerjileri frekansları ile doğru, dalga boyları ile ters orantılıdır."},"c":"C","e":"Ters kare kanunu! Işın şiddeti uzaklığın karesiyle ters orantılıdır (mesafe 2 katına çıkınca şiddet 1/4'e iner). \"Doğru orantılı\" demek yanlıştır."},{"k":8,"n":39,"s":"Radyoloji","q":"Aşağıda verilen bilgilerden hangisi/hangileri doğrudur? I. Fotoelektrik olay, çok yüksek enerjili bir fotonun, yüksek atom numaralı bir madde ile karşılaşması halinde görülür. II. Frenleme radyasyonu, düşük enerjili bir fotonun, yüksek atom numaralı bir madde ile karşılaşması durumunda meydana gelir. III. Compton olayı, orta enerjili fotonların, atom numarası düşük bir madde ile karşılaşması halinde olur. IV. Thomson olayında foton enerjisinde hiçbir değişiklik olmaksızın yön değiştirir.","o":{"A":"I, II, III ve IV","B":"I ve II","C":"III ve IV","D":"II ve III","E":"Yalnız I"},"c":"C","e":"III ve IV doğrudur. I yanlış: fotoelektrik olay düşük enerjili fotonla olur. II yanlış: frenleme (Bremsstrahlung) yüksek hızlı elektronun çekirdek yakınında yavaşlamasıyla oluşur. Thomson'da (IV) enerji kaybı yoktur."},{"k":8,"n":40,"s":"Radyoloji","q":"Diş hekimliği radyolojisinde temel prensip, görüntüye katkısı olmayan düşük enerjili fotonların uzaklaştırılarak hastanın korunmasıdır. Bir dental röntgen cihazında cam, yağ ve plastik konun sağladığı zorunlu filtrasyon ile sonradan eklenen alüminyum levhaların oluşturduğu ilave filtrasyonun birleşimi neyi ifade eder?","o":{"A":"Diverjans Oranı","B":"Yarım Değer Tabakası (HVL)","C":"Total Filtrasyon","D":"Karasal Radyasyon Dozu","E":"Kolimasyon Katsayısı"},"c":"C","e":"Zorunlu (inherent: cam, yağ, plastik kon) + ilave (eklenen alüminyum) filtrasyonun toplamı = Total Filtrasyon. Amaç düşük enerjili, görüntüye katkısız fotonları süzüp hastayı korumaktır."},{"k":8,"n":41,"s":"Radyoloji","q":"X-ışını demetinin kalitesini ve penetrasyon gücünü belirlemek amacıyla kullanılan, ışın sayısını yarıya indiren madde kalınlığına ne ad verilir?","o":{"A":"Filtrasyon faktörü","B":"RBE katsayısı","C":"Doz hızı","D":"Yarım Değer Tabakası","E":"LET değeri"},"c":"D","e":"HVL (Yarım Değer Tabakası) = ışın şiddetini yarıya indiren absorban (genellikle Al) kalınlığıdır. Demetin kalitesini ve penetrasyon gücünü gösterir."},{"k":8,"n":42,"s":"Radyoloji","q":"Film ve Görüntü Oluşumu Fosfor plaklarda latent görüntünün bilgisayara aktarılma süreci nasıl gerçekleşir?","o":{"A":"Uyarılmış fosfor kristalleri lazer ışığıyla tarandığında floresan ışık salınır.","B":"Plaklardaki gümüş iyonları elektrik sinyaline dönüştürülür.","C":"Görüntü sadece gün ışığında bekletilerek okunur.","D":"Plaklar banyo solüsyonlarında geliştirilerek taranır.","E":"Görüntü sensördeki kablo aracılığıyla doğrudan iletilir."},"c":"A","e":"PSP plaklarında X ışını fosforu \"uyarır\" (latent görüntü); tarayıcıdaki lazer bu kristalleri uyarınca floresan ışık (foton) açığa çıkar, bu ışık dijital sinyale çevrilir. Banyo/gümüş işlemi yoktur."},{"k":8,"n":43,"s":"Radyoloji","q":"İntraoral film paketlerinde en arkada bulunan kurşun levhanın temel görevi aşağıdakilerden hangisidir?","o":{"A":"Geri yansıyan ışınların görüntüyü bozmasını engellemek ve arka dokuları korumak.","B":"X-ışını fotonlarını görünür ışığa çevirmek.","C":"Filmin ağız içinde daha rahat bükülmesini sağlamak.","D":"Gümüş halojenür kristallerine destek sağlamak.","E":"Filmin banyo sırasında ışık almasını engellemek."},"c":"A","e":"Film paketinin en arkasındaki kurşun folyo, geri saçılan (back-scatter) ışınların filme dönüp görüntüyü bulanıklaştırmasını önler ve arkadaki dokuları korur."},{"k":8,"n":44,"s":"Radyoloji","q":"Radyografik kalite ile ilgili aşağıda verilen bilgilerden hangisi doğrudur?","o":{"A":"Fokal spot-obje mesafesi uzun olduğunda detay kötüdür.","B":"Kontrast değiştiğinde, filmin radyografik densitesi değişmez.","C":"Radyografın sisli, puslu görüntüsüne retikülasyon denir.","D":"Densite açıktan koyuya doğru sırasıyla; 1) Mine, 2) Dentin, 3) Sement, 4) Kemik, 5) Yumuşak doku, 6) Yağ, 7) Hava","E":"Film kontrastı; yüksek ise detay kötü, düşük ise detay iyidir."},"c":"D","e":"En radyoopaktan (açık) en radyolusente (koyu) doğru sıralama: Mine > Dentin > Sement > Kemik > Yumuşak doku > Yağ > Hava. A yanlış (uzak mesafe detayı iyileştirir); sisli görüntü \"fog\"tur, retikülasyon değil."},{"k":8,"n":45,"s":"Radyoloji","q":"İntraoral Görüntüleme Teknikleri Aşağıdakilerin hangisi sekonder çürük teşhisinde tercih edilir?","o":{"A":"Donovan tekniği","B":"Bitewing tekniği","C":"Le Master tekniği","D":"Okluzal teknik","E":"SLOB tekniği"},"c":"B","e":"Bitewing (ısırma) tekniği, arayüz (interproksimal) ve sekonder çürükleri göstermede en iyisidir; kron ve kuron bölgesi distorsiyonsuz görülür."},{"k":8,"n":46,"s":"Radyoloji","q":"Üst molar bölgede zigomatik kemik süperpozisyonunu önlemek için aşağıdaki tekniklerden hangisi tercih edilir?","o":{"A":"Paralel teknik","B":"Le Master tekniği","C":"Açıortay tekniği","D":"Oklüzal teknik","E":"Bite-wing tekniği"},"c":"B","e":"Le Master tekniği, üst molar periapikal filmde zigomatik kemiğin kök apekslerinin üzerine binmesini (süperpozisyon) engellemek için kullanılır."},{"k":8,"n":47,"s":"Radyoloji","q":"İntraoral radyografi teknikleri ile ilgili aşağıda verilen bilgilerden hangisi doğrudur?","o":{"A":"Röntgen tüpünün yere paralel olan oklüzal düzleme göre aşağıya veya yukarıya doğru açılandırılmasına horizontal açılandırma denir.","B":"Film paketi, anterior dişlerden film alınırken dikey, posterior dişlerden film alınırken yatay olarak yerleştirilmelidir.","C":"Işınlama sırasında hasta ağzına yerleştirilen film mutlaka hekim tarafından tutulmalıdır.","D":"Röntgen filmi, dişlerin kesici kenar ve tüberküllerinden 5-6 cm taşacak şekilde yerleştirilmelidir.","E":"Hepsi"},"c":"B","e":"Film yerleşimi: ön (anterior) dişlerde dikey, arka (posterior) dişlerde yatay. A yanlış (bu vertikal açılandırmadır); filmi hasta tutar (hekim değil — radyasyon!); taşma payı yalnızca birkaç mm'dir."},{"k":8,"n":48,"s":"Radyoloji","q":"İntraoral radyografi teknikleri ile ilgili aşağıda verilen bilgilerden hangisi doğrudur?","o":{"A":"Bitewing tekniğinde santral ışın, alt ve üst dişlerin temas ettiği düzlemden geçecek ve dişlerin arayüzlerine paralel olacak şekilde yönlendirilmelidir.","B":"SLOB tekniği özellikle alt çenede tükürük bezi taşlarının lokalizasyonlarında kullanılır.","C":"Oklüzal teknikte filmi çekilirken konun vertikal açısı +80° olmalıdır.","D":"Oklüzal teknikte hastanın başı, ağız kapalı iken oklüzal düzlem yere paralel, sagittal düzlem yere dik olacak şekilde konumlandırılır.","E":"Hepsi"},"c":"A","e":"Bitewing'de santral ışın oklüzal temas düzleminden geçer ve arayüzlere paraleldir. SLOB bir lokalizasyon tekniğidir; oklüzal teknikte sabit +80° açı yoktur ve baş ağız açıkken konumlandırılır."},{"k":8,"n":49,"s":"Radyoloji","q":"İntraoral radyografi teknikleri ile ilgili aşağıda verilen bilgilerden hangisi doğrudur?","o":{"A":"Paralel teknikte filmi çekilirken konun vertikal açısı +50° olmalıdır.","B":"Açıortay tekniği, üst molar bölgede zigomatik kemik superpozisyonunu önlemek amacı ile kullanılır.","C":"Bitewing tekniğinde santral ışın, alt ve üst dişlerin temas ettiği düzlemden geçecek ve dişlerin arayüzlerine paralel olacak şekilde yönlendirilmelidir.","D":"Le Master tekniği özellikle alt çenede tükürük bezi taşlarının lokalizasyonlarında kullanılır.","E":"Oklüzal teknikte hastanın başı, ağız kapalı iken oklüzal düzlem yere paralel, sagittal düzlem yere dik olacak şekilde konumlandırılır."},"c":"C","e":"Yine bitewing'in tanımı doğrudur (C). Zigomatik süperpozisyonu önleyen Le Master'dır (açıortay değil); Le Master taş lokalizasyonunda kullanılmaz; oklüzal teknikte ağız kapalı değildir."},{"k":8,"n":50,"s":"Radyoloji","q":"Açıortay tekniğine göre merkezi ışın filmin uzun eksenine dik olarak gelmişse aşağıdakilerden hangisi oluşur?","o":{"A":"Fog","B":"Statik elektriklenme","C":"Cone-cut","D":"Görüntünün boyu kısalır","E":"Görüntünün boyu uzar"},"c":"D","e":"Işın filme dik gelirse görüntü kısalır (foreshortening). Işın dişin uzun eksenine dik gelirse uzar (elongation). Açıortay tekniğinde ışın, diş-film açısının açıortayına dik gelmelidir."},{"k":8,"n":51,"s":"Radyoloji","q":"İntraoral radyografi teknikleri ile ilgili aşağıda verilen bilgilerden hangisi doğrudur?","o":{"A":"Alt lateral dişler bölgesinden açıortay tekniğine göre film çekerken vertikal açı +30°, horizontal açı +25° olmalıdır.","B":"Hatalı horizontal açılandırma sonucu dişlerde rektifikasyon oluşur.","C":"Oklüzal açılandırma: Röntgen tüpünün yere paralel olan oklüzal düzleme göre aşağıya veya yukarıya doğru açılandırılmasıdır.","D":"Bitewing tekniğine göre santral ışın film düzlemine dikse, görüntü cisimden daha büyük olur.","E":"Süpernumerer diş veya parsiyel anodontinin tespitinde oklüzal teknik kullanılır."},"c":"E","e":"Oklüzal teknik, geniş alanı tek filmde gösterdiği için fazladan (süpernumerer) diş, gömülü diş ve anodonti tespitinde idealdir. Hatalı horizontal açı \"overlap\" (üst üste binme) yapar — rektifikasyon değil."},{"k":8,"n":52,"s":"Radyoloji","q":"Diş Apeksi / Anatomik İzdüşüm Noktaları Diş apekslerinin yüzeydeki anatomik izdüşüm noktaları ile ilgili aşağıdaki bilgilerden hangisi doğrudur?","o":{"A":"Alt kaninlerin apeksi; burun boşluğundan indirilen dikmenin alt konsantrasyon çizgisini kestiği yerdedir.","B":"Üst kaninlerin apeksleri; burun kanadının distalindeki noktadan inilen dikmenin orbita-tragus hattını kestiği noktadadır.","C":"Alt kesicilerin konsantrasyon noktası; mentumda mandibula alt kenarının üzerindedir.","D":"Üst premolar dişlerin apeksleri; gözün dış kantusunun 1 cm distalinden inilen dikmenin alanasi-tragus hattını kestiği noktadadır.","E":"Alt premolar dişlerin apeksleri; maksilla merkezinden inilen dikmenin orbita-tragus hattını kestiği noktadadır."},"c":"B","e":"Üst kaninin apeks izdüşümü; burun kanadı distalinden inen dikmenin orbita-tragus hattını kestiği noktadır. İşaretli (doğru) seçenek üst kaninlerle ilgili olandır.","note":"Bu soru orijinal fotoğrafta yan çevrik ve sol kenarı kadraj dışı olduğundan şıklar okunabilen parçalardan içeriğe"},{"k":8,"n":53,"s":"Radyoloji","q":"uygun şekilde yeniden kuruldu; işaretli cevap üst kaninle ilgili olandır. Diş apeksi/konsantrasyon noktaları ile ilgili aşağıda verilen bilgilerden hangisi doğrudur?","o":{"A":"Mandibula molar bölgede konsantrasyon noktası; gözün dış kenarının 1 cm arkasından indirilen dikmenin alt konsantrasyon çizgisini kestiği yerdir.","B":"Maksilla kanin bölgesinde oryantasyon çizgisi; gözün dış kantusundan inilen dikmenin, alanasi-tragus hattını kestiği noktadadır.","C":"Maksilla molar bölgede konsantrasyon noktası; infraorbital kenarın orta noktasından indirilen dikmenin alt konsantrasyon çizgisini kestiği noktadır.","D":"Mandibula premolar bölgede oryantasyon çizgisi; pupilla merkezinden inilen dikmenin alanasi-tragus hattını kestiği noktadır.","E":"Hepsi"},"c":"A","e":"Mandibula molar konsantrasyon noktası; gözün dış kenarının yaklaşık 1 cm arkasından inen dikmenin alt konsantrasyon çizgisini kestiği yerdir (işaretli A)."},{"k":8,"n":54,"s":"Radyoloji","q":"Radyasyon Biyolojisi ve Korunma Işınlama sırasında operatörün saçılan radyasyondan korunması için uygulaması gereken 'pozisyon ve mesafe kuralı'na göre kullanıcı nerede durmalıdır?","o":{"A":"Hastadan 5 metre uzakta, merkezi ışına paralel açıyla.","B":"Cihazın kontrol panelinin hemen önünde, hastaya bakarak.","C":"Hastadan en az 2 metre uzakta, merkezi ışına 90-135 derece açıyla.","D":"Hastanın tam arkasında, 1 metre mesafede.","E":"Tüp kafasının hemen yanında, kurşun önlükle."},"c":"C","e":"Pozisyon-mesafe kuralı: en az 2 metre uzakta dur ve merkezi ışına 90-135° açıda konumlan. Bu açı ve mesafe, saçılan (scatter) radyasyona maruziyeti en aza indirir."},{"k":8,"n":55,"s":"Radyoloji","q":"Radyasyonun biyolojik etkileri incelendiğinde, belirli bir eşik dozun üzerinde görülen ve şiddeti dozla orantılı olan deterministik etkiler ile eşik dozu olmayan stokastik etkiler ayırt edilir. Buna göre, aşağıdakilerden hangisi bir deterministik etki değildir?","o":{"A":"Kserostomi","B":"Lösemi","C":"Osteoradyonekroz","D":"Katarakt","E":"Mukozit"},"c":"B","e":"Lösemi stokastik etkidir: eşik dozu yoktur, doz arttıkça olasılığı artar (şiddeti değil). Katarakt, mukozit, kserostomi ve osteoradyonekroz ise eşik dozu olan deterministik etkilerdir."},{"k":8,"n":56,"s":"Radyoloji","q":"Aşağıdakilerden hangisi eşdeğer doz birimidir?","o":{"A":"Gray","B":"Sievert","C":"Roentgen","D":"Curie","E":"Rad"},"c":"B","e":"Sievert (Sv) = eşdeğer/efektif doz birimi (biyolojik etkiyi yansıtır). Gray (Gy) = absorbe doz; Roentgen = ışınlama; Curie = radyoaktivite miktarı; Rad = absorbe dozun eski birimi."},{"k":8,"n":57,"s":"Radyoloji","q":"Radyoterapi sonrası gelişen 'Radyasyon Çürükleri' ile ilgili aşağıdakilerden hangisi yanlıştır?","o":{"A":"Yaygın tutulum ve hızlı seyir göstermesi tipiktir.","B":"Servikal bölgeyi çepeçevre sararak kron kaybına yol açabilir.","C":"Tükürük akışının azalması ve düşük pH ana nedenler arasındadır.","D":"Mutans ve Lactobacillus miktarındaki artış florayı değiştirir.","E":"Radyasyon çürükleri sadece dişin mine tabakasını etkiler, sement ve dentine yayılmaz."},"c":"E","e":"Radyasyon çürükleri mine, dentin ve sementi birlikte tutar; özellikle servikalden başlayıp hızla ilerler. \"Sadece mineyi etkiler\" demek yanlıştır."},{"k":9,"n":1,"s":"Mikrobiyoloji","q":"Herpesvirüsler için aşağıdaki ifadelerden hangisi yanlıştır?","o":{"A":"Yaşam boyu latent kalırlar","B":"Çift sarmallı DNA (dsDNA) virüsleridir","C":"EBV, sakral ganglionda enfeksiyon oluşturur","D":"HSV-1 ve HSV-2 herpetik dolamaya neden olabilir","E":"CMV konjenital enfeksiyonlara neden olabilir"},"c":"C","e":"EBV, sakral ganglionda değil B lenfositlerinde latent kalır. HSV-1→trigeminal, HSV-2→sakral, VZV→dorsal kök ganglionu. Yanlış eşleşme C'dir."},{"k":9,"n":2,"s":"Mikrobiyoloji","q":"İnfluenza virüslerinin hücreye girişte bağlandıkları reseptör hangisidir?","o":{"A":"Sialik asit","B":"ACE2","C":"NTCP","D":"NOD-like reseptör","E":"CD4"},"c":"A","e":"Hemaglütinin (HA) sialik aside kenetlenir. ACE2→SARS-CoV-2, NTCP→HBV, CD4→HIV reseptörüdür."},{"k":9,"n":3,"s":"Mikrobiyoloji","q":"Treponema denticola için aşağıdakilerden hangisi yanlıştır?","o":{"A":"Periplazmik flagellası vardır","B":"Karanlık alan mikroskobuyla görülür","C":"Anaerob bakteridir","D":"İlerlemiş periodontal hastalıkta bulunur","E":"Hutchinson dişleri tablosuna neden olur"},"c":"E","e":"Hutchinson dişleri konjenital sifilizin (T. pallidum) bulgusudur. T. denticola ise kırmızı kompleks / periodontit üyesidir."},{"k":9,"n":4,"s":"Mikrobiyoloji","q":"HBV aşısında kullanılan viral antijen hangisidir?","o":{"A":"HBsAg","B":"HBcAg","C":"HBeAg","D":"HBxAg","E":"HBdAg"},"c":"A","e":"Aşı yüzey antijeni HBsAg'yi içerir; koruyucu anti-HBs oluşturur. HBcAg/HBeAg ise enfeksiyon belirteçleridir, aşıda yer almaz."},{"k":9,"n":5,"s":"Mikrobiyoloji","q":"Aşağıdakilerden hangisi Porphyromonas gingivalis'in bir virülans faktörüdür?","o":{"A":"Teikoik asit","B":"Enolaz","C":"Arg- ve Lys-gingipainler","D":"Kord faktör","E":"Mikolik asit"},"c":"C","e":"Gingipainler (Arg/Lys proteazları) doku yıkımı ve periodontal hasarın baş aktörüdür. Kord faktör/mikolik asit→M. tuberculosis, teikoik asit→gram(+) duvar."},{"k":9,"n":6,"s":"Mikrobiyoloji","q":"Aşağıdaki bakterilerden hangisi periodontal hastalıklar için kırmızı komplekste yer alır?","o":{"A":"Actinomyces israelii","B":"Fusobacterium nucleatum","C":"Tannerella forsythia","D":"Moraxella catarrhalis","E":"Eikenella corrodens"},"c":"C","e":"Kırmızı kompleks üçlüsü: P. gingivalis + T. forsythia + T. denticola. Fusobacterium nucleatum turuncu komplekstedir."},{"k":9,"n":7,"s":"Mikrobiyoloji","q":"Aynı hücreyi infekte eden iki farklı İnfluenza virüsünün genom segmentlerinin karışmasıyla (genetik reassortment) yeni bir alttipin ortaya çıkması hangi olaydır?","o":{"A":"Nokta mutasyon","B":"Antijenik drift","C":"Antijenik shift","D":"Delesyon","E":"İnsersiyon"},"c":"C","e":"Antijenik shift = segment takası (reassortment) → ani büyük değişim, pandemi potansiyeli. Drift ise küçük nokta mutasyonlarıdır."},{"k":9,"n":8,"s":"Mikrobiyoloji","q":"Oral hairy lökoplaki etkeni hangisidir?","o":{"A":"CMV","B":"EBV","C":"HHV-8","D":"HSV-2","E":"HPV-6"},"c":"B","e":"EBV, dilin lateral kenarında silinmeyen beyaz lezyon (oral hairy lökoplaki) yapar; özellikle HIV/immün baskılı hastalarda. HHV-8→Kaposi sarkomu."},{"k":9,"n":9,"s":"Mikrobiyoloji","q":"HIV hakkında aşağıdaki ifadelerden hangisi yanlıştır?","o":{"A":"+ssRNA, diploid genoma sahiptir","B":"Virion içinde ters transkriptaz, proteaz ve integraz taşır","C":"CD4 molekülünü reseptör olarak kullanır","D":"p24 proteini ile reseptöre bağlanır","E":"Hücreye girişte koreseptör bağlantısı gerekir"},"c":"D","e":"Reseptöre bağlanan gp120'dir; p24 ise kapsid (kor) proteinidir. Giriş: gp120→CD4 + koreseptör (CCR5/CXCR4)."},{"k":9,"n":10,"s":"Mikrobiyoloji","q":"Protez kullanan 82 yaşındaki hastanın damağında, protez altında lezyon; sürüntüde maya ve psödohif, kültürde gerçek hif de oluşturabiliyor. Olası etken hangisidir?","o":{"A":"Candida krusei","B":"Candida albicans","C":"Candida auris","D":"Cryptococcus neoformans","E":"Candida lusitaniae"},"c":"B","e":"Germ tüp / gerçek hif oluşturması C. albicans'a özgüdür (protez stomatitinin klasik tablosu). Diğer Candida türleri tipik olarak gerçek hif yapmaz."},{"k":9,"n":11,"s":"Mikrobiyoloji","q":"Mycobacterium tuberculosis hücresine dirençlilik kazandıran hücre yapısı hangisidir?","o":{"A":"Lipopolisakkarid","B":"Arabinan","C":"Pentaarabinozil","D":"Mikolik asit","E":"Sialik asit"},"c":"D","e":"Mum kıvamındaki mikolik asit duvarı; aside dirençli boyanmanın ve dış etkenlere direncin kaynağıdır. LPS gram(–) bakterilere aittir."},{"k":9,"n":12,"s":"Mikrobiyoloji","q":"Diş eti oluğunda kolonize olan; kollajenaz ve proteazlarla immün hücreleri etkileyip osteoklast formasyonu ve kemik rezorpsiyonu yapabilen gram negatif bakteri hangisidir?","o":{"A":"Treponema denticola","B":"Aggregatibacter actinomycetemcomitans","C":"Eikenella corrodens","D":"Pasteurella multocida","E":"Actinomyces israelii"},"c":"B","e":"A. actinomycetemcomitans, lökotoksiniyle agresif (juvenil) periodontitisin klasik etkenidir; kemik yıkımı yapar."},{"k":9,"n":13,"s":"Mikrobiyoloji","q":"HSV-1 hangi bölgede latent kalır?","o":{"A":"Trigeminal ganglion","B":"Hafıza B hücreleri","C":"CD4 T lenfositler","D":"Böbrek epitel hücreleri","E":"Hepatositler"},"c":"A","e":"HSV-1 primer enfeksiyondan sonra trigeminal (gasser) gangliona çekilir. HSV-2→sakral, VZV→dorsal kök, EBV→B hücresi."},{"k":9,"n":14,"s":"Mikrobiyoloji","q":"HPV hakkında aşağıdaki ifadelerden hangisi yanlıştır?","o":{"A":"En yüksek kanser riski HPV 16 ve 18'dedir","B":"E6 ve E7 onkoproteinleri p53 ve pRb'yi etkiler","C":"dsDNA genomlu, ikozahedral, zarfsız virüslerdir","D":"Genomlarını konağın genomuna entegre edebilirler","E":"Yüksek mutasyon nedeniyle HPV'ye karşı aşı geliştirilememiştir"},"c":"E","e":"HPV'ye karşı etkili aşılar mevcuttur (ör. Gardasil). E6→p53, E7→pRb baskılaması onkogenezin temelidir."},{"k":9,"n":15,"s":"Mikrobiyoloji","q":"Aşağıdaki ifadelerden hangisi Neisseria cinsi bakteriler için doğrudur?","o":{"A":"Kahve çekirdeği şeklinde gram negatif diplokoktur","B":"Zorunlu anaerobdur","C":"Üremek için X ve V faktörlerine ihtiyaç duyar","D":"Hücre duvarında Protein-A bulunur","E":"Beta hemoliz yapar"},"c":"A","e":"Neisseria klasik 'kahve çekirdeği' gram(–) diplokoktur, aerob/kapnofiliktir. X-V faktörü→Haemophilus, Protein-A→S. aureus özelliğidir."},{"k":9,"n":16,"s":"Mikrobiyoloji","q":"Aşağıdakilerden hangisi kapsüllü bir mayadır?","o":{"A":"Candida albicans","B":"Cryptococcus neoformans","C":"Aspergillus niger","D":"Rhizopus oryzae","E":"Candida auris"},"c":"B","e":"Cryptococcus'un en ayırt edici özelliği polisakkarit kapsülüdür (çini mürekkebiyle hâle verir). Aspergillus/Rhizopus kü 4—H0 red","D":"21.69—H0 red","E":"23.66—H0 red"},"c":"D","e":"2×2 tabloda kategorik ilişki→ Ki-Kare.χ² hesap= 21.69> 9.21→ sigara–kalp ilişkisi anlamlı(H0 red)."},{"k":9,"n":31,"s":"Temel İstatistik","q":"13 80 hastaya yeni ilaç, 80 hastaya plasebo verilmiş; sırasıyla 56 ve 38 kişi yarar görmüş. İlacın plasebodan etkili olduğu sonucuna varılır mı?(Z α/2 =2.578)","o":{"A":"Z= −2.89—H0 red","B":"Z= 2.15—H0 kabul","C":"Z= 1.45—H0 kabul","D":"Z= 1.90—H0 kabul","E":"Z= 1.60—H0 kabul"},"c":"A","e":"İki oranın karşılaştırması→ iki oran z-testi.p̂1 =56/80=0.70, p̂2 =38/80=0.475; |Z|≈2.89> 2.578→ fark anlamlı, ilaç üstün."},{"k":9,"n":32,"s":"Temel İstatistik","q":"Verilerin özetinde sınıf aralıkları, sınıf orta değeri ve frekansın oluşturduğu tabloya ne ad verilir?","o":{"A":"Frekans dağılımı","B":"Frekans poligonu","C":"Saçılım (scatter) dağılımı","D":"Çubuk grafik (bar chart)","E":"Venn diyagramı"},"c":"A","e":"Sınıf + frekans tablosu = frekans dağılımı. Poligon ise bunun çizgi grafiğidir; ikisi karıştırılmamalıdır."},{"k":9,"n":33,"s":"Temel İstatistik","q":"Suda ortalama organizma sayısı μ=2 (Poisson). Alınan bir örnekte bir ya da dahaaz organizma bulunma olasılığı nedir? (P(x)=e−μ·μx /x!, x=0,1)","o":{"A":"0.4316","B":"0.3956","C":"0.4407","D":"0.4060","E":"0.3863"},"c":"D"},{"k":9,"n":34,"s":"Temel İstatistik","q":"Evli kadınlarda doğum kontrol yöntemi kullanma oranı %20'dir. %95 güven aralığında gerekli minimum örneklem büyüklüğü nedir?(Z α/2 =1.96)","o":{"A":"672","B":"635","C":"664","D":"650","E":"683"},"c":"E","e":"Oran için n = Z²·p·(1−p) / d². p=0.20, p(1−p)=0.16; hata payı d'ye göre n ≈ 683.","note":"Soru kökünün sağ tarafı orijinalde kesikti; tamamlandı."},{"k":9,"n":35,"s":"Histoloji","q":"Böbrek kesiti görüntüsünde 1, 2 ve 3 numaralı yapılar sırasıyla hangisidir?","o":{"A":"Proksimal kıvrımlı tübül – Distal kıvrımlı tübül – Glomerülüs","B":"Glomerülüs – Proksimal kıvrımlı tübül – Distal kıvrımlı tübül","C":"Glomerülüs – Distal kıvrımlı tübül – Proksimal kıvrımlı tübül","D":"Distal kıvrımlı tübül – Glomerülüs – Proksimal kıvrımlı tübül","E":"Distal kıvrımlı tübül – Proksimal kıvrımlı tübül – Glomerülüs"},"c":"C","e":"İşaretlemeye göre sıra: glomerülüs → distal → proksimal tübül. Proksimal tübül fırçamsı kenarıyla dar lümenli ve daha eozinofilik; distal daha geniş lümenlidir.","note":"Görüntülü soru; orijinalde A–B okunamadı, işaretli doğru cevap C'dir."},{"k":9,"n":36,"s":"Histoloji","q":"Aşağıdakilerden hangisi nefronun bir parçası değildir?","o":{"A":"Bowman kapsülünün pariyetal tabakası","B":"Glomerülüs","C":"Henle kulpu","D":"Toplayıcı kanal","E":"Proksimal kıvrımlı tübül"},"c":"D","e":"Nefron = glomerülüs + tübüller (proksimal, Henle, distal). Toplayıcı kanal nefrona değil, toplayıcı sisteme aittir."},{"k":9,"n":37,"s":"Histoloji","q":"Aralarındaki bağlantılarla, gelişmekte olan sperm hücrelerini koruyan kan-testis bariyerini hangi hücreler oluşturur?","o":{"A":"Leydig hücreleri","B":"Sertoli hücreleri","C":"Birincil spermatositler","D":"Tip A spermatogonyum","E":"Spermatogenik hücreler"},"c":"B","e":"Sertoli hücreleri arasındaki sıkı bağlantılar kan-testis bariyerini kurar ve gelişen spermleri bağışıklıktan korur. Leydig→testosteron üretir."},{"k":9,"n":38,"s":"Histoloji","q":"Üriner sistemdeki podositler ile ilgili aşağıdakilerden hangisi doğrudur?","o":{"A":"Bowman kapsülünün visseral tabakasını oluşturur","B":"Pariyetal tabakayı döşer ve eritropoietin üretir","C":"Proksimal tübülü döşeyen yassı epitel hücreleridir","D":"Toplayıcı kanallarda yer alır ve su geçirgenliğini düzenler","E":"Distal tübülde glukozun geri emiliminden sorumludur"},"c":"A","e":"Podositler, ayaksı çıkıntılarıyla (pedisel) glomerülün visseral yaprağını yapar ve filtrasyon yarıklarını oluşturur."},{"k":9,"n":39,"s":"Histoloji","q":"Ovulasyon sırasında yumurtalıktan fallop tüpüne taşınmayan yapı hangisidir?","o":{"A":"Zona pellusida","B":"Bir miktar follikül sıvısı","C":"Cumulus oophorus hücreleri","D":"Oosit","E":"Corona radiata hücreleri"},"c":"C","e":"Atılan komplekste oosit + zona + corona radiata + bir miktar sıvı bulunur; kütlesel cumulus oophorus büyük ölçüde follikülde kalır."},{"k":9,"n":40,"s":"Histoloji","q":"Aşağıdakilerden hangisi değişici (transisyonel) epitel ile döşeli değildir?","o":{"A":"Üreter","B":"Mesane","C":"Böbrek pelvisi (pelvis renalis)","D":"Ductus deferens","E":"Proksimal üretra"},"c":"D","e":"Transisyonel epitel idrar yollarını (üreter, mesane, pelvis, kaliksler, proksimal üretra) döşer. Ductus deferens ise yalancı çok katlı silindirik epitelle döşelidir.","note":"Orijinalde yalnız A şıkkı okunabiliyordu; şıklar konuya göre tamamlandı."},{"k":9,"n":41,"s":"Histoloji","q":"Seminifer tübül kesitinde bazalden lümene doğru 1, 2 ve 3 ile gösterilen hücreler hangisidir?","o":{"A":"Spermatid – Primer spermatosit – Spermatogonyum","B":"Spermatogonyum – Primer spermatosit – Spermatid","C":"Sertoli – Leydig – Spermatid","D":"Primer spermatosit – Spermatogonyum – Spermatozoa","E":"Spermatogonyum – Sertoli – Leydig"},"c":"B","e":"Olgunlaşma bazalden lümene doğrudur: spermatogonyum → primer spermatosit → spermatid → spermatozoa. 'Dıştan içe olgunlaşır' diye hatırla. düzenlendi.","note":"Görüntülü soru; orijinalde şıklar okunamadığından spermatogenez sıralaması standart formatta"},{"k":9,"n":42,"s":"Histoloji","q":"Görüntüde gösterilen folikül tipi hangisidir?","o":{"A":"Graafian folikül","B":"Antral folikül","C":"Primordial folikül","D":"Sekonder folikül","E":"Primer folikül"},"c":"E","e":"Tek sıra kübik granüloza + henüz antrum yok → primer folikül. Primordialde granüloza yassıdır; antral/Graafianda boşluk (antrum) belirir.","note":"Görüntülü soru; işaretli doğru cevap E'dir."},{"k":9,"n":43,"s":"Histoloji","q":"Uterus duvarında her menstrüel siklusta dökülüp yenilenen (siklik değişikliğe uğrayan) tabaka hangisidir?","o":{"A":"Miyometriyum","B":"Perimetriyum","C":"Endometriyum stratum fonksiyonalis","D":"Endometriyum stratum bazalis","E":"Seroza"},"c":"C","e":"Her siklusta dökülen kısım endometriyumun stratum fonksiyonalisidir; stratum bazalis kalır ve yenilenmeyi sağlar. formatta düzenlendi.","note":"Orijinal görüntülü sorunun metni okunamadığından, uterus histolojisinin yüksek-verimli konusu standart"},{"k":9,"n":44,"s":"Histoloji","q":"Görüntüde gösterilen organın adı nedir?","o":{"A":"Prostat bezi","B":"Seminal vezikül","C":"Testis","D":"Epididimis kanalı","E":"Ductus (vas) deferens"},"c":"B","e":"Bal peteği görünümlü kıvrıntılı mukoza + geniş salgı boşluğu → seminal vezikül. Prostatta korpora amilasea, testiste seminifer tübüller görülür.","note":"Görüntülü soru; işaretli doğru cevap B'dir."},{"k":9,"n":45,"s":"Histoloji","q":"Adrenokortikotropik hormon (ACTH) hangi hücreler tarafından üretilir?","o":{"A":"Pars distalis'teki bazofiller","B":"Pars distalis'teki kromofoblar","C":"Median eminens'teki nörosekretuvar hücreler","D":"Pars distalis'teki asidofiller","E":"Pars nervoza'daki nöronlar"},"c":"A","e":"Kortikotroplar bazofilik boyanan ön hipofiz hücreleridir → ACTH. Asidofiller ise GH ve prolaktin üretir."},{"k":9,"n":46,"s":"Histoloji","q":"Testis kanallar sistemi için aşağıdakilerden hangisi yanlıştır?","o":{"A":"Rete testis, ductuli efferentes'e boşalır","B":"İntratestiküler kanallar düz tübüller, rete testis ve ductuli efferentes'ten oluşur","C":"Ductuli efferentes spermleri epididimisten ductus deferens'e taşır","D":"Genital boşaltım kanalları epididimis, ductus deferens ve üretradan oluşur","E":"Seminifer tübüller düz tübüller aracılığıyla rete testis'e bağlanır"},"c":"C","e":"Ductuli efferentes spermi rete testis'TEN epididimise taşır (ters yönde değil). Yol: seminifer → düz tübül → rete testis → ductuli efferentes → epididimis → ductus deferens."},{"k":9,"n":47,"s":"Histoloji","q":"Tuba uterina ile ilgili aşağıdaki ifadelerden hangisi doğrudur?","o":{"A":"Basit kübik epitel ile döşelidir","B":"Dış yüzeyi mezotelyum ile örtülüdür","C":"Döllenme çoğunlukla fimbria kısmında gerçekleşir","D":"Foliküler fazda atrofiye uğrar ve silli hücreleri azalır","E":"Epitelinde goblet hücreleri bulunur"},"c":"B","e":"Tuba dıştan seroza (mezotelyum) ile örtülüdür. Döllenme ampullada olur; epitel basit silindirik+sillidir, goblet hücresi yoktur."},{"k":9,"n":48,"s":"Histoloji","q":"Tiroid ve paratiroid bezlerinin histolojik özellikleri için aşağıdakilerden hangisi yanlıştır?","o":{"A":"Tiroid folliküllerinde tiroglobulin depolanır","B":"Paratiroidde esas (chief) hücreler PTH salgılar","C":"Folliküller koloidle dolu ve tek katlı kübik epitelle çevrilidir","D":"Parafoliküler (C) hücreler folikül bazalinde veya folikül hücreleri arasında yer alır","E":"Oksofil hücreler PTH üretiminden sorumludur"},"c":"E","e":"PTH'yi esas (chief) hücreler salgılar; oksofil hücrelerin işlevi net değildir ve PTH üretmezler."},{"k":9,"n":49,"s":"Histoloji","q":"Adrenal (böbrek üstü) bezde korteks tabakaları dıştan içe doğru sırasıyla hangisidir?","o":{"A":"Zona fasciculata – glomerulosa – reticularis","B":"Zona reticularis – fasciculata – glomerulosa","C":"Zona glomerulosa – fasciculata – reticularis","D":"Medulla – glomerulosa – fasciculata","E":"Zona glomerulosa – reticularis – fasciculata"},"c":"C","e":"Korteks dıştan içe: glomerulosa (aldosteron) → fasciculata (kortizol) → reticularis (androjen). 'GFR' kısaltmasıyla hatırla.","note":"Görüntülü soru; orijinalde şıklar okunamadığından korteks dizilimi standart formatta düzenlendi."},{"k":9,"n":50,"s":"Histoloji","q":"Aşağıdakilerden hangisi Sertoli hücrelerinin bir özelliği değildir?","o":{"A":"Androjen-bağlayıcı protein (ABP) salgılar","B":"Testosteron salgılar","C":"İnhibin salgılar","D":"Aromatazla östrojen üretebilir","E":"Spermatogenez için uygun ortam sağlar"},"c":"B","e":"Testosteronu Leydig hücreleri yapar. Sertoli ise ABP, inhibin ve (aromatazla) östrojen üretir; besleyici/destek görevlidir."},{"k":9,"n":51,"s":"Histoloji","q":"Oogenezde 1. mayoz bölünme ne zaman tamamlanır?","o":{"A":"Fetal hayatta","B":"Fertilizasyon sırasında","C":"Ovülasyondan kısa bir süre önce","D":"Pubertenin başlangıcında","E":"Menopozda"},"c":"C","e":"1. mayoz fetal hayatta başlar ama profaz I'de durur; ovülasyondan hemen önce tamamlanır. 2. mayoz ise ancak döllenmeyle biter.","note":"E şıkkı orijinalde kesikti; tamamlandı."},{"k":9,"n":52,"s":"Fizyoloji","q":"İnsülin hormonunun reseptörü hangisidir?","o":{"A":"G protein kenetli reseptör","B":"Reseptör guanilil siklaz","C":"Reseptör tirozin kinaz (RTK)","D":"Nükleer reseptör","E":"Ligand kapılı iyon kanalı"},"c":"C","e":"İnsülin reseptörü bir reseptör tirozin kinazdır (otofosforilasyon → IRS yolu). Steroid/tiroid hormonları ise nükleer reseptör kullanır.","note":"Orijinalde A ve D şıkları benzer ('Reseptör tirozin…') görünüyordu; şıklar netleştirildi."},{"k":9,"n":53,"s":"Fizyoloji","q":"Menopoz ile ilgili aşağıdakilerden hangisi yanlıştır?","o":{"A":"Östrojen seviyesi azalır","B":"Ovaryum steroid hormonları azalır","C":"Dişi reprodüksiyon fonksiyonu sonlanır","D":"Menopoz yaşı dünya genelinde yükselmektedir","E":"Gonadotropin seviyesi azalır"},"c":"E","e":"Menopozda over baskısı kalkınca FSH ve LH (gonadotropinler) ARTAR. Östrojen ve progesteron ise düşer."},{"k":9,"n":54,"s":"Fizyoloji","q":"İnhibin hakkında aşağıdakilerden hangisi doğrudur?","o":{"A":"FSH salgısını baskılar","B":"Salgısı LH tarafından başlatılır","C":"Sadece erkek üreme sisteminde üretilir","D":"Leydig hücreleri tarafından salgılanır","E":"GnRH salgısını baskılar"},"c":"A","e":"İnhibin esas olarak FSH'yi negatif geri bildirimle baskılar. Erkekte Sertoli, kadında granüloza hücrelerinden salınır."},{"k":9,"n":55,"s":"Fizyoloji","q":"Vücut sıvılarının ozmolaritesi yaklaşık kaç mOsm/L'dir?","o":{"A":"290","B":"150","C":"400","D":"220","E":"500"},"c":"A","e":"Normal plazma/vücut sıvısı ozmolaritesi ≈ 290 (285–295) mOsm/L'dir.","note":"B–E şıkları orijinalde kesikti; tamamlandı."},{"k":9,"n":56,"s":"Fizyoloji","q":"Hipertonik ortamda hücre hacmi nasıl değişir?","o":{"A":"Azalır","B":"Bölünür","C":"Önce artar, sonra azalır","D":"Artar","E":"Değişmez"},"c":"A","e":"Hipertonik (yoğun) ortamda su hücreden dışarı çıkar → hücre büzüşür (krenasyon), hacim azalır."},{"k":9,"n":57,"s":"Fizyoloji","q":"Amino asitlerin geri emilimi hangi taşıma mekanizmasına örnektir?","o":{"A":"Tersiyer aktif taşıma","B":"Pasif taşıma","C":"Primer aktif taşıma","D":"Sekonder aktif taşıma","E":"Çözücü sürüklenmesi (solvent drag)"},"c":"D","e":"Amino asit/glukoz,Na+ gradiyentine bağlı kotransportla emilir→ sekonder aktif taşıma (enerjiyi dolaylı, Na-K ATPaz'dan alır)."},{"k":9,"n":58,"s":"Fizyoloji","q":"Kortikal reaksiyonun fonksiyonu nedir?","o":{"A":"Spermin kapasitasyonunu sağlamak","B":"Zona pellusidanın yıkımını sağlamak","C":"Fertilizasyonu sağlamak","D":"Spermin ovuma girmesini sağlamak","E":"Polispermiyi engellemek"},"c":"E","e":"Döllenmeden hemen sonra kortikal granüller boşalıp zonayı sertleştirir → ikinci bir spermin girişini (polispermiyi) engeller."},{"k":9,"n":59,"s":"Fizyoloji","q":"Aşağıdakilerden hangisi anjiyotensin II'nin etkilerinden biri değildir?","o":{"A":"Filtrasyon fraksiyonunda azalış","B":"Aldosteron salgısında artış","C":"Glomerüler filtrasyon hızında artış","D":"Sodyum geri emiliminde artış","E":"Eferent arteriyolde daralma"},"c":"A","e":"Ang II, eferent arteriyolü daraltarak glomerül basıncını ve filtrasyon fraksiyonunu ARTIRIR (azaltmaz). Ayrıca Na tutar, aldosteronu yükseltir."},{"k":9,"n":60,"s":"Fizyoloji","q":"Glikozun geri emilimi hangi tübül segmentinde gerçekleşir?","o":{"A":"İnen ince Henle kulpu","B":"Bowman kapsülü","C":"Bellini kanalları","D":"Kortikal toplayıcı kanallar","E":"Proksimal tübül"},"c":"E","e":"Glukoz, amino asit ve bikarbonatın neredeyse tamamı proksimal tübülde (SGLT taşıyıcılarıyla) geri emilir."},{"k":9,"n":61,"s":"Fizyoloji","q":"Leydig hücrelerinden testosteron salgısı hangi hormonun kontrolündedir?","o":{"A":"İnhibin","B":"LH","C":"Leptin","D":"FSH","E":"Melatonin"},"c":"B","e":"LH → Leydig hücrelerini uyarır → testosteron. FSH ise Sertoli hücrelerini (spermatogenez) uyarır. 'LH = Leydig' diye eşleştir."},{"k":9,"n":62,"s":"Fizyoloji","q":"Aldosterona zıt çalışan hormon hangisidir?","o":{"A":"Kortizol","B":"Anjiyotensin II","C":"ADH","D":"Adrenalin","E":"ANP (atriyal natriüretik peptid)"},"c":"E","e":"Aldosteron Na (ve su) tutarken; ANP Na atılımını artırır, su/hacmi düşürür → birbirinin zıttıdır."},{"k":9,"n":63,"s":"Fizyoloji","q":"Hangi ön hipofiz hormonunun salgısı hipotalamus tarafından temel olarak inhibisyon ile kontrol edilir?","o":{"A":"Büyüme hormonu","B":"TSH","C":"LH","D":"Prolaktin","E":"FSH"},"c":"D","e":"Prolaktin, hipotalamustan sürekli salınan dopamin (PIF) ile baskılanır; diğerleri salgılatıcı hormonlarla (GHRH/TRH/GnRH) uyarılır."},{"k":9,"n":64,"s":"Fizyoloji","q":"Vücut sıvılarının hacim bakımından en büyük bölümü hangisidir?","o":{"A":"İntraselüler sıvı (ICF)","B":"İnterstisyel sıvı","C":"Plazma","D":"Transselüler sıvı","E":"Lenf"},"c":"A","e":"Toplam vücut suyunun ~2/3'ü hücre içindedir (intraselüler sıvı). Geri kalan 1/3 hücre dışıdır (interstisyel + plazma).","note":"Şıklar orijinalde okunamadığından tamamlandı; işaret intraselüler sıvıdır."},{"k":9,"n":65,"s":"Fizyoloji","q":"Aşırı ADH salgısı aşağıdakilerden hangisine yol açabilir?","o":{"A":"Hiponatremi","B":"Hipernatremi","C":"Glikozüri","D":"Asidoz","E":"Hematüri"},"c":"A","e":"Aşırı ADH (SIADH) → toplayıcı kanalda aşırı su tutulumu → kanın dilüsyonu → hiponatremi (seyrelmiş sodyum)."},{"k":9,"n":66,"s":"Fizyoloji","q":"Aşağıdaki hormonlardan hangisi puberte üzerine baskılayıcı etkiye sahiptir?","o":{"A":"Kisspeptinler","B":"İnsülin","C":"Melatonin","D":"Leptin","E":"Triiyodotironin"},"c":"C","e":"Epifizden salınan melatonin pubertal başlangıcı baskılar (çocuklukta yüksektir). Kisspeptin ve leptin ise pubertayı tetikler/kolaylaştırır."},{"k":9,"n":67,"s":"Fizyoloji","q":"Testosteronun dihidrotestosterona (DHT) dönüşümü hangi enzim tarafından katalize edilir?","o":{"A":"11β-HSD2","B":"11α-hidroksilaz","C":"5α-redüktaz","D":"Aromataz","E":"17β-HSD"},"c":"C","e":"5α-redüktaz, testosteronu daha güçlü androjen olan DHT'ye çevirir. Aromataz ise testosteronu östrojene dönüştürür.","note":"E şıkkı orijinalde kesikti; tamamlandı."},{"k":9,"n":68,"s":"Fizyoloji","q":"Aşağıdakilerden hangisi glomerüler filtrasyon hızında (GFH) artışa neden olur?","o":{"A":"Plazma proteinlerinde artış","B":"Aferent arteriyol dilatasyonu","C":"Eferent arteriyol dilatasyonu","D":"Bowman kapsülünde hidrostatik basınç artışı","E":"Filtrasyon katsayısının azalması"},"c":"B","e":"Aferent arteriyol genişleyince glomerüle giriş artar → glomerül basıncı ve GFH yükselir. Onkotik basınç veya Bowman basıncı artışı ise GFH'yi düşürür."},{"k":9,"n":69,"s":"Fizyoloji","q":"Hangi hormon fetal hayatta büyümeyi düzenler?","o":{"A":"IGF-1","B":"Büyüme hormonu","C":"Melatonin","D":"Leptin","E":"IGF-2"},"c":"E","e":"Fetal büyümenin temel düzenleyicisi IGF-2'dir; IGF-1 ve büyüme hormonu daha çok doğum sonrası büyümede öne çıkar."},{"k":9,"n":70,"s":"Anatomi (teorik)","q":"Aşağıdakilerden hangisi a. iliaca interna'nın bir dalıdır?","o":{"A":"A. obturatoria","B":"A. testicularis","C":"A. epigastrica inferior","D":"A. mesenterica inferior","E":"A. renalis"},"c":"A","e":"obturatoria internal iliak arterin tipik dalıdır. A. testicularis/renalis/mesenterica inferior aortadan; a. epigastrica inferior ise eksternal iliak arterden çıkar.","note":"Orijinalde şıklar okunamadığından konuya uygun şıklar düzenlendi."}];

const FINAL2024 = [{"k":"F","n":1,"s":"Anatomi (teorik)","q":"Mandibulada açma ve kapama hareketlerinin gerçekleştiği rotasyon ekseni hangisidir?","o":{"A":"Sagittal eksen","B":"Horizontal eksen","C":"Frontal eksen","D":"Vertikal eksen","E":"Transvers oblik eksen"},"c":"B","e":"Açma-kapama (depresyon-elevasyon) hareketi horizontal eksen etrafında döner."},{"n":2,"s":"Dental Maddeler (TR)","q":"Adezyon ile ilgili aşağıdaki ifadelerden hangisi yanlıştır?","o":{"A":"Bir maddenin difüzyonu esas olarak sıcaklığa bağlıdır.","B":"Döküm restorasyonların simantasyonu, minanın metal ve diş yüzeyi üzerindeki düzensizliklere mekanik olarak bağlanmasıdır.","C":"Adezyonu meydana getiren ara tabakaya aderent, yapıştırılan materyale de adeziv denir.","D":"Difüzyon hızı atom boyutuna, atomlar veya moleküller arası bağlarla ilişkilidir.","E":"Yüzey enerjisi ne kadar yüksekse, adezyon kapasitesi o kadar fazladır."},"c":"C","e":"Tanım terslenmiş: ara (yapıştıran) tabaka ADEZİV, yapıştırılan materyal ADHERENT'tir.","k":"F"},{"n":3,"s":"Protez","q":"3 üyeli bir köprü restorasyonunda oklüzal ve fonksiyonel kuvvetler dikkate alındığında aşağıdaki ifadelerden hangisi doğrudur?","o":{"A":"Köprüde bükülme kuvvetleri, pontiğin oklüzal tarafta içbükey, doku tarafının dışbükey olmasına neden olur.","B":"Yüksek gerilim ve makaslama kuvvetlerine maruz kalan en zayıf bölge köprü gövdesidir.","C":"Fonksiyonel kuvvetler oklüzal tarafta çekme, doku tarafında makaslama gerilimine sebep olur.","D":"Çiğneme yükü pontiğin oklüzale doğru bükülmesine neden olur.","E":"Fonksiyonel kuvvetler oklüzal tarafta çekme, doku tarafında basma gerilmesine sebep olur."},"c":"A","e":"Oklüzal yük altında pontik aşağı bükülür: oklüzal yüzde basma (içbükey), doku yüzünde çekme (dışbükey).","k":"F"},{"n":4,"s":"Pedodonti","q":"Süt dişlerinin sürmesi sırasında sürekli dişlerle ilgili aşağıdaki ifadelerden hangisi doğrudur?","o":{"A":"Sürekli dişlerin kök gelişimi süt dişleri sürdükten sonra başlar.","B":"Sürekli dişlerin kur function esc(t){return (t==null?'':String(t)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function bySubject(arr){arr=arr||DATA;const m={};for(const q of arr){(m[q.s]=m[q.s]||[]).push(q);}return m;}

function kurulName(k){return k==='F'?'Bu Sene Final':"Kurul "+k;}

/* ============ SIM SETUP ============ */
function buildSim(){
  // take min(quota, available) per subject, then fill remainder from surplus subjects
  let picked=[];
  const remainingBySubj={};
  let short=[];
  for(const s of SUBJECT_ORDER){
    const pool=shuffle(POOL[s]||[]);
    const want=QUOTA[s];
    const take=Math.min(want,pool.length);
    picked=picked.concat(pool.slice(0,take));
    remainingBySubj[s]=pool.slice(take);
    if(pool.length<want) short.push({s,have:pool.length,want});
  }
  let deficit=SIM_TOTAL-picked.length;
  // fill deficit from leftover questions, weighted toward larger quotas, deterministic-ish
  if(deficit>0){
    let leftovers=[];
    for(const s of SUBJECT_ORDER){
      for(const q of remainingBySubj[s]) leftovers.push(q);
    }
    leftovers=shuffle(leftovers);
    picked=picked.concat(leftovers.slice(0,deficit));
  }
  picked=shuffle(picked).slice(0,SIM_TOTAL);
  return {qs:picked,short};
}
function renderSimSetup(){
  const subjects=SUBJECT_ORDER.filter(s=>(POOL[s]||[]).length>0);
  // preview short subjects
  let short=[];
  for(const s of SUBJECT_ORDER){const h=(POOL[s]||[]).length;if(h<QUOTA[s])short.push(`${s} (${h}/${QUOTA[s]})`);}
  let shortNote = short.length
    ? `<div class="callout"><b>Not:</b> Havuzda şu dersler için yeterli soru yok: ${short.map(esc).join(', ')}. Bu açık, fazla soru bulunan derslerden orantılı şekilde tamamlanır; bu yüzden bu derslerin oranı finaldekinden bir miktar farklı olabilir.</div>`
    : '';
  let dist=SUBJECT_ORDER.map(s=>`<div class="bar"><span class="lab" title="${esc(s)}">${esc(s)}</span>
      <span class="track"><span class="fill" style="width:${Math.round(QUOTA[s]/29*100)}%"></span></span>
      <span class="num">${QUOTA[s]} soru</span></div>`).join('');

  app.innerHTML=`
  <div class="wrap">
    <div class="panel">
      <h2>Final simülasyonu</h2>
      <p class="lead">Final sınavının birebir düzeni: 200 soru, 200 dakika. Sorular her seferinde rastgele seçilir ve ders oranları finalin dağılımıyla eşleşir.</p>
      <div class="statstrip" style="margin-top:4px">
        <div class="stat"><b>200</b><span>soru</span></div>
        <div class="stat"><b>200<small style="font-size:.9rem"> dk</small></b><span>süre (≈1 dk/soru)</span></div>
        <div class="stat"><b>100</b><span>puan üzerinden</span></div>
      </div>
      ${shortNote}
      <div class="fieldlabel" style="margin-top:26px">Ders dağılımı (kota)</div>
      <div>${dist}</div>
      <div class="setup-foot">
        <span class="count-note">Sınav bitince ders bazlı analiz ve tüm açıklamalar gösterilir.</span>
        <button class="primary gold" onclick="startSim()">Sınavı başlat →</button>
      </div>
    </div>
  </div>`;
}
function startSim(){
  const {qs,short}=buildSim();
  go('sim',{qs,i:0,ans:{},marks:{},short,remaining:SIM_MINUTES*60,ended:false});
  startTimer();
}
function startTimer(){
  if(timerId)clearInterval(timerId);
  timerId=setInterval(()=>{
    S.remaining--;
    if(S.remaining<=0){S.remaining=0;clearInterval(timerId);timerId=null;finishSim(true);return;}
    const t=$('#timer');
    if(t){t.textContent=fmtTime(S.remaining);t.className='timer'+(S.remaining<300?' danger':(S.remaining<1200?' warn':''));}
  },1000);
}

/* ============ SIM RUNNER ============ */
function renderSim(){

}
function answerSim(L){S.ans[S.i]=(S.ans[S.i]===L?undefined:L);if(S.ans[S.i]===undefined)delete S.ans[S.i];renderSim();}
function simNav(d){const n=S.i+d;if(n<0||n>=S.qs.length)return;S.i=n;renderSim();window.scrollTo({top:0,behavior:'auto'});}
function simJump(j){S.i=j;renderSim();window.scrollTo({top:0,behavior:'auto'});}
function toggleMark(){S.marks[S.i]=!S.marks[S.i];if(!S.marks[S.i])delete S.marks[S.i];renderSim();}
function confirmFinish(){

/* ============ RESULTS ============ */
function renderResults(){
  const {qs,ans,short,used,auto}=S;
  let correct=0,wrong=0,blank=0;
  const bySub={};
  qs.forEach((q,idx)=>{
    const p=ans[idx];
    const sub=bySub[q.s]||(bySub[q.s]={c:0,t:0});
    sub.t++;
    if(p===undefined){blank++;}
    else if(p===q.c){correct++;sub.c++;}
    else{wrong++;}
  });
  const pts=(correct*100/qs.length);
  const pctScore=Math.round(correct/qs.length*100);
  if(S.review===undefined)S.review='none';

  // subject rows sorted by blueprint order
  let rows='';
  for(const s of SUBJECT_ORDER){
    if(!bySub[s])continue;
    const {c,t}=bySub[s];
    const p=Math.round(c/t*100);
    const fc=p>=60?'':(p>=40?'low':'bad');
    rows+=`<div class="strow"><span class="nm">${esc(s)}</span>
      <span class="track"><span class="fill ${fc}" style="width:${p}%"></span></span>
      <span class="sc">${c}/${t} · %${p}</span></div>`;
  }

  let reviewHtml='';
  if(S.review!=='none'){
    const list=qs.map((q,idx)=>({q,idx})).filter(({q,idx})=>{
      const p=ans[idx];
      if(S.review==='wrong')return p!==undefined&&p!==q.c;
      if(S.review==='blank')return p===undefined;
      return true;
    });
    if(!list.length)reviewHtml='<p style="color:var(--muted);font-size:.9rem">Bu kategoride soru yok.</p>';
    list.forEach(({q,idx})=>{
      const p=ans[idx];
      const status = p===undefined?'<span class="rstatus bos">Boş</span>'
        : p===q.c?'<span class="rstatus ok">Doğru</span>':'<span class="rstatus no">Yanlış</span>';
      let os=Object.keys(q.o).map(L=>{
        let cls='ro';
        if(L===q.c)cls+=' c'; else if(L===p)cls+=' x';
        const tail = L===q.c?' ✓':(L===p?' ✕':'');
        return `<div class="${cls}"><span class="l">${L}</span><span>${esc(q.o[L])}${tail}</span></div>`;
      }).join('');
      const e=q.e?`<div class="rexp"><b>Püf:</b> ${esc(q.e)}</div>`:'';
      const nt=q.note?`<div class="note" style="margin-top:8px"><span class="ni">Not:</span><span>${esc(q.note)}</span></div>`:'';
      reviewHtml+=`<div class="rcard">${status}
        <p class="rq"><span class="mono" style="color:var(--muted)">[${q.k}·${q.n}] ${esc(q.s)}</span><br>${esc(q.q)}</p>
        ${os}${e}${nt}</div>`;
    });
  }

  app.innerHTML=`
  <div class="wrap">
    <div class="resulthero">
      <div class="big">${correct}<small> / ${qs.length} doğru</small></div>
      <div class="pts">${pts.toFixed(1)} / 100 puan · %${pctScore}</div>
      <div class="meta">
        <div><b>${correct}</b><span>doğru</span></div>
        <div><b>${wrong}</b><span>yanlış</span></div>
        <div><b>${blank}</b><span>boş</span></div>
        <div><b class="mono">${fmtTime(used)}</b><span>süre ${auto?'(doldu)':''}</span></div>
      </div>
    </div>

    <h3 class="sectiontitle">Ders bazlı sonuç</h3>
    <div class="subjtable">${rows}</div>
    ${short&&short.length?`<div class="callout" style="margin-top:14px"><b>Hatırlatma:</b> ${short.map(o=>esc(o.s)+' ('+o.have+'/'+o.want+')').join(', ')} dersinde havuz kotanın altında olduğu için bu sınavda eksik temsil edildi.</div>`:''}

    <div class="reviewbtns">
      <button class="toggle-r ${S.review==='all'?'on':''}" onclick="setReview('all')">Tümünü incele</button>
      <button class="toggle-r ${S.review==='wrong'?'on':''}" onclick="setReview('wrong')">Yanlışlar (${wrong})</button>
      <button class="toggle-r ${S.review==='blank'?'on':''}" onclick="setReview('blank')">Boşlar (${blank})</button>
      ${S.review!=='none'?`<button class="toggle-r" onclick="setReview('none')">Gizle</button>`:''}
    </div>
    <div>${reviewHtml}</div>

    <div class="navrow" style="margin-top:24px">
      <button class="navbtn" onclick="go('home')">← Ana sayfa</button>
      <button class="navbtn next" onclick="startSim()">Yeni simülasyon ↻</button>
    </div>
  </div>`;
}

    </div>
    <div class="navrow">
      <button class="navbtn" ${i===0?'disabled':''} onclick="cardsNav(-1)">← Önceki</button>
      <button class="navbtn" onclick="flipCard()">${flipped?'Soruyu göster':'Cevabı göster'}</button>
      ${i<qs.length-1
        ? `<button class="navbtn next" onclick="cardsNav(1)">Sonraki →</button>`
        : `<button class="navbtn next" onclick="go('home')">Bitir ✓</button>`}
    </div>
  </div>`;
}
function flipCard(){ S.flip=!S.flip; renderCards(); }
function cardsNav(d){ const n=S.i+d; if(n<0||n>=S.qs.length)return; S.i=n; S.flip=false; renderCards(); window.scrollTo({top:0,behavior:'auto'}); }

/* ============ SORU ARA ============ */
function searchHits(query){
  const t=(query||'').trim().toLowerCase();
  if(t.length<2)return [];
  const terms=t.split(/\s+/);
  return ALLCARDS.filter(q=>{
    const hay=((q.q||'')+' '+(q.s||'')+' '+(q.o?Object.values(q.o).join(' '):'')+' '+(q.a||'')+' '+(q.e||'')+' '+(q.note||'')).toLowerCase();
    return terms.every(w=>hay.includes(w));
  });
}
function doSearch(v){
  S.query=v;
  const res=document.querySelector('#searchResults');
  const cnt=document.querySelector('#searchCount');
  if(!res)return;
  const t=(v||'').trim();
  if(t.length<2){ if(cnt)cnt.textContent='En az 2 harf yaz.'; res.innerHTML=''; return; }
  const hits=searchHits(v);
  if(cnt)cnt.innerHTML='<b>'+hits.length+'</b> sonuç';
  if(!hits.length){ res.innerHTML='<p class="count-note" style="margin-top:14px">Eşleşen soru yok.</p>'; return; }
  res.innerHTML=hits.slice(0,200).map(q=>{
    const ans = q.a || (q.o?`${q.c}) ${q.o[q.c]}`:'');
    const e=q.e?`<div class="rexp"><b>Püf:</b> ${esc(q.e)}</div>`:'';
    return `<div class="rcard">
      <p class="rq"><span class="mono" style="color:var(--muted)">[${q.k}·${q.n}] ${esc(q.s)} · ${kurulName(q.k)}</span><br>${esc(q.q)}</p>
      <div class="answerbox" style="margin-top:8px"><p class="et">Cevap</p><p>${esc(ans)}</p></div>${e}</div>`;
  }).join('') + (hits.length>200?'<p class="count-note" style="margin-top:10px">İlk 200 gösteriliyor; aramayı daralt.</p>':'');
}
function renderSearch(){
  if(S.query===undefined)S.query='';
  app.innerHTML=`
  <div class="wrap">
    <div class="panel">
      <h2>Soru Ara</h2>
      <p class="lead">Kelimeye göre tüm soru bankasında (dokuz kurul + bu sene final) ara. Soru metni, şıklar, doğru cevap ve açıklamada eşleşir.</p>
      <input id="searchInput" class="searchbox" type="search" placeholder="Örn: parotis, insülin, ICDAS, nekroz..." value="${esc(S.query)}" oninput="doSearch(this.value)" autocomplete="off" autocapitalize="off" spellcheck="false">
      <div id="searchCount" class="count-note" style="margin-top:12px"></div>
      <div id="searchResults"></div>
    </div>
  </div>`;
  const inp=document.querySelector('#searchInput'); if(inp){ inp.focus(); }
  doSearch(S.query);
}

/* ---- dispatch ---- */
function render(){
  switch(S.screen){
    case 'home':return renderHome();
    case 'final':return renderFinal();
    case 'cards-setup':return renderCardsSetup();
    case 'cards':return renderCards();
    case 'search':return renderSearch();
    case 'study-setup':return renderStudySetup();
    case 'study':return renderStudy();
    case 'sim-setup':return renderSimSetup();
    case 'sim':return renderSim();
    case 'sim-results':return renderResults();
    default:return renderHome();
  }
}
render();
(function(){var ft=document.querySelector('#footTotal'); if(ft) ft.textContent=(DATA.length+FINAL2024.length);})();
</script>
</body>
