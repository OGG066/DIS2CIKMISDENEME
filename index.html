 facialis","E":"N. glossopharyngeus"},"c":"C","e":"Trigeminal dalların çıkış delikleri – “ROO” kuralı: V1 ophthalmicus → fissura orbitalis superior, V2 maxillaris → foramen Rotundum, V3 mandibularis → foramen Ovale."},{"k":2,"n":17,"s":"Anatomi (teorik)","q":"Hem motor hem duyu taşıyan trigeminal dal hangisidir?","o":{"A":"N. ophthalmicus","B":"N. maxillaris","C":"N. mandibularis","D":"N. olfactorius","E":"N. opticus"},"c":"C","e":"V3 (n. mandibularis) hem duyu hem MOTOR taşır (çiğneme kaslarını innerve eder). V1 (ophthalmicus) ve V2 (maxillaris) sadece duyusaldır. Diş hekimliği için kritik: alt çene anestezisi bir V3 bloğudur. Olfactorius ve opticus trigeminus dalı değildir."},{"k":2,"n":18,"s":"Anatomi (teorik)","q":"Sinus cavernosus lateral duvarında seyreden sinirlerden en altta olan hangisidir?","o":{"A":"N. oculomotorius","B":"N. trochlearis","C":"N. ophthalmicus","D":"N. maxillaris","E":"N. abducens"},"c":"D","e":"Lateral duvardaki yukarıdan aşağıya sıralama: III → IV → V1 (ophthalmicus) → V2 (maxillaris). En altta maxillaris bulunur. N. abducens duvarda değil, sinüsün İÇİNDEN a. carotis interna ile birlikte geçer."},{"k":2,"n":19,"s":"Anatomi (teorik)","q":"Parotis bezini innerve etmeyen sinir hangisidir?","o":{"A":"N. glossopharyngeus","B":"N. auriculotemporalis","C":"Ganglion oticum","D":"Chorda tympani","E":"N. petrosus minor"},"c":"D","e":"Parotis parasempatik yolu: IX (glossofaringeus) → n. tympanicus → n. petrosus minor → ganglion oticum → n. auriculotemporalis → parotis. Chorda tympani ise submandibular ve sublingual bezlere gider, parotise DEĞİL."},{"k":2,"n":20,"s":"Anatomi (teorik)","q":"N. alveolaris superior posterior hasarında en çok hangi bölge etkilenir?","o":{"A":"Alt ön dişler","B":"Üst molar dişler","C":"Dil ucu","D":"Alt dudak","E":"Sert damak önü"},"c":"B","e":"N. alveolaris superior posterior üst molar dişlerin (ve çevre dişetinin) duyusunu taşır. Alt ön dişler n. incisivus/inferior alveolaris, dil ucu lingual sinir + chorda tympani, alt dudak n. mentalis, sert damak önü n. nasopalatinus ile ilişkilidir."},{"k":2,"n":21,"s":"Anatomi (teorik)","q":"N. petrosus major hangi sinirin dalıdır?","o":{"A":"N. trigeminus","B":"N. glossopharyngeus","C":"N. facialis","D":"N. vagus","E":"N. hypoglossus"},"c":"C","e":"N. petrosus major, n. facialis'in (VII) dalıdır; gözyaşı bezi ile burun-damak bezlerine parasempatik lif taşır. Glossofaringeus'un dalı n. petrosus MINOR'dur (parotise gider) — ikisini karıştırma!"},{"k":2,"n":22,"s":"Anatomi (teorik)","q":"Dilde çıkış merkezi itibariyle parasempatik lif taşıyan sinir hangisidir?","o":{"A":"N. trigeminus","B":"N. facialis","C":"N. glossopharyngeus","D":"N. hypoglossus","E":"N. vagus"},"c":"B","e":"Dil bağlamında parasempatik lifler n. facialis'ten (VII) çıkar: nucleus salivatorius superior → chorda tympani → submandibular + sublingual tükürük bezleri. Glossofaringeus parotise (dil değil), hypoglossus saf motor, vagus toraks-abdomen organlarına gider."},{"k":2,"n":23,"s":"Anatomi (teorik)","q":"N. vagus aşağıdakilerden hangisini innerve etmez?","o":{"A":"Larinks","B":"Farinks","C":"Kalp","D":"Mide","E":"Parotis bezi"},"c":"E","e":"N. vagus (X) larinks, farinks, kalp, akciğer ve mide dâhil toraks-abdomen organlarına gider. Parotis bezinin parasempatik innervasyonu ise n. glossopharyngeus (IX) iledir, vagus değil."},{"k":2,"n":24,"s":"Anatomi (teorik)","q":"Orta kulak iç duvarının duyusunu alan sinir hangisidir?","o":{"A":"N. facialis","B":"N. trigeminus","C":"N. glossopharyngeus","D":"N. hypoglossus","E":"N. vagus"},"c":"C","e":"Orta kulak mukozasının duyusunu glossofaringeus'un dalı olan n. tympanicus alır → IX. Fasialis mimik/tat, trigeminus yüz genel duyusu, hypoglossus dil motoru, vagus ise larinks-farinks ve dış kulak yolu ile ilişkilidir."},{"k":2,"n":25,"s":"Anatomi (teorik)","q":"Nucleus solitarius ile ilgili doğru ifade hangisidir?","o":{"A":"Yalnız motor lif taşır","B":"Yalnız trigeminal lif taşır","C":"7., 9. ve 10. kranial sinirlerin duyu liflerini taşır","D":"Sadece görme refleksi yapar","E":"İşitme çekirdeğidir"},"c":"C","e":"Nucleus solitarius visseral duyu ve TAT bilgisinin ana çekirdeğidir; gelen lifler VII, IX ve X sinirlerindendir (dilin 2/3 ön tadı → VII, 1/3 arka + epiglot → IX, visseral → X). İşitme çekirdekleri ise koklear çekirdeklerdir."},{"k":2,"n":26,"s":"Anatomi (teorik)","q":"N. trigeminusun hem motor hem duyu lifi taşıyan dalı hangisidir?","o":{"A":"N. ophthalmicus","B":"N. maxillaris","C":"N. mandibularis","D":"N. olfactorius","E":"N. opticus"},"c":"C","e":"V3 (n. mandibularis) hem duyu hem MOTOR taşır (çiğneme kasları). V1 (ophthalmicus) ve V2 (maxillaris) yalnızca duyusaldır. Olfactorius (koku) ve opticus (görme) trigeminus dalı bile değildir."},{"k":2,"n":27,"s":"Anatomi (teorik)","q":"Hem motor hem duyu lifi içeren kranial sinir hangisidir?","o":{"A":"N. opticus","B":"N. vestibulocochlearis","C":"N. trigeminus","D":"N. olfactorius","E":"N. trochlearis"},"c":"C","e":"N. trigeminus (V) karışık sinirdir: yüzün duyusu + çiğneme kaslarının motoru. Opticus (görme), vestibülokoklear (işitme-denge) ve olfactorius (koku) saf duyu; trochlearis ise saf motordur (m. obliquus superior)."},{"k":2,"n":28,"s":"Anatomi (teorik)","q":"Aynı tarafta düşük omuz hangi sinir hasarında görülür?","o":{"A":"N. facialis","B":"N. hypoglossus","C":"N. accessorius","D":"N. vagus","E":"N. glossopharyngeus"},"c":"C","e":"N. accessorius (XI) m. trapezius ve m. sternocleidomastoideus'u innerve eder; hasarında aynı tarafta omuz düşer ve kol kaldırmada güçlük olur. Fasialis mimik, hypoglossus dil, vagus iç organ, glossofaringeus yutma/tat ile ilgilidir."},{"k":2,"n":29,"s":"Anatomi (teorik)","q":"N. alveolaris superior posterior hasarında hangi durum görülür?","o":{"A":"Alt molar ağrısı kaybı","B":"Dil ön kısmında tat kaybı","C":"Üst molar dişlerde duyu kaybı","D":"Alt dudakta uyuşma","E":"Sert damakta ağrı"},"c":"C","e":"N. alveolaris superior posterior üst molar dişlerin duyusunu taşır → hasarında üst molarlarda duyu kaybı olur. Alt molar n. alveolaris inferior, dil ön tadı chorda tympani, alt dudak n. mentalis, sert damak n. palatinus major iledir."},{"k":2,"n":30,"s":"Anatomi (teorik)","q":"Orta kulaktan duyu alan sinir hangisidir?","o":{"A":"N. trigeminus","B":"N. facialis","C":"N. glossopharyngeus","D":"N. vagus","E":"N. hypoglossus"},"c":"C","e":"Orta kulağın duyusu → n. glossopharyngeus (IX). Pratik ayrım: Orta kulak = IX (glossofaringeus), dış kulak yolu = X (vagus). Trigeminus yüz duyusu, fasialis mimik/tat, hypoglossus dil motorudur."},{"k":2,"n":31,"s":"Anatomi (teorik)","q":"Lensin arka yüzüyle komşu yapı hangisidir?","o":{"A":"Corpus ciliare","B":"Retina","C":"Corpus vitreum","D":"İris","E":"Choroidea"},"c":"C","e":"Gözün ön-arka dizilimi: Kornea → ön kamara → iris → lens → corpus vitreum (camsı cisim) → retina. Lensin hemen arkasında corpus vitreum yer alır."},{"k":2,"n":32,"s":"Anatomi (teorik)","q":"İç kulakta işitme reseptörü hangi yapıda bulunur?","o":{"A":"Utriculus","B":"Sacculus","C":"Ductus cochlearis","D":"Semisirküler kanal","E":"Vestibulum"},"c":"C","e":"İşitme reseptörü (Corti organı) ductus cochlearis (scala media) içindedir. Utriculus ve sacculus lineer ivme/yer çekimi, semisirküler kanallar açısal ivme algılar; yani diğerleri DENGE ile ilgilidir, işitme değil."},{"k":2,"n":33,"s":"Anatomi (teorik)","q":"Lensin arkasında bulunan yapı hangisidir?","o":{"A":"Retina","B":"İris","C":"Corpus vitreum","D":"Choroidea","E":"Corpus ciliare"},"c":"C","e":"Dizilim: Kornea → ön kamara → iris → lens → corpus vitreum (camsı cisim) → retina. Lensin hemen arkasında corpus vitreum bulunur. İris ise lensin ÖNÜNDEDİR — şaşırtmasın."},{"k":2,"n":34,"s":"Fizyoloji","q":"Gözde fotoreseptör sayısı en fazla olan hücre hangisidir?","o":{"A":"Koni","B":"Bipolar","C":"Ganglion","D":"Rod","E":"Horizontal"},"c":"D","e":"Rod (çomak) hücreleri retinada en çok bulunan fotoreseptördür; gece görmesi, siyah-beyaz ve periferik görmeden sorumlu. Koni renkli/keskin görme (foveada yoğun) yapar ama sayıca azdır. Bipolar, ganglion ve horizontal hücreler fotoreseptör DEĞİLDİR."},{"k":2,"n":35,"s":"Fizyoloji","q":"İç tüylü hücrelerde depolarizasyon hangi iyon ile gerçekleşir?","o":{"A":"Na+","B":"Cl−","C":"K+","D":"Ca2+","E":"Mg2+"},"c":"C","e":"İç tüylü hücreler K-zengini endolenfe daldığı için, stereosilya bükülünceK+ hücreye girer ve depolarizasyon başlar (kulağa özgü ters mantık!).Ca2+ sonradan nörotransmitter salınımını tetikler; Na+, çoğu nöronun aksine burada esas iyon değildir."},{"k":2,"n":36,"s":"Fizyoloji","q":"Endolenf için doğru olan hangisidir?","o":{"A":"Na açısından zengindir","B":"K açısından zengindir","C":"Protein içermez","D":"BOS ile aynıdır","E":"Ca açısından zengindir"},"c":"B","e":"Endolenf (membranöz labirentin içi) hücre içine benzer:K+ YÜKSEK,Na+ düşük.Bu le tüylü hücrelerde K girişi depolarizasyon yapar. Az miktarda protein içerir; perilenf BOS'a benzer, endolenf benzemez."},{"k":2,"n":37,"s":"Fizyoloji","q":"İşitmede gerçek duysal bilgiyi taşıyan hücre hangisidir?","o":{"A":"Dış tüylü hücre","B":"İç tüylü hücre","C":"Destek hücresi","D":"Basket hücresi","E":"Horizontal hücre"},"c":"B","e":"Asıl işitme sinyalini beyne ileten iç tüylü hücrelerdir (işitme afferentlerinin %90-95'i buradan çıkar). Dış tüylü hücreler ise sesi güçlendiren “amplifikatör”dür. Destek hücreleri taşıyıcı; basket ve horizontal hücreler başka sistemlere aittir."},{"k":2,"n":38,"s":"Fizyoloji","q":"Dış tüylü hücrelerin temel görevi nedir?","o":{"A":"BOS üretmek","B":"Ağrı iletmek","C":"Koklear amplifikasyon yapmak","D":"Görsel sinyal üretmek","E":"Miyelin oluşturmak"},"c":"C","e":"Dış tüylü hücreler boylarını değiştirerek (motilite) zayıf sesleri güçlendirir; buna koklear amplifikasyon denir. Sesi beyne taşımazlar, sadece kuvvetlendirirler. BOS üretimi koroid pleksusun, miyelin ise oligodendrosit/Schwann'ın işidir."},{"k":2,"n":39,"s":"Fizyoloji","q":"Gözde kaç çeşit fotoreseptör vardır?","o":{"A":"1","B":"2","C":"3","D":"4","E":"5"},"c":"B","e":"İki çeşit fotoreseptör vardır: Rod (çomak) → gece/loş görme, siyah-beyaz; Kon (koni) → gündüz, renkli ve keskin görme. Üç tip kon (kırmızı-yeşil-mavi) bulunsa da fotoreseptör TİP sayısı ikidir."},{"k":2,"n":40,"s":"Histoloji","q":"Cerebellumun esas hücresi hangisidir?","o":{"A":"Granül hücresi","B":"Basket hücresi","C":"Purkinje hücresi","D":"Golgi hücresi","E":"Astrosit"},"c":"C","e":"Granül hücresi en fazla bulunandır ama serebellumun karakteristik ve TEK çıkış (output) nöronu Purkinje hücresidir. Basket ve Golgi hücreleri Purkinje/granülü inhibe eden internöronlardır; astrosit ise nöron bile değildir."},{"k":2,"n":41,"s":"Histoloji","q":"Cerebellumda Purkinje hücrelerinin dendritlerini ve basket hücrelerini barındıran tabaka hangisidir?","o":{"A":"Granüler tabaka","B":"Purkinje tabakası","C":"Moleküler tabaka","D":"Beyaz cevher","E":"Ependimal tabaka"},"c":"C","e":"Moleküler tabaka = Purkinje dendritleri + basket + stellat hücreler. Granüler tabakada granül ve Golgi hücreleri, Purkinje tabakasında ise sadece Purkinje gövdeleri bulunur. İpucu: dendritler yukarı uzanır → en dış (moleküler) tabaka."},{"k":2,"n":42,"s":"Histoloji","q":"Purkinje hücreleri hangi tabakada yer alır?","o":{"A":"Moleküler tabaka","B":"Granüler tabaka","C":"Beyaz cevher","D":"Purkinje hücre tabakası","E":"Subependimal tabaka"},"c":"D","e":"Dikkat! Purkinje hücre GÖVDELERİ kendi adıyla anılan Purkinje tabakasında tek sıra hâlinde dizilir; sadece dendritleri moleküler tabakaya uzanır. Soru “hücre/gövde” diyorsa cevap Purkinje tabakasıdır."},{"k":2,"n":43,"s":"Histoloji","q":"MSS'de miyelin kılıf oluşumunda görevli hücre hangisidir?","o":{"A":"Schwann hücresi","B":"Astrosit","C":"Merkel hücresi","D":"Oligodendrosit","E":"Ependim hücresi"},"c":"D","e":"MSS'de miyelini oligodendrosit yapar (bir hücre aynı anda birçok aksonu sarar). Schwann hücresi PSS'nin miyelin hücresidir. Astrosit kan-beyin bariyerine, ependim ventrikül döşemesine, Merkel ise deride dokunmaya bakar."},{"k":2,"n":44,"s":"Histoloji","q":"Tanisitlerin özgün görevi aşağıdakilerden hangisidir?","o":{"A":"Mikroglial aktivasyonu artırmak","B":"BOS bileşenlerini izleyerek hipotalamusa geri bildirim yapmak","C":"Sinaptik iletimi hızlandırmak","D":"KBB geçirgenliğini düzenlemek","E":"Nöronal onarım yapmak"},"c":"B","e":"Tanisitler özelleşmiş ependim hücreleridir; özellikle 3. ventrikül tabanında BOS ile hipotalamus arasında köprü kurar, BOS içeriğini izleyerek nöroendokrin düzenlemeye geri bildirim verir. Mikroglia savunma/fagositoz, KBB düzenlemesi ise astrositlerin işidir."},{"k":2,"n":45,"s":"Histoloji","q":"Merkel hücreleri ile ilgili aşağıdakilerden hangisi doğrudur?","o":{"A":"Ağrı reseptörüdür","B":"Isı reseptörüdür","C":"Hafif dokunma reseptörüdür","D":"Motor nörondur","E":"Fotoreseptördür"},"c":"C","e":"Merkel hücreleri hafif/sürekli dokunma ve baskı reseptörüdür. Ağrı → nosiseptör, ısı → serbest sinir uçları, derin basınç-vibrasyon → Pacini, gerilme → Ruffini, ince dokunma → Meissner. Merkel bir duyu reseptörüdür, motor nöron değildir."},{"k":2,"n":46,"s":"Histoloji","q":"Kalın deri ve ince deri arasındaki temel fark aşağıdakilerden hangisidir?","o":{"A":"Kalın deride epidermis daha fazladır","B":"İnce deri vücudun her yerinde bulunur","C":"Kalın deri daha fazla kıl folikülü içerir","D":"Kalın deri daha fazla melanin içerir","E":"İnce deri yalnızca ayak tabanında bulunur"},"c":"A","e":"Kalın deri (avuç içi, ayak tabanı) kalın bir epidermise ve ekstra stratum lucidum'a sahiptir; üstelik kıl folikülü İÇERMEZ. Avuç içi/ayak tabanı kalın deri; ince deri ise vücudun geri kalanını kaplar."},{"k":2,"n":47,"s":"Histoloji","q":"Stratum lucidum en belirgin olarak nerede bulunur?","o":{"A":"İnce deri","B":"Kalın deri","C":"Dermis","D":"Hipodermis","E":"Retiküler tabaka"},"c":"B","e":"Stratum lucidum yalnızca kalın deride görülen, saydam ince bir tabakadır (özellikle avuç içi ve ayak tabanı). İnce deride genelde bulunmaz. Dermis/hipodermis ise epidermis değil, bağ ve yağ dokusudur."},{"k":2,"n":48,"s":"Histoloji","q":"Deriye mekanik destek sağlayan bağ dokusu tabakası hangisidir?","o":{"A":"Epidermis","B":"Stratum basale","C":"Dermis","D":"Stratum lucidum","E":"Hipodermis"},"c":"C","e":"Dermis, içerdiği tip I kollajen ve elastik lifler sayesinde deriye mekanik dayanıklılık ve esneklik verir. Epidermis koruyucu epitel, stratum basale onun en alt (kök hücre) tabakası, hipodermis ise yağdan zengin şok emici tabakadır."},{"k":2,"n":49,"s":"Histoloji","q":"Derinin mekanik gerilmelere karşı gevşek bağ dokusu içeren bölümü hangisidir?","o":{"A":"Epidermis","B":"Retiküler dermis","C":"Papiller dermis","D":"Stratum corneum","E":"Hipodermis"},"c":"C","e":"Papiller dermis gevşek bağ dokusundan oluşur ve epidermisle girinti-çıkıntılarla kenetlenip mekanik desteği sağlar. Retiküler dermis ise kalın kollajen lifli SIKI bağ dokusudur. Epidermis ve stratum corneum epitel, hipodermis yağ dokusudur."},{"k":2,"n":50,"s":"Histoloji","q":"Ranvier boğumlarında iyon ve nörotransmitter artıklarını temizleyen hücre hangisidir?","o":{"A":"Mikroglia","B":"Astrosit","C":"Schwann hücresi","D":"Oligodendrosit","E":"Ependim hücresi"},"c":"B","e":"Astrositler Ranvier boğumlarında birikenK+ iyonlarınıve fazla nörotransmitterleri temizler (iyon tamponlama + geri alım), ayrıca kan-beyin bariyerine katkı sağlar. Mikroglia fagositoz/savunma, oligodendrosit-Schwann miyelin, ependim ise ventrikül döşemesi yapar."},{"k":2,"n":51,"s":"Histoloji","q":"Histolojik preparatlarda dokuların bozulmasını engelleyen kimyasal madde hangisidir?","o":{"A":"Parafin","B":"Ksilen","C":"Formaldehit","D":"Hematoksilen","E":"Eozin"},"c":"C","e":"Formaldehit (formalin) bir fiksatiftir; proteinleri çapraz bağlayıp dokuyu bozulmaya/otolize karşı korur. Parafin gömme (bloklama) maddesi, ksilen şeffaflandırıcı, hematoksilen çekirdeği (mavi), eozin sitoplazmayı (pembe) boyar."},{"k":2,"n":52,"s":"Histoloji","q":"Endonöryum hangi yapıyı sarar?","o":{"A":"Tüm siniri","B":"Fasikülü","C":"Tek sinir lifini","D":"Ganglionu","E":"Schwann hücresini"},"c":"C","e":"Sinir kılıfları içten dışa: Endonöryum → tek bir sinir lifini (akson), Perinöryum → fasikülü, Epinöryum → tüm siniri sarar. Ezber: “En içteki endonöryum, en ince yapıyı (lifi) sarar.”"},{"k":2,"n":53,"s":"Patoloji","q":"Aşağıdakilerden hangisi hücresel adaptasyon mekanizmalarından değildir?","o":{"A":"Atrofi","B":"Hipertrofi","C":"Metaplazi","D":"Hipoplazi","E":"Hiperplazi"},"c":"D","e":"Hücresel adaptasyonun 4 ana yolu: atrofi (küçülme), hipertrofi (büyüme), hiperplazi (sayıca artma) ve metaplazi (tip değişimi). Hipoplazi ise gelişim sırasında bir organın yeterince gelişememesidir; adaptasyon değil, gelişimsel bir kusurdur."},{"k":2,"n":54,"s":"Patoloji","q":"Erken dönem hücre zedelenmesinde aşağıdakilerden hangisi görülmez?","o":{"A":"Na artışı, K azalması","B":"Sitoplazmada vakuol","C":"ER şişmesi","D":"Hücre membranında fosfolipit yıkımı","E":"Mitokondri şişmesi"},"c":"D","e":"Na/K pompası bozukluğu, hücre şişmesi (vakuol), ER ve mitokondri şişmesi geri dönüşlü (reversibl) erken bulgulardır. Membran fosfolipitlerinin yıkımı ise ağır, geri DÖNÜŞSÜZ (irreversibl) hasarın işaretidir; erken dönemde görülmez."},{"k":2,"n":55,"s":"Patoloji","q":"Çok fazla sıvı kaybına bağlı şok ve ölümle sonuçlanabilen iltihap tipi hangisidir?","o":{"A":"Kronik iltihap","B":"Eksüdatif iltihap","C":"Seröz iltihap","D":"Fibrinöz iltihap","E":"Kataral iltihap"},"c":"C","e":"Seröz iltihapta protein-fakir, sulu eksüda birikir; aşırı sıvı kaybı hipovolemik şoka ve ölüme götürebilir (örn. ağır yanıklar). Fibrinöz = fibrinden zengin (perikardit/plörit), kataral = mukus artışı, kronik = uzun süreli iltihaptır."},{"k":2,"n":56,"s":"Patoloji","q":"Akut iltihapta baskın hücre hangisidir?","o":{"A":"Lenfosit","B":"Plazma hücresi","C":"Eozinofil","D":"Nötrofil lökosit","E":"Makrofaj"},"c":"D","e":"Akut iltihabın ilk 6–24 saatinde sahneye nötrofiller hâkimdir; bakterileri fagosite eder. 24-48 saatten sonra makrofajlar devralır (kronik iltihabın temel hücresi). Lenfosit/plazma kronik, eozinofil ise parazit ve alerjide artar."},{"k":2,"n":57,"s":"Patoloji","q":"MSS iskemik zedelenmesi ve abselerde görülen nekroz tipi hangisidir?","o":{"A":"Likefaksiyon nekrozu","B":"Koagülasyon nekrozu","C":"Kazeifikasyon nekrozu","D":"Yağ nekrozu","E":"Gangrenöz nekroz"},"c":"A","e":"Beyin yumuşak ve lipidden zengin olduğu için iskemide ve abselerde likefaksiyon (sıvılaşma) nekrozu görülür. Koagülasyon → kalp/böbrek/dalak infarktı, kazeifikasyon → tüberküloz (peynirimsi), yağ nekrozu → akut pankreatit, kuru gangren → koagülasyon türevidir."},{"k":2,"n":58,"s":"Patoloji","q":"Aşağıdakilerden hangisi hücre hasarının en yaygın sebebidir?","o":{"A":"Hipoksi ve iskemi","B":"Enfeksiyon","C":"Travma","D":"Radyasyon","E":"İmmün reaksiyonlar"},"c":"A","e":"Hücre hasarının EN yaygın ve en önemli nedeni hipoksi/iskemidir (oksijen ve kan akımının azalması → ATP düşüşü). Enfeksiyon, travma, radyasyon ve immün reaksiyonlar da hasar yapar ama sıklıkta hipoksinin önüne geçemez."},{"k":2,"n":59,"s":"Patoloji","q":"Hiperplazi örneği olmayan durum hangisidir?","o":{"A":"Gebelikte uterus büyümesi","B":"Karaciğer rejenerasyonu","C":"Endometrial proliferasyon","D":"Benign prostat hiperplazisi","E":"İskelet kası hipertrofisi"},"c":"E","e":"Hiperplazi = hücre SAYISININ artması. Karaciğer rejenerasyonu, endometrial proliferasyon ve BPH hücre çoğalmasıyla olur. İskelet kası ise bölünemediği için egzersizde hücre BÜYÜR (hipertrofi), sayısı artmaz; bu yüzden istisnadır. (Gebelikte uterus hem hiperplazi hem hipertrofi gösterir.)"},{"k":2,"n":60,"s":"Biyokimya","q":"Aşağıdakilerden hangisi antioksidan sistem enzimi değildir?","o":{"A":"Süperoksit dismutaz","B":"Glutatyon peroksidaz","C":"Katalaz","D":"Hidrojen peroksit","E":"Peroksidaz"},"c":"D","e":"Antioksidan enzimler: süperoksit dismutaz, katalaz, glutatyon peroksidaz ve peroksidaz. Hidrojen peroksit(H2O2) ise bir enzim değil, bizzat parçalanması gereken reaktif oksijen türevidir (substrat). Ayrım sorusu: “Enzim mi, hedef molekül mü?”"},{"k":3,"n":1,"s":"Protez","q":"Sabit protezlerde ölçü ve ölçü teknikleri ile ilgili aşağıdaki ifadelerden kaç tanesi yanlıştır? I. Yetersiz kanama kontrolü, ölçüde bitiş (batış) çizgisinin net görünmemesine sebep olur. II. Lokalize gingival büyümeler, ölçü üzerinde sertleşmeyen ölçü maddesinin kalmasına sebep olur. III. Sandviç tekniğiyle ölçü alınırken iki farklı yoğunluktaki ölçü maddesinin polimerizasyonu ağızda birlikte başlamalıdır. IV. Ölçü maddesinin karışmasından ağıza uygulanmasına kadar geçen süreye sertleşme zamanı denir. V. CAD/CAM ölçü tekniğinde ölçü, kamera (tarayıcı) cihazı yardımıyla alınır.","o":{"A":"1","B":"2","C":"3","D":"4","E":"5"},"c":"B","e":"Yanlış olanlar II ve IV → 2 tane. Sertleşmeyen ölçü maddesi kimyasal kontaminasyon kaynaklıdır, gingival büyümeyle ilgisi yoktur (II). Karışımdan ağza uygulamaya kadar geçen süre çalışma süresidir; sertleşme zamanı değil (IV).","note":"Şıklar orijinal fotoğrafta okunamadığından içerik analizine göre düzenlenmiştir."},{"k":3,"n":2,"s":"Protez","q":"Bir hastaya tek aşamalı yöntemle iki kez ölçü alınmış; her iki ölçüde de sertleşmeyen ölçü maddesi tespit edilmiştir. Bunu engellemek için 3. kez ölçü alırken ne yapılmalıdır?","o":{"A":"Alınan ölçü maddesini önce preparasyona uygulamak.","B":"Ölçü maddesini hızlı karıştırmak.","C":"Ölçü tekniğini doğru ve dikkatli uygulamak.","D":"Lateks eldivenle çalışmaktan kaçınmak (lateks içermeyen eldiven kullanmak).","E":"İki aşamalı ölçü yöntemine geçmek."},"c":"D","e":"İlave (addisyon) silikonlarda sertleşmeme çoğunlukla lateks eldivendeki kükürtün polimerizasyonu inhibe etmesinden olur. İki kez tekrarlayan problemde asıl çözüm lateks temasını kesmektir. Hatırlatıcı: “İlave silikon + lateks = sertleşmez.”","note":"D şıkkı orijinalde okunamadığından içerikten tamamlanmıştır."},{"k":3,"n":3,"s":"Protez","q":"Bir hastada ilave reaksiyonla sertleşen (addisyon silikon) ölçü alınırken yetersiz çalışma süresine bağlı sorun yaşanmıştır. Bunun sebebi aşağıdakilerden hangisi olamaz?","o":{"A":"Katalizörün fazla olması.","B":"Aşırı nem ve sıcak ortam.","C":"Karıştırma sırasında kükürtle (sülfür) temas.","D":"Addisyon silikonun, kondensasyon tipi silikonla karıştırılması.","E":"Ölçü maddesinin doğru oranda ve tekniğe uygun karıştırılması."},"c":"E","e":"A–D şıkları çalışma süresini bozan hata/kontaminasyon durumlarıdır. Doğru oranda ve tekniğe uygun karıştırmak ise hatasız uygulamadır; bir sorunun sebebi olamaz.","note":"E şıkkı orijinalde okunamadığından içerikten tamamlanmıştır."},{"k":3,"n":4,"s":"Protez","q":"Geçici restorasyonlarla ilgili aşağıdaki ifadelerin kaç tanesi yanlıştır? i. Anterior dişlerde tedavi süresince yapısal, estetik ve fonksiyon sağlar. ii. İdeal geçici restorasyonlar pulpayı koruyabilmelidir. iii. Geçici restorasyon yapımında oklüzal temaslar önemli değildir. iv. Geçici restorasyonun renk, şekil ve estetiği final restorasyon için hekime yol göstermez. v. Direkt yolla elde edilen geçiciler, indirekt yolla elde edilenlere göre daha iyi kenar uyumu sağlar.","o":{"A":"1","B":"2","C":"4","D":"5","E":"3"},"c":"E","e":"Yanlışlar iii, iv, v → 3 tane. Oklüzal temaslar önemlidir; geçici, finale yol gösterir; kenar uyumu ise indirekt teknikte daha iyidir."},{"k":3,"n":5,"s":"Protez","q":"Kişiye özel geçici restorasyonların yapımında, çok üniteli restorasyonlarda aşağıdaki geçici yapım maddelerinden hangisi tercih edilir?","o":{"A":"Polietilmetakrilat (PEMA)","B":"Polimetilmetakrilat (PMMA)","C":"Polivinilmetakrilat","D":"Polieter-eterketon (PEEK)","E":"Üretan dimetakrilat (UDMA)"},"c":"B","e":"Çok üniteli/uzun köprü geçicilerinde dayanıklılığı yüksek olan PMMA tercih edilir. PEMA → tek kron/kısa süreli; PEEK → CAD/CAM ve implant üstü geçiciler; UDMA → direkt, estetik bölge geçicileri."},{"k":3,"n":6,"s":"Protez","q":"Aşağıdakilerden hangisi indirekt teknikle yapılan sabit geçici restorasyonların, direkt teknikle yapılanlara göre avantajı olarak sayılmaz?","o":{"A":"Büzülme ve boyutsal değişimin kontrol altına alınmış olması.","B":"Hasta başında tek seansta, laboratuvar aşaması gerektirmeden hızlıca tamamlanması.","C":"Polimerizasyon ağız dışında olduğundan yumuşak doku ve diş dokusunun ısı/kimyasal etkiye maruz kalmaması.","D":"Daha iyi marjinal uyum ve yüzey kalitesi elde edilebilmesi.","E":"Kanat (pontik) uygulamasının daha rahat olması."},"c":"B","e":"Tek seansta, hasta başında hız → direkt tekniğin avantajıdır. İndirekt teknik laboratuvar aşaması gerektirir; bu yüzden bu madde indirektin avantajı değildir.","note":"B şıkkı orijinalde okunamadığından içerikten tamamlanmıştır."},{"k":3,"n":7,"s":"Protez","q":"Aşağıdaki ifadelerden kaç tanesi yanlıştır? i. Metal-porselen restorasyonlarda metal kalınlığı en az 0.3 mm olmalıdır. ii. Dişetinden metal yansıması, metal-porselen restorasyonların dezavantajlarından biridir. iii. Subgingival restorasyonlarda ölçü alımı, supragingivalden daha zordur. iv. Bizotajlı shoulder basamakta açı 90°dir ve genişlik, iç açının yuvarlatılması nedeniyle biraz daralmıştır. v. Rounded shoulder basamakta gerilim yoğunlaşması klasik basamağa göre daha azdır ve seramik desteği iyidir.","o":{"A":"3","B":"4","C":"2","D":"1","E":"5"},"c":"D","e":"Yalnızca iv yanlış → 1 tane. iv’teki tarif (90° + iç açı yuvarlatması kaynaklı daralma) bizotajlı değil, yuvarlatılmış (rounded) shoulder’a aittir; diğer ifadeler doğrudur."},{"k":3,"n":8,"s":"Protez","q":"Metal-porselen bir restorasyonda metal döküm işlemi sonrası kron dış yüzeyinde hava kabarcığı (nodül) tespit edilmiştir. Bunun sebebi aşağıdakilerden hangisidir?","o":{"A":"Revetmana alma esnasındaki aşırı vibrasyon.","B":"Revetmana alma esnasındaki yetersiz vibrasyon.","C":"Revetmanın aşırı ısınması.","D":"Mum modelin yüzey gerilimini azaltan ıslatıcı (wetting) ajan kullanılması.","E":"Döküm sıcaklığının çok yüksek olması."},"c":"A","e":"Revetmana alma sırasındaki aşırı/uzun süren vibrasyon, revetman karışımında partikül-su ayrışmasına ve mum model çevresinde hava hapsolmasına yol açar → döküm yüzeyinde nodül/kabarcık. Hatırlatıcı: 'Hava kabarcığı (nodül) = aşırı vibrasyon.'","note":"A, D ve E şıkları orijinalde okunamadığından çeldirici olarak düzenlenmiştir."},{"k":3,"n":9,"s":"Protez","q":"Metal döküm işleminde kullanılan revetman materyalinin özellikleri ile ilgili aşağıdakilerden hangisi yanlıştır?","o":{"A":"Zirkonyum destekli porselen restorasyonların dökümünde fosfat bağlı revetman kullanılır.","B":"Fosfat bağlı revetmanlar, yüksek ısı gerektiren metal-seramik dökümlerinde kullanılır.","C":"Revetmanın termal genleşmesi, dökülecek alaşımın büzülmesini telafi edecek şekilde ayarlanır.","D":"Alçı bağlı revetmanlar, düşük ısılı altın alaşımlarının dökümünde kullanılır.","E":"Revetman, döküm sırasında oluşan ısı ve basınca dayanıklı olmalıdır."},"c":"A","e":"Zirkonya CAD/CAM ile frezelenir, metal gibi dökülmez. Dolayısıyla “zirkonya dökümünde revetman” ifadesi baştan yanlıştır. Hatırlatıcı: “Zirkonya kazınır, dökülmez.”","note":"B–E şıkları orijinalde okunamadığından çeldirici olarak düzenlenmiştir."},{"k":3,"n":10,"s":"Protez","q":"Aşağıdakilerden hangisi artikülatörlerin kısıtlamalarından biri değildir?","o":{"A":"Doğal dokulardaki hassasiyet (propriosepsiyon) artikülatörlerde yoktur.","B":"Alt çenenin sınır hareketlerini tam olarak taklit edemeyebilirler.","C":"Sentrik ilişki ve statik çene konumlarını doğru biçimde aktarabilirler.","D":"Alt çene hareketlerini fonksiyon sırasında tam taklit edemezler.","E":"Metal bünyesinde yıpranma, aşınma ve metal yorgunluğu görülebilir."},"c":"C","e":"A, B, D, E hep kısıtlamadır. Statik kayıtları doğru aktarabilmek ise bir kısıtlama değil, artikülatörün yeteneğidir → doğru cevap.","note":"C şıkkı orijinalde okunamadığından içerikten tamamlanmıştır."},{"k":3,"n":11,"s":"Protez","q":"Oklüzyon ve oklüzyon esasları ile ilgili aşağıdaki ifadelerden kaç tanesi yanlıştır? I. Hareketli tam protezlerde en ideal oklüzyon, bilateral balanslı oklüzyondur. II. İnterkuspal pozisyon ve sentrik ilişki, tedavi edici oklüzyonda referans pozisyonlar olarak kabul edilir. III. Sentrik ilişki, hekimin bilinen bir başlangıç noktasından tedaviye başlamasına ve sonucu o noktaya göre değerlendirmesine izin verir. IV. Menteşe ekseninin klinik önemi, hasta kapanışını vertikal eksenin artikülatöre transfer etmesidir. V. Menteşe ekseni üst çeneye göre sabit, ancak kondillerin rotasyonuyla hareket eden hayali bir eksendir.","o":{"A":"4","B":"1","C":"2","D":"3","E":"5"},"c":"C","e":"Yanlışlar IV ve V → 2 tane. Menteşe ekseni terminal (yatay) rotasyon eksenidir, vertikal değil (IV). Eksen sabittir, hareket etmez; mandibula onun etrafında döner (V)."},{"k":3,"n":12,"s":"Protez","q":"Day modeli ve day modeli için kullanılan materyallerle ilgili aşağıdaki ifadelerin kaç tanesi yanlıştır? i. Elektroliz yoluyla elde edilen bakır ve gümüş, day yapımında kullanılan materyallerden biridir. ii. Day yapımında kullanılan materyaller rijit ve kaygan bir yüzey oluşturmalıdır. iii. Die materyali olarak en çok Tip 2 ve Tip 3 alçı tercih edilir. iv. Die, modelden çıkarıldığında tekrar eski konumuna dönmemelidir. v. Modeldeki day'lar tırnaklanmamalıdır.","o":{"A":"4","B":"1","C":"2","D":"3","E":"5"},"c":"D","e":"Yanlışlar iii, iv, v → 3 tane. Die için Tip 4/Tip 5 sert alçılar kullanılır (iii); die tekrar yerine oturabilmelidir (iv); day'lar tırnaklanır — pin/dowel sistemi sık kullanılır (v)."},{"k":3,"n":13,"s":"Protez","q":"Düz (sökmeli-pin) yöntemiyle day'lı (die'lı) model elde etmek için aşağıdaki işlemlerden hangisi yapılmaz?","o":{"A":"Day çivileri dişin aksına ve birbirine paralel yerleştirilir.","B":"Day çivileri, model ölçüsüne saç teli veya tırnak gibi yardımcı tutucularla sabitlenir.","C":"Day çivileri birbirine paralel olmadan, çapraz/açılı şekilde yerleştirilir.","D":"Day çivisi etrafındaki restorasyon yuvaları netleştirilir.","E":"Çalışma modeli elde edildikten sonra day çivileri yapıştırıcı kullanılmadan modele oturur."},"c":"C","e":"Day çivileri dişin aksına ve birbirine paralel olmalıdır (A). Açılı/çapraz yerleştirme, day'ın temiz çıkıp tekrar yerine oturmasını engeller → bu yüzden yapılmaz.","note":"C şıkkı orijinalde okunamadığından içerikten tamamlanmıştır."},{"k":3,"n":14,"s":"Protez","q":"aşağıdaki ifadelerden kaç tanesi yanlıştır? i. Aksiyel konturlar tamamlandıktan sonra oklüzal modelaja geçilir. ii. Sentrik kapanışta maksiller posterior dişlerin palatinal cuspları ve mandibuler posterior dişlerin bukkal cuspları, karşıt dişin marjinal sırtı veya oklüzal fossası ile ilişkilidir. iii. Fonksiyon sırasında maksiller molarların palatinal, mandibuler molarların bukkal cuspları, karşıt dişle temas etmeyecek şekilde hazırlanmalıdır. iv. Cusp-marjinal sırt ilişkisi doğal dişlerde nadiren görülür. v. Cusp-fossa ilişkisinde oklüzal kuvvetler dişin uzun aksına paralel gelir ve dişte çok az lateral stres oluşur.","o":{"A":"2","B":"1","C":"4","D":"3","E":"5"},"c":"A","e":"Yanlışlar iii ve iv → 2 tane. Bunlar fonksiyonel cusp’lardır (üst palatinal, alt bukkal) ve temas etmelidir (iii). Cusp-marjinal sırt ilişkisi doğal dişlerde sık görülür (iv)."},{"k":3,"n":15,"s":"Protez","q":"Preparasyon ilkeleri ile ilgili aşağıdaki ifadelerden kaç tanesi yanlıştır? I. (İfade orijinal fotoğrafta okunamadı.) II. Dişin anatomik yapısına uygun yapılan preparasyonlarda daha çok yüzey kazanılır. III. Aksiyel duvarların preparasyonu, diş yapısının maksimum kalınlığını koruyacak şekilde hazırlanmalıdır. IV. Eski protezlerin altındaki çürüklerin lokalizasyonu, yeni protezin marjinal preparasyonunu etkilemez. V. Preparasyon boyu; krona gelen kuvvetin karşı marjindeki bir nokta etrafında oluşturduğu horizontal hareketi engelleyecek uzunlukta olmalıdır.","o":{"A":"3","B":"1","C":"2","D":"4","E":"5"},"c":"C","e":"IV yanlıştır (çürük lokalizasyonu marjin tasarımını etkiler). Okunamayan I ifade de yanlış olduğundan → toplam 2 yanlış ifade.","note":"I. ifade orijinalde okunamadı; doğru cevaba göre o ifade de yanlış kabul edilmiştir."},{"k":3,"n":16,"s":"Protez","q":"Alt 1. büyük azı dişine tam kron endikasyonu konulan bir hastada, preparasyon sırasında komşu 2. büyük azı dişinin mine yüzeyinin zedelenmesini (iyatrojenik hasar) en aza indirmek için aşağıdaki önlemlerden hangisi alınmalıdır?","o":{"A":"Komşu diş ile prepare edilen diş arasına metal matriks bandı yerleştirmek.","B":"Frez devrini mümkün olan en yüksek değere çıkarmak.","C":"Su soğutmasını kapatıp kuru çalışmak.","D":"İnterproksimal redüksiyonu en kalın çaplı frezle yapmak.","E":"Komşu dişi de aşındırarak alan açmak."},"c":"A","e":"İnterproksimal aşındırmada komşu dişin minesini frezden korumanın en pratik yolu araya metal matriks bandı koymaktır. Hatırlatıcı: “Komşu dişin kalkanı = matriks bandı.”","note":"Şıklar orijinalde okunamadığından, işaretli doğru cevap (matriks bandı) korunarak çeldiriciler düzenlenmiştir."},{"k":3,"n":17,"s":"Protez","q":"'Anatomik kron' ve 'klinik kron' ifadeleri ile ilgili aşağıdakilerden hangisi doğrudur?","o":{"A":"Anatomik ve klinik kron boyları her zaman eşittir.","B":"Anatomik kron boyu her zaman klinik kron boyundan daha uzundur.","C":"Klinik kron boyu, anatomik kron boyundan her zaman daha uzundur.","D":"Sabit protez restorasyonunda her zaman anatomik kron boyu dikkate alınmalıdır.","E":"Çürük ve diş eti çekilmesi gibi faktörler klinik kron boyunu etkilediğinden, klinik kron boyu anatomik krondan kısa veya uzun olabilir."},"c":"E","e":"Anatomik kron = mineyle kaplı kısım (sabit); klinik kron = ağızda görünen kısım (değişken). Çekilme klinik kronu uzatır, çürük/aşınma kısaltır → tek doğru ifade E."},{"k":3,"n":18,"s":"Protez","q":"Az taperli bir kronun oklüzal yüzeyinde mesial-distal ve servikal bölgede yaklaşık 1 mm derinliğinde rehber olukları açılması, aşağıdaki durumlardan hangisi için rehberlik sağlar?","o":{"A":"Preparasyon kalınlığı","B":"Proksimal redüksiyon","C":"Restorasyon kalınlığı","D":"Oklüzal redüksiyon","E":"Fonksiyonel cusp bizotajı"},"c":"D","e":"Oklüzal yüzeye açılan ~1 mm’lik rehber oluklar, fazla/yetersiz aşındırmayı önleyerek oklüzal redüksiyon miktarını kontrol eder. Hatırlatıcı: “Rehber oluk = doğru derinlik rehberi.”"},{"k":3,"n":19,"s":"Protez","q":"/40 (a). Rezistans/retansiyon formu ile ilgili aşağıdaki ifadelerden hangisi yanlıştır?","o":{"A":"Yetersiz oklüzal boşlukta ince kalan restorasyon kırılma/strese maruz kalır.","B":"Kısa klinik boya sahip küçük çaplı bir diş, aynı boya sahip geniş çaplı preparasyonlu dişten daha rezistanstır.","C":"Diş yapısının korunması, her yönden gereğinden fazla madde kaldırmamayı amaçlar.","D":"Yapısal dayanıklılık, restorasyonu oklüzal kuvvetlere karşı korur.","E":"Preparasyonun taper (koniklik) açısı arttıkça retansiyon ve rezistans da artar."},"c":"E","e":"Tam tersi: taper azaldıkça (duvarlar paralelleştikçe) retansiyon/rezistans artar; aşırı koniklik tutuculuğu azaltır. Ayrıca küçük çaplı dişte dönme yarıçapı küçüldüğü için direnç artar (B doğru).","note":"E şıkkı orijinalde okunamadığından içerikten tamamlanmıştır."},{"k":3,"n":20,"s":"Protez","q":"rehabilitasyonunda uygulanacak protez tipinin belirlenmesinde aşağıdaki faktörlerden kaç tanesi dikkate alınmaz? I. Biyomekanik faktörler II. Tedavi maliyeti III. Hasta istekleri ve beklentileri IV. Periodontal faktörler V. Restoratif faktörler VI. Hastanın yaşı","o":{"A":"2","B":"3","C":"4","D":"1","E":"Hepsi dikkate alınmalıdır"},"c":"E","e":"Protez tipi seçiminde biyomekanik, maliyet, hasta beklentisi, periodontal ve restoratif faktörler ile hastanın yaşı — bunların hepsi değerlendirmeye katılır; dışlanan faktör yoktur.","note":"Orijinal fotoğrafta highlight belirsizdi (A şıkkı üzerindeydi ama içindeki sayı okunamadı); içerik gereği doğru"},{"k":3,"n":21,"s":"Protez","q":"Diş şemasında 14 ve 16 numaralı dişler eksiktir (13, 15, 17 mevcut). En uygun sabit protez planı hangisidir?","o":{"A":"15 pier abutment, 14-16 cantilever, 17 kron.","B":"13 ve 15 normal abutment (13-14-15 köprü) ve 17'ye (16 kanat) cantilever.","C":"13 ve 17 terminal abutment, 15 pier (ara) abutment; non-rigid connector ile plan.","D":"13, 15, 17 normal abutment ile tek parça (rijit) sabit köprü.","E":"15 ve 17 normal abutment ile sınırlı plan."},"c":"C","e":"İki boşluk arasında kalan 15, pier (ara) abutment’tır. Tek parça rijit köprüde ara dayanak fulcrum (dayanak noktası) yapıp stres bindirir; çözüm non-rigid connector ile stresi kırmaktır. Hatırlatıcı: “Pier abutment → non-rigid connector.”"},{"k":3,"n":22,"s":"Protez","q":"Kökü rezeke edilen diş, maksiller molar gibi geniş bir pulpa odasına sahipse ve dişin koronal kısmında çürük gibi yapısal hasar yoksa aşağıdaki işlemlerden hangisi uygulanır?","o":{"A":"Pulpa odasının retansiyon kaynağı olarak kullanıldığı endokron tipi restorasyon yapılır.","B":"Preparasyonun bütün çürük çizgisi pulpa odası boyunca apikale uzatılmalıdır.","C":"Kalan diş yapısının yalnızca onlay ile tamamlanması.","D":"Dişin tamamen çekilmesi ve implant planlanması.","E":"Hiçbiri."},"c":"A","e":"Geniş pulpa odası + sağlam koronal yapı → post gerektirmeden, retansiyonu pulpa odasından alan endokron idealdir. Hatırlatıcı: “Geniş oda = endokron yuvası.”","note":"A şıkkı orijinalde okunamadığından içerikten tamamlanmıştır."},{"k":3,"n":23,"s":"Protez","q":"Sabit protezlerde kron-köprü restorasyonlarının sökümü ile ilgili aşağıdaki ifadelerden hangisi yanlıştır?","o":{"A":"Özellikle anterior bölgede materyalde renk değişimi varsa estetik nedenle eski kronlar sökülebilir.","B":"Kron-köprü sökümü tamamen travmasız bir işlemdir; dişte ve destek dokuda hasar riski yoktur.","C":"Yeniden yapım planlandığında restorasyonun frezlenerek çıkarılması hasta açısından daha az travma yaratır.","D":"Kron altındaki dokuda apikal lezyon/periodontal sorun varlığında kronların sökülmesi gerekir.","E":"Periodontal problemli mobil dişlerde kronu keserek çıkarmak tercih edilir."},"c":"B","e":"Her söküm bir miktar travma riski taşır; teknik seçimi (kesme/frezleme) bu riski azaltmaya yöneliktir, sıfırlamaya değil. Bu yüzden “tamamen travmasız” ifadesi yanlıştır.","note":"B şıkkı orijinalde okunamadığından içerikten tamamlanmıştır."},{"k":3,"n":24,"s":"Protez","q":"Diş hekimliğinde kullanılan alçı ile ilgili aşağıdaki ifadelerden hangisi yanlıştır?","o":{"A":"Tip III alçı, sabit protez çalışma modeli için en uygun (ideal) alçı tipidir.","B":"Tip IV alçısının genleşme oranı Tip II'den azdır.","C":"Tip I en yumuşak alçıdır.","D":"Tip II'nin genleşmesi Tip III'ten fazladır.","E":"Tip IV'ün setting (sertleşme) süresi Tip II'den yavaştır."},"c":"A","e":"Sabit protez çalışma modeli için standart, çok sert ve düşük genleşmeli Tip IV’tür. Tip III (sert taş alçı) daha çok total protez modellerinde kullanılır → ifade yanlıştır.","note":"A şıkkı orijinalde soluk olduğundan içerikten tamamlanmıştır."},{"k":4,"n":1,"s":"Anatomi (teorik)","q":"1 Aşağıdaki venlerden hangisi v. jugularis interna'ya drene OLMAZ?","o":{"A":"V. thyroidea superior","B":"V. thyroidea media","C":"V. facialis","D":"V. lingualis","E":"V. vertebralis"},"c":"E","e":"V. vertebralis, v. brachiocephalica'ya açılır. Diğerlerinin tamamı (v. thyroidea superior, media; v. facialis; v. lingualis) v. jugularis interna'ya drene olur."},{"k":4,"n":2,"s":"Anatomi (teorik)","q":"Conchae nasales (alt / orta / üst konkalar) burun boşluğunun hangi duvarına tutunur?","o":{"A":"İç (medial / septum) duvar","B":"Dış (lateral) duvar","C":"Üst (tavan)","D":"Alt (taban)","E":"Arka duvar"},"c":"B","e":"Konkalar burun boşluğunun lateral (dış) duvarından çıkıntı yapar; her konkanın altında bir meatus bulunur."},{"k":4,"n":3,"s":"Anatomi (teorik)","q":"Aşağıdaki larinks kaslarından hangisi rima glottidis'i (ses telleri aralığını) DARALTIR?","o":{"A":"m. cricoarytenoideus posterior","B":"m. cricoarytenoideus lateralis","C":"m. cricothyroideus","D":"m. thyrohyoideus","E":"m. sternothyroideus"},"c":"B","e":"m. cricoarytenoideus lateralis aralığı daraltan (adduktör) kastır. m. cricoarytenoideus posterior ise aralığı genişleten tek kastır (tek abduktör)."},{"k":4,"n":4,"s":"Anatomi (teorik)","q":"Aort kapağı oskültasyonu (dinleme) en iyi nerede yapılır?","o":{"A":"Sağ 2. interkostal aralık (parasternal)","B":"Sol 2. interkostal aralık","C":"Sol 5. interkostal aralık, midklaviküler hat","D":"Sol alt sternal kenar","E":"Ksifoid altı"},"c":"A","e":"Aort odağı sağ 2. interkostal aralık (parasternal) hizasındadır. Pulmoner: sol 2. İKA; triküspit: sol alt sternal kenar; mitral (apeks): sol 5. İKA midklaviküler hat."},{"k":4,"n":5,"s":"Anatomi (teorik)","q":"Aşağıdakilerden hangisi etmoidal (ethmoidal) sinüzitin komşuluk yoluyla etkileyebileceği yapılardan DEĞİLDİR?","o":{"A":"A. carotis externa","B":"Sinus cavernosus","C":"N. opticus","D":"Orbita (göz)","E":"Hipofiz bezi"},"c":"A","e":"carotis externa boyun ve yüzde seyreder; etmoid hücrelerle komşu değildir. Etmoid hücreler ince lamina papyracea üzerinden orbita ile, arka hücreler ise n. opticus ve sinus cavernosus bölgesi ile komşudur. NOT Hipofiz aslında sfenoid sinüse komşudur; arka etmoid–sfenoid bölgesine yakınlığı iyle seçenekte \"etkilenebilir\" grupta sayılmıştır. En net \"etkilenmez\" yanıt A'dır."},{"k":4,"n":6,"s":"Anatomi (teorik)","q":"Aşağıdakilerden hangisi kalbin SAĞ VENTRİKÜLÜNDE bulunmaz?","o":{"A":"Trabecula carneae","B":"Papiller kaslar","C":"Chordae tendineae","D":"Crista terminalis","E":"Septum interventriculare"},"c":"D","e":"Crista terminalis sağ ATRİUMdadır. Sağ ventrikülde trabecula carneae, papiller kaslar, chordae tendineae ve trabecula septomarginalis (moderator band) bulunur."},{"k":4,"n":7,"s":"Anatomi (teorik)","q":"Aşağıdakilerden hangisi meatus nasi medius'a (orta meatus) drene olur?","o":{"A":"Ductus nasolacrimalis","B":"Sinus sphenoidalis","C":"Cellula ethmoidalis posterior","D":"Glandula lacrimalis","E":"Cellula ethmoidalis medius"},"c":"E","e":"Orta meatusa frontal sinüs, maksiller sinüs ve ön + orta etmoid hücreler açılır. Nazolakrimal kanal → alt meatus; sfenoid → recessus sphenoethmoidalis; arka etmoid → üst meatus."},{"k":4,"n":8,"s":"Anatomi (teorik)","q":"Aşağıdaki arterlerden hangisi Kiesselbach pleksusuna (Little bölgesi) KATILMAZ?","o":{"A":"A. sphenopalatina","B":"A. palatina major","C":"A. labialis superior","D":"A. ethmoidalis anterior","E":"A. dorsalis nasi"},"c":"E","e":"Kiesselbach pleksusu a. sphenopalatina, a. palatina major, a. labialis superior ve a. ethmoidalis anterior anastomozudur. A. dorsalis nasi burun sırtını besler; septumun ön- alt bölümüne katılmaz."},{"k":4,"n":9,"s":"Anatomi (teorik)","q":"Trakeanın anatomik başlangıç ve bitiş (bifurkasyon) seviyeleri nedir?","o":{"A":"C4 – T2","B":"C6 – T4","C":"C6 – T6","D":"C3 – T5","E":"T1 – T6"},"c":"B","e":"Trakea C6 (krikoid kıkırdak alt kenarı) düzeyinde başlar; T4/T5 (angulus sterni, carina) düzeyinde sağ ve sol ana bronşa ayrılır."},{"k":4,"n":10,"s":"Anatomi (teorik)","q":"Aşağıdaki venlerden hangisi v. azygos sistemine BAĞLANMAZ?","o":{"A":"V. intercostalis posterior dextra","B":"Vv. intercostales posteriores","C":"V. hemiazygos accessoria","D":"V. hemiazygos","E":"V. vertebralis"},"c":"E","e":"V. vertebralis v. brachiocephalica'ya açılır. Azygos sistemine sağ arka interkostal venler, v. hemiazygos ve v. hemiazygos accessoria bağlanır."},{"k":4,"n":11,"s":"Anatomi (teorik)","q":"PA akciğer grafisinde kalp silüetinde, kalbin SAĞ kenarının alt bölümünü oluşturan yapı hangisidir?","o":{"A":"Sağ atrium","B":"Sağ ventrikül","C":"V. cava superior","D":"Sol ventrikül","E":"Arcus aorta"},"c":"A","e":"Sağ kalp kenarını üstte v. cava superior, altta sağ atrium oluşturur."},{"k":4,"n":12,"s":"Anatomi (teorik)","q":"PA akciğer grafisinde kalp gölgesinin SOL kenarında, truncus pulmonalis ile sol ventrikül arasında yer alan küçük çıkıntı hangisidir?","o":{"A":"Sol auricula","B":"Sol atrium gövdesi","C":"Arcus aorta","D":"Truncus pulmonalis","E":"Sağ ventrikül"},"c":"A","e":"Sol kenarı yukarıdan aşağıya arcus aorta, truncus pulmonalis, sol auricula ve sol ventrikül oluşturur."},{"k":4,"n":13,"s":"Anatomi (teorik)","q":"Meme (mamma) venleri esas olarak hangi vene drene olur?","o":{"A":"V. axillaris","B":"V. subclavia","C":"V. cephalica","D":"V. jugularis interna","E":"V. portae"},"c":"A","e":"Meme venöz drenajının büyük kısmı v. axillaris'edir (ayrıca v. thoracica interna ve interkostal venler). Lenfatik drenajın çoğu da aksiller nodlaradır."},{"k":4,"n":14,"s":"Anatomi (teorik)","q":"Mide başta olmak üzere abdominal malignitelerde metastaz sonucu büyüyen sol supraklaviküler lenf nodu hangisidir?","o":{"A":"Virchow nodu (sol supraklaviküler)","B":"Sentinel nod","C":"Aksiller nod","D":"Submandibular nod","E":"İnguinal nod"},"c":"A","e":"Sol supraklaviküler nod büyümesi (Virchow nodu / Troisier işareti), ductus thoracicus yoluyla yayılan GİS malignitelerinin klasik bulgusudur."},{"k":4,"n":15,"s":"Anatomi (teorik)","q":"R. interventricularis anterior (LAD) hangi arterin dalıdır?","o":{"A":"A. coronaria sinistra","B":"A. coronaria dextra","C":"A. subclavia","D":"Aorta abdominalis","E":"A. thoracica interna"},"c":"A","e":"LAD (r. interventricularis anterior), sol koroner arterin (a. coronaria sinistra) ana dalıdır; diğer dalı r. circumflexus'tur."},{"k":4,"n":16,"s":"Anatomi (teorik)","q":"Aşağıdakilerden hangisi A. thoracica interna'nın (a. mammaria interna) dalı DEĞİLDİR?","o":{"A":"A. pericardiacophrenica","B":"Aa. intercostales anteriores","C":"A. musculophrenica","D":"A. epigastrica superior","E":"A. phrenica inferior"},"c":"E","e":"A. phrenica inferior abdominal aortadan çıkar. A. thoracica interna dalları: a. pericardiacophrenica, ön interkostal arterler, a. musculophrenica ve a. epigastrica superior."},{"k":4,"n":17,"s":"Anatomi (teorik)","q":"Aşağıdaki arterlerden hangisi A. maxillaris'in dalıdır?","o":{"A":"A. alveolaris inferior","B":"A. facialis","C":"A. lingualis","D":"A. occipitalis","E":"A. thyroidea superior"},"c":"A","e":"alveolaris inferior, a. maxillaris'in dalıdır (alt çeneyi ve alt dişleri besler). Diğerleri doğrudan a. carotis externa'nın dallarıdır."},{"k":4,"n":18,"s":"Anatomi (teorik)","q":"A. carotis externa, parotis bezi içinde hangi iki UÇ (terminal) dalına ayrılır?","o":{"A":"A. maxillaris ve A. temporalis superficialis","B":"A. facialis ve A. lingualis","C":"A. occipitalis ve A. auricularis posterior","D":"A. thyroidea superior ve A. pharyngea ascendens","E":"A. ophthalmica ve A. maxillaris"},"c":"A","e":"carotis externa parotis bezi içinde a. maxillaris ve a. temporalis superficialis olarak iki terminal dala ayrılır."},{"k":4,"n":19,"s":"Anatomi (teorik)","q":"A. cervicalis profunda hangi yapının dalıdır?","o":{"A":"Truncus costocervicalis","B":"Truncus thyrocervicalis","C":"A. subclavia (doğrudan)","D":"A. vertebralis","E":"A. thoracica interna"},"c":"A","e":"cervicalis profunda, a. subclavia'dan çıkan truncus costocervicalis'in dalıdır (diğer dalı a. intercostalis suprema)."},{"k":4,"n":20,"s":"Anatomi (teorik)","q":"A. infraorbitalis hangi arterin dalıdır?","o":{"A":"A. maxillaris","B":"A. facialis","C":"A. ophthalmica","D":"A. temporalis superficialis","E":"A. carotis interna"},"c":"A","e":"infraorbitalis, a. maxillaris'in dalıdır; canalis infraorbitalis yoluyla yüze çıkar."},{"k":4,"n":21,"s":"Anatomi (teorik)","q":"TME (temporomandibular eklem) cerrahisinde tragusun hemen önünden girilirken hangi artere dikkat edilmelidir?","o":{"A":"A. temporalis superficialis","B":"A. maxillaris","C":"A. facialis","D":"A. occipitalis","E":"A. carotis interna"},"c":"A","e":"temporalis superficialis tragusun hemen önünden yukarı çıkar; preauriküler kesilerde yaralanma riski taşır."},{"k":4,"n":22,"s":"Anatomi (teorik)","q":"Aşağıdaki venlerden hangisi m. sternocleidomastoideus'un (SCM) YÜZEYİNDE seyreder?","o":{"A":"V. jugularis externa","B":"V. jugularis interna","C":"V. subclavia","D":"V. brachiocephalica","E":"V. jugularis anterior"},"c":"A","e":"V. jugularis externa SCM yüzeyinde (yüzeyel fasya içinde) seyreder. V. jugularis interna ise karotis kılıfı içinde, derindedir."},{"k":4,"n":23,"s":"Anatomi (teorik)","q":"Fibröz perikardiyumu (ve parietal seröz perikardı) innerve eden sinir hangisidir?","o":{"A":"N. phrenicus","B":"N. vagus","C":"Truncus sympathicus","D":"N. intercostalis","E":"N. laryngeus recurrens"},"c":"A","e":"Fibröz perikard ve parietal perikardın duyusal innervasyonu n. phrenicus (C3– C5) tarafından sağlanır."},{"k":4,"n":24,"s":"Anatomi (teorik)","q":"Derlemeye göre en sık görülen kalp kapak hastalığı hangi kapakta görülür?","o":{"A":"Mitral kapak","B":"Aort kapağı","C":"Triküspit kapak","D":"Pulmoner kapak","E":"Mitral + pulmoner"},"c":"A","e":"Derlemedeki cevaba göre en sık etkilenen kapak mitral kapaktır (özellikle romatizmal kalp hastalığında). NOT Bu yanıt kaynağa ve popülasyona bağlıdır: gelişmiş ülkelerde ve ileri yaşta en sık kapak hastalığı dejeneratif aort darlığıdır. Sınavda kaynak metindeki yanıt (mitral) esas alınır."},{"k":4,"n":25,"s":"Anatomi (teorik)","q":"Akciğerler ile ilgili aşağıdaki ifadelerden hangisi YANLIŞTIR?","o":{"A":"Akciğer hilumu sternokostal (ön) yüze bakar","B":"Hilum mediastinal yüzde bulunur","C":"Sağ akciğer 3 lobludur","D":"Sol akciğerde lingula bulunur","E":"Kardiyak çentik sol akciğerdedir"},"c":"A","e":"Akciğer hilumu MEDİASTİNAL (iç) yüze bakar, sternokostal yüze değil. Diğer ifadeler doğrudur."},{"k":4,"n":26,"s":"Fizyoloji","q":"Atriyumların gerilmesi (kasılması) sırasında aşağıdakilerden hangisi MEYDANA GELMEZ?","o":{"A":"ANP artışı","B":"Bainbridge refleksiyle kalp hızının artması","C":"ADH (vazopressin) artışı","D":"Böbreklerden Na+ ve su atılımının artması","E":"Glomerüler filtrasyonun artması"},"c":"C","e":"Atriyal gerilme ANP'yi artırır; ANP Na+/su atılımını ve GFR'yi artırır, ADH'yı ise BASKILAR (azaltır). Ayrıca Bainbridge refleksiyle kalp hızı artar."},{"k":4,"n":27,"s":"Fizyoloji","q":"Aşağıdaki EKG derivasyonlarından hangisi UNİPOLARDIR?","o":{"A":"DI (Lead I)","B":"DII (Lead II)","C":"DIII (Lead III)","D":"aVR","E":"Hepsi bipolardır"},"c":"D","e":"Augmente ekstremite derivasyonları (aVR, aVL, aVF) ve göğüs derivasyonları (V1–V6) unipolardır. DI, DII, DIII bipolardır."},{"k":4,"n":28,"s":"Fizyoloji","q":"Elektroretinogramda (ERG) \"a dalgasını\" hangi hücre tipi oluşturur?","o":{"A":"Fotoreseptörler (rod ve koni)","B":"Bipolar hücreler","C":"Müller hücreleri","D":"Ganglion hücreleri","E":"Amakrin hücreler"},"c":"A","e":"ERG'de a dalgası fotoreseptörlerin (rod ve koni) yanıtını; b dalgası bipolar ve Müller hücrelerinin yanıtını yansıtır."},{"k":4,"n":29,"s":"Fizyoloji","q":"Kalbin ürettiği temel hormon hangisidir?","o":{"A":"ANP (Atriyal Natriüretik Peptid)","B":"Aldosteron","C":"Renin","D":"ADH (vazopressin)","E":"Eritropoietin"},"c":"A","e":"Atriyal kardiyomiyositler gerildiğinde ANP salgılar; bu hormon Na+ ve su atılımını artırarak kan hacmini ve basıncını düşürür."},{"k":4,"n":30,"s":"Fizyoloji","q":"Kalbin BİRİNCİL (primer) pacemaker'ı (kalp pili) hangisidir?","o":{"A":"SA (sinoatriyal) düğüm","B":"AV (atrioventriküler) düğüm","C":"His demeti","D":"Purkinje lifleri","E":"Bachmann demeti"},"c":"A","e":"SA düğüm en yüksek otomatisiteye sahiptir (~60–100/dk). AV düğüm 40–60/dk, His-Purkinje 20–40/dk hız üretir."},{"k":4,"n":31,"s":"Fizyoloji","q":"Atrioventriküler kapaklar kapandıktan hemen sonra başlayan ventriküler evre hangisidir?","o":{"A":"İzovolümetrik kontraksiyon","B":"Ejeksiyon","C":"İzovolümetrik relaksasyon","D":"Hızlı ventriküler doluş","E":"Atriyal sistol"},"c":"A","e":"AV kapaklar kapanır, semilunar kapaklar henüz açılmamıştır; hacim sabitken basınç hızla artar (izovolümetrik kontraksiyon)."},{"k":4,"n":32,"s":"Fizyoloji","q":"Aşağıdaki yapılardan hangisi SİNİRSEL innervasyon ALMAZ?","o":{"A":"Arter","B":"Arteriyol","C":"Venül","D":"Prekapiller sfinkter","E":"Ven"},"c":"D","e":"Prekapiller sfinkter, sinirsel kontrol yerine lokal metabolik faktörlerle (O2, CO2, pH) düzenlenir; diğer damarlar sempatik innervasyon alır."},{"k":4,"n":33,"s":"Fizyoloji","q":"Dolaşım sisteminde TOPLAM kesit alanı en fazla olan damar tipi hangisidir?","o":{"A":"Kapillerler","B":"Aort","C":"Arterioller","D":"Venüller","E":"Vena cava"},"c":"A","e":"Kapillerlerin toplam kesit alanı en büyüktür; bu nedenle kan akış hızı burada en düşüktür (madde alışverişi için ideal)."},{"k":4,"n":34,"s":"Fizyoloji","q":"Sinoatriyal (SA) nod hücresinde aksiyon potansiyelinin oluşmasında görevli iyonlar hangileridir?","o":{"A":"Na+, K+","B":"Ca2+, Na+","C":"Ca2+, K+","D":"Na+, Ca2+, K+","E":"Na+, Cl−, K+"},"c":"D","e":"SA nod AP'sinde \"funny\" Na+ akımı (faz 4), Ca2+ girişi (depolarizasyon, faz 0) ve K+ çıkışı (repolarizasyon) rol oynar."},{"k":4,"n":35,"s":"Fizyoloji","q":"Sağlıklı bir bireyde ejeksiyon fraksiyonunun (EF) normal değeri yaklaşık kaçtır?","o":{"A":"%20–30","B":"%30–40","C":"%40–55","D":"%55–70","E":"%75–90"},"c":"D","e":"Normal EF ~%55–70'tir (≈0,6). %40–55 hafif düşük, <%40 belirgin düşük (HFrEF) kabul edilir."},{"k":4,"n":36,"s":"Fizyoloji","q":"Hemodinamik ile ilgili aşağıdaki ifadelerden hangisi YANLIŞTIR?","o":{"A":"Hematokrit artışı kan akımını ARTIRIR","B":"Damar yarıçapı akımı 4. kuvvetle etkiler","C":"Viskozite arttıkça akım azalır","D":"Basınç farkı arttıkça akım artar","E":"Damar uzunluğu arttıkça direnç artar"},"c":"A","e":"Hematokrit artışı viskoziteyi artırır, direnci yükseltip akımı AZALTIR (Poiseuille). Diğer ifadeler doğrudur."},{"k":4,"n":37,"s":"Fizyoloji","q":"RAAS'ta anjiyotensin I'i anjiyotensin II'ye çeviren ACE enziminin EN YOĞUN bulunduğu organ hangisidir?","o":{"A":"Akciğer","B":"Böbrek","C":"Karaciğer","D":"Kalp","E":"Dalak"},"c":"A","e":"ACE en yoğun olarak akciğer kapiller endotelinde bulunur; anjiyotensin I'in büyük kısmı akciğerde anjiyotensin II'ye dönüşür."},{"k":4,"n":38,"s":"Fizyoloji","q":"Kanda CO2'nin büyük bölümü hangi enzimin etkisiyle bikarbonata dönüştürülerek taşınır?","o":{"A":"Karbonik anhidraz","B":"Laktat dehidrogenaz","C":"ATP sentaz","D":"Sitokrom oksidaz","E":"Hekzokinaz"},"c":"A","e":"Eritrositlerdeki karbonik anhidraz, CO2 + H2O → HCO3− + H+ tepkimesini hızlandırır; CO2'nin çoğu bikarbonat olarak taşınır."},{"k":4,"n":39,"s":"Fizyoloji","q":"Kardiyak (ventrikül) aksiyon potansiyeli fazları ile ilgili hangisi YANLIŞTIR?","o":{"A":"Faz 2 (plato): Ca2+ kanalları açık, K+ kanalları tamamen KAPALIDIR","B":"Faz 0: hızlı Na+ girişi ile depolarizasyon","C":"Faz 2 (plato): Ca2+ girişi ile K+ çıkışı dengededir","D":"Faz 3: K+ çıkışı ile repolarizasyon","E":"Faz 4: istirahat membran potansiyeli Cevap A) Faz 2 (plato): Ca2+ kanalları açık, K+ kanalları tamamen KAPALIDIR"},"c":"A","e":"Platoda (faz 2) Ca2+ girişi ile K+ çıkışı dengededir; K+ kanalları tamamen kapalı DEĞİLDİR. Bu denge platoyu oluşturur."},{"k":4,"n":40,"s":"Fizyoloji","q":"Kalpte \"artyük\" (afterload) en doğru şekilde nasıl tanımlanır?","o":{"A":"Ventrikülün kanı aortaya atabilmek için yenmesi gereken aort/arteriyelbasınç","B":"Diyastol sonu ventrikül hacmi","C":"Venöz dönüş miktarı","D":"Kalp hızı","E":"Miyokardın kasılma gücü Cevap A) Ventrikülün kanı aortaya atabilmek için yenmesi gereken aort/arteriyel basınç"},"c":"A","e":"Afterload, ventrikülün ejeksiyon yapabilmek için yenmesi gereken yük/basınçtır (≈ aort basıncı). Diyastol sonu hacim ise önyüktür (preload)."},{"k":4,"n":41,"s":"Fizyoloji","q":"Angina pektoris tipleri ile ilgili hangisi YANLIŞTIR?","o":{"A":"Varyant angina egzersizle ortaya çıkan bir angina tipidir","B":"Stabil angina genellikle egzersizle ortaya çıkar","C":"Varyant (Prinzmetal) angina koroner vazospazma bağlıdır","D":"Varyant angina tipik olarak istirahatte ortaya çıkar","E":"Anstabil angina istirahatte de görülebilir Cevap A) Varyant angina egzersizle ortaya çıkan bir angina tipidir"},"c":"A","e":"Varyant (Prinzmetal) angina vazospastiktir ve tipik olarak İSTİRAHATTE ortaya çıkar. Egzersizle ortaya çıkan tablo stabil anginadır."},{"k":4,"n":42,"s":"Fizyoloji","q":"EKG'de Lead III = 1,2 mV ve Lead II = 0,8 mV ölçülmüştür. Einthoven üçgenine göre Lead I değeri kaçtır?","o":{"A":"−0,4 mV","B":"+0,4 mV","C":"+2,0 mV","D":"−2,0 mV","E":"+1,0 mV"},"c":"A","e":"Einthoven kuralı: Lead II = Lead I + Lead III → Lead I = II − III = 0,8 − 1,2 = −0,4 mV."},{"k":4,"n":43,"s":"Fizyoloji","q":"Ses lokalizasyonunda (kaynağın yerini belirlemede) aşağıdakilerden hangileri rol oynar? I. İki kulağa ulaşma zamanı farkı II. Farklı fazlarda algılanma III. Frekansın kulaklar arası farklı algılanması","o":{"A":"Yalnız I","B":"I ve II","C":"I ve III","D":"II ve III","E":"I, II ve III"},"c":"B","e":"Temel ipuçları interaural zaman farkı (I) ve faz/şiddet farkıdır (II). \"Frekansın kulaklar arası farklı algılanması\" geçerli bir lokalizasyon ipucu değildir."},{"k":4,"n":44,"s":"Fizyoloji","q":"İstirahat (normal) bir ekspirasyondan sonra akciğerlerde kalan hava miktarı aşağıdakilerden hangisidir?","o":{"A":"Tidal volüm","B":"İnspiratuvar rezerv hacim","C":"Ekspiratuvar rezerv hacim","D":"Rezidüel hacim","E":"Fonksiyonel rezidüel kapasite"},"c":"E","e":"Normal ekspirasyon sonrası kalan = FRC = ERV + RV. Maksimal/zorlu ekspirasyon sonrası kalan ise rezidüel hacimdir."},{"k":4,"n":45,"s":"Fizyoloji","q":"İnspiratuar kapasite (IC) aşağıdakilerden hangisine eşittir?","o":{"A":"Tidal volüm + İnspiratuar rezerv hacim","B":"ERV + RV","C":"Tidal volüm + ERV","D":"IRV + ERV","E":"RV + IRV + Tidal volüm"},"c":"A","e":"IC = TV + IRV. (FRC = ERV + RV; Vital kapasite = IRV + TV + ERV.)"},{"k":4,"n":46,"s":"Fizyoloji","q":"Karotis ve aort cisimciğinde kan gazı (O2 / CO2 / pH) değişimlerini algılayan PERİFERİK kemoreseptör hücreler hangileridir?","o":{"A":"Glomus (tip I) hücreleri","B":"Olfaktör hücreler","C":"Müller hücreleri","D":"Mast hücreleri","E":"Kupffer hücreleri"},"c":"A","e":"Periferik kemoreseptörler karotis ve aort cisimciğindeki glomus (tip I) hücreleridir; kan gazı değişimini algılayıp solunumu uyarır."},{"k":4,"n":47,"s":"Histoloji","q":"Elastik arterlerde tunika medianın temel yapısal özelliği hangisidir?","o":{"A":"Konsantrik fenestralı (delikli) elastik lameller bakımından zengindir","B":"Tek tabaka düz kastan oluşur","C":"Bol kollajen, az elastin içerir","D":"Sadece endotelden oluşur","E":"Çoğunlukla yağ dokusu içerir Cevap A) Konsantrik fenestralı (delikli) elastik lameller bakımından zengindir"},"c":"A","e":"Elastik (iletici) arterlerde tunika media, düz kas hücreleri arasında çok sayıda fenestralı elastik lamel içerir (Windkessel etkisini sağlar)."},{"k":4,"n":48,"s":"Histoloji","q":"Aşağıdakilerden hangisi kan-hava (alveol) bariyerinin bir bileşeni DEĞİLDİR?","o":{"A":"Tip I pnömosit","B":"Füzyone (kaynaşmış) bazal lamina","C":"Kapiller endotel","D":"Sürfaktan tabakası","E":"Tip II pnömosit"},"c":"E","e":"İnce bariyer: tip I pnömosit + kaynaşmış bazal lamina + kapiller endotel (yüzeyde sürfaktan filmi). Tip II pnömosit sürfaktan salgılar ama bariyerin yapısal parçası değildir."},{"k":4,"n":49,"s":"Histoloji","q":"Akciğer alveollerinin kollapsını önleyen ve yüzey gerilimini azaltan maddeyi hangi hücre üretir?","o":{"A":"Sürfaktan – Tip II pnömosit","B":"Mukus – goblet hücresi","C":"Kollajen – fibroblast","D":"Lizozim – makrofaj","E":"İmmünoglobulin – plazma hücresi"},"c":"A","e":"Tip II pnömositlerin ürettiği sürfaktan, alveol yüzey gerilimini azaltarak ekspiryumda alveol kollapsını (atelektazi) önler."},{"k":4,"n":50,"s":"Histoloji","q":"Kalbin en KALIN tabakası hangisidir?","o":{"A":"Miyokardium","B":"Endokardium","C":"Epikardium","D":"Fibröz perikardium","E":"Seröz perikardium"},"c":"A","e":"Tabakalar içten dışa: endokardium – miyokardium – epikardium. Kas tabakası miyokardium (özellikle sol ventrikülde) en kalın tabakadır."},{"k":4,"n":51,"s":"Histoloji","q":"Histolojik kesitte Hassall cisimcikleri (korpüskülleri) görülmesi hangi organa işaret eder?","o":{"A":"Timus","B":"Dalak","C":"Lenf nodu","D":"Tonsilla","E":"Kemik iliği"},"c":"A","e":"Hassall cisimcikleri timus medullasına özgüdür; görülmesi dokunun timus olduğunu gösterir."},{"k":4,"n":52,"s":"Histoloji","q":"Aşağıdakilerden hangisi BİRİNCİL (primer / santral) lenfoid organdır?","o":{"A":"Timus","B":"Dalak","C":"Lenf nodu","D":"Tonsilla","E":"Peyer plakları"},"c":"A","e":"Birincil (santral) lenfoid organlar kemik iliği ve timustur. Dalak, lenf nodu, tonsilla ve Peyer plakları ikincil lenfoid organlardır."},{"k":4,"n":53,"s":"Histoloji","q":"Kapiller tipleri ile ilgili aşağıdaki ifadelerden hangisi YANLIŞTIR?","o":{"A":"Fenestralı kapillerler plazma proteinlerinin serbestçe geçmesine izinverir","B":"Devamlı kapillerlerde sıkı bağlantılar bulunur","C":"Fenestralı kapiller böbrek glomerülünde bulunur","D":"Sinüzoidal (kesintili) kapillerler karaciğer ve dalakta bulunur","E":"Kesintili kapillerlerde bazal lamina süreksizdir Cevap A) Fenestralı kapillerler plazma proteinlerinin serbestçe geçmesine izin verir"},"c":"A","e":"Plazma proteinleri gibi büyük moleküllerin geçişi sinüzoidal (kesintili) kapillerlerde olur. Fenestralı kapillerler küçük molekül ve su geçirir ama büyük proteinleri serbestçe geçirmez."},{"k":4,"n":54,"s":"Histoloji","q":"Burun ve solunum yolu epiteli ile ilgili hangisi YANLIŞTIR?","o":{"A":"Vestibulum nasi çok katlı kinosilyalı (silli) epiteldir","B":"Vestibulum nasi çok katlı yassı keratinize epitelle döşelidir","C":"Solunum bölgesi yalancı çok katlı silli prizmatik epiteldir","D":"Olfaktör bölgede koku reseptör hücreleri bulunur","E":"Vestibulumda kıllar (vibrissae) bulunur Cevap A) Vestibulum nasi çok katlı kinosilyalı (silli) epiteldir"},"c":"A","e":"Vestibulum nasi çok katlı yassı KERATİNİZE epiteldir (kıllı), silli değildir. Asıl silli (yalancı çok katlı prizmatik) epitel solunum bölgesindedir."},{"k":4,"n":55,"s":"Histoloji","q":"Burun olfaktör (koku) bölgesinde kimyasalları algılayan kemoreseptör hücreler hangileridir?","o":{"A":"Olfaktör (koku) reseptör hücreleri","B":"Glomus hücreleri","C":"Müller hücreleri","D":"Goblet hücreleri","E":"Bazal hücreler"},"c":"A","e":"Olfaktör epiteldeki bipolar olfaktör reseptör nöronları koku moleküllerini algılayan kemoreseptörlerdir. (Kan gazı için periferik kemoreseptörler ise glomus hücreleridir.)"},{"k":4,"n":56,"s":"Biyofizik","q":"Aşağıdaki foton-madde etkileşimlerinden hangisinde foton enerjisini KAYBETMEDEN saçılır?","o":{"A":"Coherent (Rayleigh) saçılma","B":"Fotoelektrik absorpsiyon","C":"Compton saçılması","D":"Çift oluşumu (pair production)","E":"Fotonükleer reaksiyon"},"c":"A","e":"Coherent (Rayleigh) saçılmada foton yön değiştirir ama enerji kaybetmez. Fotoelektrikte tüm enerji, Compton'da enerjinin bir kısmı kaybedilir."},{"k":4,"n":57,"s":"Biyofizik","q":"Kardiyovasküler sistemi görüntülemede aşağıdakilerden hangisi/hangileri kullanılabilir?","o":{"A":"Yalnızca MR","B":"Yalnızca Doppler","C":"MR ve Doppler","D":"Doppler ve Ultrason","E":"Hepsi (MR, Doppler, Ultrason)"},"c":"E","e":"Manyetik rezonans, Doppler ve ultrasonun tümü kardiyovasküler sistemi (kalp, damar, kan akımı) görüntülemede kullanılabilir."},{"k":4,"n":58,"s":"Biyofizik","q":"Beynin hemodinamik (kan akımı / oksijenlenme) yanıtlarını kaydeden yöntem hangisidir?","o":{"A":"fMRI (Fonksiyonel MR)","B":"EEG","C":"MEG","D":"BT","E":"Direkt grafi"},"c":"A","e":"fMRI, BOLD sinyali üzerinden beynin hemodinamik (kan akımı / oksijenlenme) değişimlerini ölçerek fonksiyonel haritalama yapar."},{"k":4,"n":59,"s":"Biyofizik","q":"Aşağıdaki yöntemlerden hangisi FONKSİYONEL nörogörüntülemede KULLANILMAZ?","o":{"A":"BT (Bilgisayarlı Tomografi)","B":"fMRI","C":"PET","D":"MEG","E":"fNIRS"},"c":"A","e":"BT anatomik / yapısal görüntüleme yapar. fMRI, PET, MEG ve fNIRS fonksiyonel (işlevsel) nörogörüntüleme yöntemleridir."},{"k":5,"n":1,"s":"İng. Restoratif","q":"Why is rounding the axiopulpal line angle important in the final cavity preparation?","o":{"A":"To improve esthetics","B":"To prevent stress concentration and reduce fracture of the restorative material","C":"To improve the marginal seal","D":"To increase mechanical retention","E":"To facilitate condensation"},"c":"B","e":"Keskin iç açılar bir stres yoğunlaşma (toplanma) noktasıdır. Aksiyopulpal açıyı yuvarlatmak kuvveti dağıtır → restorasyonun çatlama/kırılma riski düşer. Kısaca: keskin açı = stres tuzağı."},{"k":5,"n":2,"s":"İng. Restoratif","q":"A restoration shows marginal breakdown because of unsupported enamel rods left at the cavity margin. Which factor was insufficiently analyzed during finishing of the external (cavosurface) wall?","o":{"A":"Type of restorative material","B":"Type of carious lesion","C":"Direction of the enamel rods","D":"The patient's occlusal scheme","E":"Cavity depth"},"c":"C","e":"Alttan dentinle desteklenmeyen mine prizmaları (rods) marjinde kırılır ve sızıntı başlar. Cavosurface açı bitirilirken mine çubuklarının yönü gözetilmeli — desteksiz mine = marjinal çökme."},{"k":5,"n":3,"s":"İng. Restoratif","q":"Which one best describes primary resistance form?","o":{"A":"The shape and placement of the restoration walls that best enable the tooth and the restoration to withstand masticatory forces without fracture","B":"The features that prevent displacement of the restoration under tipping or lifting forces","C":"The complete removal of all carious dentin","D":"The smooth finishing of the cavity margins","E":"The convenient extension for instrument access"},"c":"A","e":"Resistance form = KIRILMAYA direnç (çiğneme kuvvetine dayanma). Retention form = ÇIKMAYA/düşmeye direnç. Şık B retansiyonu tarif ediyor — ikisini karıştırma."},{"k":5,"n":4,"s":"İng. Restoratif","q":"Why is a round bur preferred over a straight (fissure / right-angle) bur during tooth preparation?","o":{"A":"To increase retention by forming sharp internal line angles","B":"To improve cutting efficiency in enamel","C":"To produce flat pulpal and gingival floors","D":"To decrease stress concentration and reduce the risk of tooth fracture","E":"To create undercuts for the restorative material"},"c":"D","e":"Yuvarlak frez = yuvarlak iç açı = az stres yoğunlaşması. Düz/fissür frez keskin köşe bırakıp kırılma riskini artırır. Aynı mantık Soru 1 ve 21 ile birebir."},{"k":5,"n":5,"s":"İng. Restoratif","q":"What is the best definition for primary resistance form?","o":{"A":"The placement of liners and bases under the restoration","B":"The shape and placement of the restoration walls that best enable the tooth and the restoration to withstand masticatory forces without fracture","C":"The mechanical lock that prevents the restoration from being dislodged","D":"The esthetic blending of the restoration with the tooth","E":"The removal of unsupported enamel"},"c":"B","e":"Tekrar: primer resistance form = çiğneme kuvvetlerine kırılmadan dayanma. (Soru 4 ile aynı kavram; ezberini pekiştir. Şık C retansiyondur.)"},{"k":5,"n":6,"s":"İng. Restoratif","q":"In the given figure of a Class V cavity preparation, which wall is indicated by the arrow? ⚑ Not: Görsele bağlı soru — orijinalde işaretlenen duvar aksiyal duvardır.","o":{"A":"Mesial wall","B":"Distal wall","C":"Gingival wall","D":"Incisal wall","E":"Axial wall"},"c":"E","e":"Class V kavitede dişin uzun eksenine paralel, pulpaya bakan derin duvar = aksiyal duvar. Meziyal/distal/gingival/insizal ise çevre duvarlardır."},{"k":5,"n":7,"s":"İng. Restoratif","q":"Why is a round bur preferred for preparing the floor (pulpal floor) of a cavity?","o":{"A":"Because it creates sharp internal line angles","B":"Because it produces a perfectly flat cavity floor","C":"Because it reduces stress concentration and the risk of pulp exposure","D":"Because it removes enamel more efficiently","E":"Because it provides better retention form"},"c":"C","e":"Yuvarlak frez taban köşelerini yuvarlatır → hem stres azalır hem de pulpaya keskin girişle açılma riski düşer. Keskin köşe = pulpa tehlikesi + çatlak."},{"k":5,"n":8,"s":"İng. Restoratif","q":"Why should the mesial and distal walls of a cavity converge occlusally?","o":{"A":"To increase resistance form","B":"To increase retention form","C":"To improve convenience form","D":"To enhance esthetics","E":"To improve the marginal seal"},"c":"B","e":"Oklüzale daralan (konverjan) duvarlar restorasyona alttan kilit/undercut yapar → düşmeye direnç = RETANSİYON. Amalgam mekanik retansiyonla tutunur, hatırla."},{"k":5,"n":9,"s":"İng. Restoratif","q":"Why should the buccolingual width of a Class I cavity preparation not exceed one-third of the intercuspal distance?","o":{"A":"To preserve cusp strength and prevent fracture (reduce stress on the cusps)","B":"To improve the retention of the restoration","C":"To allow a greater bulk of amalgam","D":"To improve esthetics","E":"To facilitate condensation of the material"},"c":"A","e":"Kaviteyi ne kadar genişletirsen tüberkülleri (cusp) o kadar zayıflatırsın. 1/3 sınırı = tüberkül gücünü koru, kırılmayı önle. Az dokuyu kaldır, çok dokuyu koru."},{"k":5,"n":10,"s":"İng. Restoratif","q":"Which of the following surfaces typically includes a Class I cavity?","o":{"A":"Gingival third of facial surfaces","B":"Proximal surfaces of posterior teeth","C":"Incisal edges of anterior teeth","D":"Buccal surfaces of mandibular incisors","E":"Occlusal surfaces of molars and premolars"},"c":"E","e":"Class I = pit ve fissürler: arka dişlerin oklüzali (asıl örnek), ayrıca bukkal/lingual çukurlar ve ön dişlerin lingual çukuru. Proksimal = II/III, servikal = V."},{"k":5,"n":11,"s":"İng. Restoratif","q":"Why should the buccolingual width not exceed one-third of the intercuspal distance?","o":{"A":"To protect the pulp","B":"To provide retention","C":"To provide better resistance","D":"To prevent fracture of the tooth","E":"To keep marginal integrity"},"c":"D","e":"Asıl amaç tüberkülleri kırılmadan korumak; geniş kavite desteksiz cusp = kırık. (Soru 35'in ikizi — en doğrudan cevap: kırığı önlemek.)"},{"k":5,"n":12,"s":"İng. Restoratif","q":"In a two-surface Class II preparation, when and where should the cavity (box) depth be measured?","o":{"A":"On the buccal side, before preparation","B":"On the lingual side, before preparation","C":"On the mesial and distal sides, after the occlusal (Class I) step is prepared","D":"On the mesial and distal sides, before any preparation","E":"Only after the matrix band is placed"},"c":"C","e":"Önce oklüzal (Class I) basamak hazırlanır; proksimal kutunun derinliği meziyal/distal yönden, bu basamak bittikten sonra ölçülür. Önce oklüzal, sonra proksimal kutu."},{"k":5,"n":13,"s":"İng. Restoratif","q":"Which base/liner material below is alkaline and has the highest pH value?","o":{"A":"Zinc oxide–eugenol","B":"Zinc phosphate cement","C":"Calcium hydroxide","D":"Glass ionomer cement","E":"Polycarboxylate cement"},"c":"C","e":"Kalsiyum hidroksit kuvvetli baziktir (pH ~12). Antibakteriyel + onarıcı (reparatif) dentini uyarır, pulpayı korur.En yüksekpH= Ca(OH)2."},{"k":5,"n":14,"s":"İng. Restoratif","q":"A young patient has a deep lesion. There is no spontaneous pain; pain from a cold/hot stimulus stops once the stimulus is removed; the tooth is vital on electric pulp testing; there is no periradicular lesion radiographically; only a thin layer of dentin remains on the pulpal floor. Which method is indicated?","o":{"A":"Direct pulp capping","B":"Pulpotomy","C":"Pulpectomy","D":"Indirect pulp capping (with stepwise excavation)","E":"Extraction"},"c":"D","e":"Tablo = reversibl pulpitis, pulpa açılmadı, ince dentin kaldı. Pulpa açılmadıkça → indirekt kuafaj / stepwise. (Açılsaydı direkt kuafaj/pulpotomi gündeme gelirdi.)"},{"k":5,"n":15,"s":"İng. Restoratif","q":"A Class II cavity is opened with a remaining dentin thickness (RDT) of 0.4 mm over the pulp. Which liner/base strategy should be used?","o":{"A":"Zinc oxide–eugenol only","B":"Calcium hydroxide only","C":"A calcium hydroxide liner with a cement base over it","D":"Zinc phosphate only","E":"No liner and no base"},"c":"C","e":"RDT 0,4mm= pulpaya çok yakın (kritik eşik <0,5 mm). Önce Ca(OH)2 liner (pulpa koruma/onarım), üstüne base (termal + mekanik destek). Tek başına liner yetmez."},{"k":5,"n":16,"s":"İng. Restoratif","q":"Which of the following is NOT an objective of placing liners or bases beneath an amalgam restoration?","o":{"A":"Thermal insulation of the pulp","B":"Electrical (galvanic) insulation","C":"Protection of the pulp from chemical irritation","D":"Mechanical support for the restoration","E":"To produce galvanic (electrical) irritation of the pulp"},"c":"E","e":"Liner/base galvanik akımı engeller (izolasyon), oluşturmaz. Galvanik tahriş bir amaç değil, kaçınılan bir sorundur. Diğer 4 madde gerçek hedeflerdir."},{"k":5,"n":17,"s":"İng. Restoratif","q":"Which of the following is NOT an objective of using a liner under an amalgam restoration? ⚑ Not: Kaynağa dayalı — ince LINER'a özgü yorum. (Termal yalıtım kalın BASE'in görevidir.)","o":{"A":"Sealing the dentinal tubules","B":"Protecting the pulp from chemical irritants","C":"Providing thermal insulation for the pulp","D":"Providing an antibacterial effect","E":"Stimulating reparative (tertiary) dentin"},"c":"C","e":"İnce liner termal yalıtım sağlayamaz; bu kalın base'in işidir. Liner'ın görevi: tübülleri kapat, pulpayı kimyasal/bakteriyel koru, onarımı uyar. Termal yalıtım ≠ liner."},{"k":5,"n":18,"s":"İng. Restoratif","q":"Caries extends into the inner third of the dentin. The tooth is vital and asymptomatic, but there is a risk of pulp exposure if all carious dentin is removed. Which treatment is preferred?","o":{"A":"Complete (non-selective) caries removal to hard dentin","B":"Selective caries removal, leaving soft (affected) dentin over the pulp","C":"Pulpotomy","D":"Root canal treatment","E":"Extraction"},"c":"B","e":"Derin lezyon + canlı/asemptomatik diş + açılma riski → pulpa üzerinde yumuşak (affected) dentini bırak, periferi sağlam dentine kadar temizle. Amaç: pulpayı açmamak."},{"k":5,"n":19,"s":"İng. Restoratif","q":"A dentist places an amalgam filling at 6:00 pm. When scheduling a polishing session, the patient says he is flying out for a two-week vacation the next morning. What is the most appropriate response?","o":{"A":"\"You should cancel your flight and come for polishing, because it must be done within 24 hours.\"","B":"\"Contact me when you return and we will polish it then.\"","C":"\"You should have told me earlier; I would have polished it before you left the chair.\"","D":"\"Polishing is unnecessary, so we can skip it entirely.\"","E":"\"Come back tonight after a few hours for polishing.\""},"c":"B","e":"Amalgam 24 saatten önce parlatılmaz (henüz tam sertleşmedi). Uçuş ertesi sabah → çok erken. Doğru ve hasta-dostu yaklaşım: dönünce yap. Parlatma acil değildir."},{"k":5,"n":20,"s":"İng. Restoratif","q":"Overheating the amalgam surface above 60°C during polishing may cause:","o":{"A":"Faster setting","B":"Irreversible pulp damage","C":"Improved gloss","D":"Increased adhesion","E":"A better marginal seal"},"c":"B","e":"60°C üzeri ısı pulpaya iletilir → geri dönüşsüz pulpa hasarı (ayrıca cıva buharı açığa çıkar). Bu yüzden parlatma su soğutmasıyla ve aralıklı yapılır."},{"k":5,"n":21,"s":"İng. Restoratif","q":"Which of the following is a contraindication for an amalgam restoration?","o":{"A":"Excessive removal of healthy tooth structure would be required","B":"A large cavity on a posterior tooth","C":"A patient with high caries risk","D":"A patient who clenches/grinds (bruxism)","E":"A subgingival proximal margin"},"c":"A","e":"Amalgam mekanik retansiyon ister; sırf tutturmak için sağlam dokuyu çok feda etmek gerekiyorsa kontrendikedir → kompozit/adeziv tercih edilir. Estetik bölge de kontrendikasyondur."},{"k":5,"n":22,"s":"İng. Restoratif","q":"Which restoration requires reduction of all cusps but does NOT require complete preparation/smoothing of the entire tooth surface?","o":{"A":"Veneer","B":"Inlay","C":"Onlay","D":"Overlay","E":"Full crown"},"c":"D","e":"Overlay = tüm tüberkülleri örter ama kron gibi dişin tüm çevresini hazırlamaz. Inlay (cusp yok), Onlay (bir/birkaç cusp), Overlay (tüm cusp'lar), Kron (tüm cusp + tüm yüzey)."},{"k":5,"n":23,"s":"İng. Restoratif","q":"Which of the following statements about the corrosion of amalgam is FALSE? ⚑ Not: Kaynakta şıklar yoktu — soru konuya uygun şıklarla yeniden kurgulandı.","o":{"A":"Corrosion is an electrochemical process","B":"The gamma-2 (Sn–Hg) phase is the most corrosion-prone","C":"Corrosion products may gradually seal marginal gaps","D":"High-copper amalgams are more resistant to corrosion","E":"Corrosion increases the strength of the amalgam"},"c":"E","e":"Korozyon amalgamı güçlendirmez, zamanla zayıflatır → 'E' yanlış. Doğrular: elektrokimyasaldır; en zayıf halka gamma-2 fazıdır; yüksek bakır korozyonu azaltır; korozyon ürünleri marjini bir miktar kapatabilir."},{"k":5,"n":24,"s":"İng. Restoratif","q":"Which of the following is NOT recommended for reducing mercury exposure in the dental clinic?","o":{"A":"Polishing amalgam restorations without water spray","B":"Using high-volume evacuation (HVE) during amalgam removal","C":"Wearing gloves and a mask when handling amalgam","D":"Storing amalgam waste in sealed, labeled containers","E":"Adequate ventilation of the clinic environment"},"c":"A","e":"Susuz (kuru) parlatma ısı + cıva buharı üretir → tam tersine yapılmamalı. Su spreyi + HVE buharı/aerosolü bastırır. Diğer 4 madde doğru cıva güvenliği önlemidir."},{"k":5,"n":25,"s":"İng. Restoratif","q":"Which of the following increases the strength of amalgam? I. Copper II. Zinc III. Mercury","o":{"A":"Only I","B":"Only III","C":"I and II","D":"II and III","E":"I, II and III"},"c":"A","e":"Bakır (yüksek bakır) zayıf gamma-2 fazını eler → güç + korozyon direnci artar. Fazla cıva zayıflatır; nem bulaşırsa çinko geç genleşme yapar. Cevap: sadece bakır."},{"k":5,"n":26,"s":"İng. Restoratif","q":"What is the earliest recommended time to polish an amalgam restoration after insertion?","o":{"A":"6 hours","B":"12 hours","C":"24 hours","D":"2 days","E":"1 week"},"c":"C","e":"Amalgam kristalizasyonunu ~24 saatte tamamlar; daha erken parlatma yapıyı bozar. En erken = 24 saat. (Soru 7 ve 9 ile aynı 24 saat kuralı.)"},{"k":5,"n":27,"s":"İng. Restoratif","q":"Which of the following statements is FALSE regarding complex (extensive) amalgam restorations?","o":{"A":"When caries is extensive, reduction of one or more cusps for capping may be indicated","B":"To avoid fracture, unsupported cusps should be included in the preparation","C":"Preparations should maintain about 1.5–2 mm of amalgam thickness","D":"Pins reinforce the amalgam and increase its strength","E":"Drilling pinholes and placing pins may create fractures and internal stress in the dentin"},"c":"D","e":"Pinler retansiyon sağlar ama amalgamı güçlendirmez — hatta gerilim yaratıp zayıflatabilir. 'D' yanlış. Pin = tutuculuk, dayanıklılık değil."},{"k":5,"n":28,"s":"İng. Restoratif","q":"Which agent is most commonly used as a therapeutic agent for NERVE desensitization in the treatment of dentin hypersensitivity?","o":{"A":"Glutaraldehyde","B":"Arginine","C":"Strontium salts","D":"Potassium nitrate","E":"Oxalate"},"c":"D","e":"İki mekanizma var: (1) Sinir yatıştırma → potasyum nitrat (K+ iyonu siniri depolarize edip uyarılabilirliği düşürür). (2) Tübül tıkama → stronsiyum, oksalat, arginin. Soru 'sinir' dediği için cevap potasyum nitrat."},{"k":5,"n":29,"s":"İng. Restoratif","q":"Which of the following should NOT be considered in the differential diagnosis of dentin hypersensitivity?","o":{"A":"Dental caries","B":"Cracked tooth syndrome","C":"Food impaction","D":"Root (cervical) sensitivity","E":"Marginal leakage of a restoration"},"c":"C","e":"Besin sıkışması (food impaction) dişeti/periodontal kaynaklı bir ağrıdır, dentin hassasiyetiyle karıştırılmaz. Diğerleri benzer keskin, kısa uyaran ağrısı yapabilir."},{"k":5,"n":30,"s":"İng. Restoratif","q":"Which of the following should NOT be considered as a differential diagnosis for dentin hypersensitivity?","o":{"A":"Food impaction","B":"Dental caries","C":"Acute hyperfunction (parafunction) of the teeth","D":"Cracked tooth syndrome","E":"Root sensitivity"},"c":"A","e":"Tekrar konu: ayırıcı tanıda besin sıkışması yok. Çürük, parafonksiyon, çatlak diş ve kök hassasiyeti benzer tablo verebilir. (Soru 14 ile aynı mantık.)"},{"k":5,"n":31,"s":"İng. Restoratif","q":"Physical wear resulting from mechanical processes involving foreign substances or objects is referred to as
