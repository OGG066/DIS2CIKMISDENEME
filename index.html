<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Kurul · 2. Sınıf Soru Bankası</title>
<style>
  :root{
    --petrol:#103b3c; --petrol-2:#1c5557; --petrol-3:#2c6e70;
    --bg:#eef2f1; --surface:#ffffff; --surface-2:#f6f8f7;
    --border:#dde4e2; --border-2:#cdd6d3;
    --ink:#15201f; --muted:#5d6b69; --muted-2:#8a9896;
    --yellow:#ffe88a; --yellow-bd:#e0b81c; --yellow-ink:#5a4708;
    --check:#1f7a4d;
    --wrong:#fbe6e3; --wrong-bd:#d99186; --wrong-ink:#9c3327;
    --amber:#9a6212; --amber-bg:#fbeed0;
    --gold:#c0902a;
    --note:#6b7878;
    --shadow:0 1px 2px rgba(16,40,40,.05),0 8px 24px rgba(16,40,40,.06);
    --shadow-sm:0 1px 2px rgba(16,40,40,.06);
    --r:14px; --r-sm:9px;
    --sans:"DejaVu Sans","Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,"Noto Sans",sans-serif;
    --mono:"DejaVu Sans Mono",ui-monospace,"SF Mono","Cascadia Code","Roboto Mono",Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--sans); background:var(--bg); color:var(--ink);
    line-height:1.55; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    font-size:16px;
  }
  button{font-family:inherit;cursor:pointer}
  ::selection{background:var(--yellow);color:var(--yellow-ink)}
  .wrap{max-width:780px;margin:0 auto;padding:0 18px}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}

  /* ---------- top brand bar ---------- */
  .topbar{
    background:linear-gradient(180deg,var(--petrol),var(--petrol-2));
    color:#eaf3f1; position:sticky; top:0; z-index:40;
    border-bottom:1px solid rgba(255,255,255,.08);
  }
  .topbar .inner{display:flex;align-items:center;gap:14px;height:56px}
  .brand{display:flex;align-items:baseline;gap:9px;font-weight:700;letter-spacing:.02em;cursor:pointer;color:#fff;background:none;border:0;padding:0}
  .brand .k{font-size:1.12rem}
  .brand .sub{font-size:.74rem;font-weight:500;color:#9cc3bf;letter-spacing:.04em;text-transform:uppercase}
  .topbar .spacer{flex:1}
  .ghostbtn{background:rgba(255,255,255,.08);color:#dff0ed;border:1px solid rgba(255,255,255,.16);
    padding:7px 13px;border-radius:999px;font-size:.82rem;font-weight:600;transition:.15s}
  .ghostbtn:hover{background:rgba(255,255,255,.16)}

  /* ---------- home ---------- */
  .hero{padding:46px 0 10px}
  .eyebrow{font-size:.76rem;letter-spacing:.16em;text-transform:uppercase;color:var(--petrol-3);font-weight:700;margin:0 0 14px}
  .hero h1{font-size:2.35rem;line-height:1.08;margin:0 0 14px;font-weight:800;letter-spacing:-.02em}
  .hero h1 .hl{background:linear-gradient(180deg,transparent 58%,var(--yellow) 58%);padding:0 .06em}
  .hero p{font-size:1.04rem;color:var(--muted);max-width:54ch;margin:0}
  .statstrip{display:flex;gap:26px;margin:24px 0 6px;flex-wrap:wrap}
  .stat{display:flex;flex-direction:column;gap:1px}
  .stat b{font-size:1.5rem;font-weight:800;font-family:var(--mono)}
  .stat span{font-size:.78rem;color:var(--muted-2);letter-spacing:.03em}

  .modes{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:30px 0 8px}
  .mode{
    text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
    padding:22px 20px 20px;box-shadow:var(--shadow-sm);transition:.18s;position:relative;overflow:hidden;
    display:flex;flex-direction:column;gap:9px;min-height:184px;
  }
  .mode:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--border-2)}
  .mode .tag{font-size:.72rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--petrol-3)}
  .mode h2{margin:0;font-size:1.32rem;font-weight:800;letter-spacing:-.01em}
  .mode p{margin:0;color:var(--muted);font-size:.92rem;flex:1}
  .mode .go{align-self:flex-start;margin-top:6px;background:var(--petrol);color:#fff;border:0;border-radius:999px;
    padding:9px 17px;font-weight:700;font-size:.9rem;transition:.15s}
  .mode .go:hover{background:var(--petrol-2)}
  .mode.sim{background:linear-gradient(155deg,#123e3f,#0c3030);border-color:#0c3030;color:#eaf3f1}
  .mode.sim .tag{color:var(--gold)}
  .mode.sim h2{color:#fff}
  .mode.sim p{color:#a9c6c2}
  .mode.sim .go{background:var(--gold);color:#241a05}
  .mode.sim .go:hover{background:#d4a23a}
  .mode .corner{position:absolute;right:-18px;top:-18px;font-family:var(--mono);font-size:5.4rem;font-weight:800;opacity:.06;line-height:1}
  .mode.sim .corner{opacity:.14;color:var(--gold)}

  .dist{margin:34px 0 60px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 20px 8px}
  .dist h3{margin:0 0 4px;font-size:.95rem;font-weight:800}
  .dist .hint{margin:0 0 16px;font-size:.82rem;color:var(--muted)}
  .bar{display:flex;align-items:center;gap:10px;margin:0 0 9px;font-size:.82rem}
  .bar .lab{width:150px;flex:none;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bar .track{flex:1;display:block;height:9px;background:var(--surface-2);border-radius:6px;overflow:hidden;border:1px solid var(--border)}
  .bar .fill{display:block;height:100%;background:var(--petrol-3);border-radius:6px}
  .bar.short .fill{background:var(--amber)}
  .bar .num{width:58px;flex:none;text-align:right;font-family:var(--mono);color:var(--muted);font-size:.78rem}

  /* ---------- setup (study) ---------- */
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px 22px;box-shadow:var(--shadow-sm);margin:28px 0}
  .panel h2{margin:0 0 4px;font-size:1.45rem;font-weight:800;letter-spacing:-.01em}
  .panel .lead{margin:0 0 22px;color:var(--muted)}
  .fieldlabel{font-size:.8rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--petrol-3);margin:22px 0 11px}
  .fieldlabel:first-of-type{margin-top:6px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{background:var(--surface-2);border:1px solid var(--border);color:var(--ink);border-radius:999px;
    padding:7px 14px;font-size:.86rem;font-weight:600;transition:.13s;display:inline-flex;align-items:center;gap:7px}
  .chip:hover{border-color:var(--petrol-3)}
  .chip.on{background:var(--petrol);border-color:var(--petrol);color:#fff}
  .chip .c{font-family:var(--mono);font-size:.74rem;opacity:.7}
  .chip.on .c{opacity:.85}
  .switchrow{display:flex;align-items:center;gap:12px;margin-top:8px}
  .switch{position:relative;width:46px;height:26px;flex:none}
  .switch input{opacity:0;width:0;height:0}
  .slider{position:absolute;inset:0;background:var(--border-2);border-radius:999px;transition:.18s}
  .slider:before{content:"";position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.18s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  .switch input:checked + .slider{background:var(--petrol-3)}
  .switch input:checked + .slider:before{transform:translateX(20px)}
  .setup-foot{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:28px;flex-wrap:wrap}
  .count-note{font-size:.86rem;color:var(--muted)}
  .count-note b{color:var(--ink);font-family:var(--mono)}
  .primary{background:var(--petrol);color:#fff;border:0;border-radius:999px;padding:12px 24px;font-weight:700;font-size:.96rem;transition:.15s}
  .primary:hover{background:var(--petrol-2)}
  .primary:disabled{background:var(--border-2);color:#fff;cursor:not-allowed}
  .primary.gold{background:var(--gold);color:#241a05}
  .primary.gold:hover{background:#d4a23a}
  .linkbtn{background:none;border:0;color:var(--petrol-3);font-weight:600;font-size:.9rem;padding:6px 2px}
  .linkbtn:hover{text-decoration:underline}

  .callout{background:var(--amber-bg);border:1px solid #ecd9a8;border-left:4px solid var(--amber);
    border-radius:var(--r-sm);padding:13px 15px;font-size:.86rem;color:#6f4a12;margin:18px 0 0}
  .callout b{color:var(--amber)}

  /* ---------- runner shared ---------- */
  .runtop{position:sticky;top:56px;z-index:30;background:rgba(238,242,241,.92);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--border);padding:11px 0}
  .runtop .inner{display:flex;align-items:center;gap:14px}
  .progresswrap{flex:1;display:flex;flex-direction:column;gap:6px}
  .progress-meta{display:flex;justify-content:space-between;font-size:.8rem;color:var(--muted);font-weight:600}
  .progress-meta .mono{color:var(--ink)}
  .pbar{height:6px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;overflow:hidden}
  .pbar .pfill{height:100%;background:var(--petrol-3);width:0;transition:width .25s}
  .timer{font-family:var(--mono);font-weight:700;font-size:1.12rem;padding:5px 12px;border-radius:9px;
    background:var(--surface);border:1px solid var(--border);color:var(--petrol);letter-spacing:.02em;flex:none}
  .timer.warn{color:#b8531f;border-color:#e6b58f;background:#fdf0e6}
  .timer.danger{color:#fff;background:#c0392b;border-color:#a93226;animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.7}}

  .qcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-sm);
    padding:26px 24px;margin:24px 0}
  .qhead{display:flex;align-items:center;gap:9px;margin-bottom:16px;flex-wrap:wrap}
  .qnum{font-family:var(--mono);font-weight:800;font-size:.84rem;background:var(--petrol);color:#fff;border-radius:7px;padding:3px 9px}
  .subjtag{font-size:.74rem;font-weight:700;letter-spacing:.02em;color:var(--petrol-3);background:var(--surface-2);
    border:1px solid var(--border);border-radius:999px;padding:3px 10px}
  .kurultag{font-size:.74rem;font-weight:600;color:var(--muted-2)}
  .stem{font-size:1.12rem;line-height:1.5;font-weight:600;margin:0 0 20px;white-space:pre-wrap}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;align-items:flex-start;gap:13px;text-align:left;width:100%;background:var(--surface);
    border:1.5px solid var(--border);border-radius:var(--r-sm);padding:13px 15px;font-size:.98rem;transition:.13s;color:var(--ink)}
  .opt:hover:not(:disabled){border-color:var(--petrol-3);background:var(--surface-2)}
  .opt:disabled{cursor:default}
  .opt .ltr{font-family:var(--mono);font-weight:800;width:24px;height:24px;flex:none;border-radius:6px;
    background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.82rem;color:var(--muted);margin-top:1px}
  .opt .txt{flex:1;padding-top:1px}
  .opt.sel{border-color:var(--petrol);background:#eef5f4}
  .opt.sel .ltr{background:var(--petrol);color:#fff;border-color:var(--petrol)}
  .opt.correct{border-color:var(--yellow-bd);background:var(--yellow)}
  .opt.correct .ltr{background:var(--yellow-bd);color:#fff;border-color:var(--yellow-bd)}
  .opt.correct .txt{color:var(--yellow-ink);font-weight:700}
  .opt.correct .mark{margin-left:auto;color:var(--check);font-weight:800;font-size:1.1rem;flex:none}
  .opt.wrong{border-color:var(--wrong-bd);background:var(--wrong)}
  .opt.wrong .ltr{background:var(--wrong-bd);color:#fff;border-color:var(--wrong-bd)}
  .opt.wrong .txt{color:var(--wrong-ink)}
  .opt.wrong .mark{margin-left:auto;color:var(--wrong-ink);font-weight:800;flex:none}

  .explain{margin-top:18px;border-left:4px solid var(--petrol-3);background:var(--surface-2);
    border-radius:0 var(--r-sm) var(--r-sm) 0;padding:14px 16px;animation:fade .25s ease}
  .explain .et{font-size:.74rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--petrol-3);margin:0 0 6px}
  .explain p{margin:0;font-size:.92rem;color:#2c3a39;line-height:1.5}
  .note{margin-top:12px;font-style:italic;color:var(--note);font-size:.84rem;display:flex;gap:8px}
  .note .ni{font-style:normal;font-weight:700;flex:none}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  .navrow{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:8px 0 40px}
  .navbtn{background:var(--surface);border:1px solid var(--border-2);color:var(--ink);border-radius:999px;
    padding:11px 20px;font-weight:700;font-size:.9rem;transition:.13s}
  .navbtn:hover:not(:disabled){border-color:var(--petrol);color:var(--petrol)}
  .navbtn:disabled{opacity:.4;cursor:not-allowed}
  .navbtn.next{background:var(--petrol);color:#fff;border-color:var(--petrol)}
  .navbtn.next:hover{background:var(--petrol-2)}
  .markbtn{background:var(--surface);border:1px solid var(--border-2);color:var(--muted);border-radius:999px;padding:11px 18px;font-weight:700;font-size:.88rem}
  .markbtn.on{background:#fdf0e6;border-color:#e6b58f;color:#b8531f}

  .scorepill{display:flex;gap:14px;font-size:.82rem;font-weight:700}
  .scorepill .d{color:var(--check)} .scorepill .w{color:var(--wrong-ink)}

  /* ---------- sim grid nav ---------- */
  .gridnav{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin:0 0 26px}
  .gridnav h4{margin:0 0 12px;font-size:.82rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
  .gn{display:grid;grid-template-columns:repeat(auto-fill,minmax(34px,1fr));gap:6px}
  .gn button{font-family:var(--mono);font-size:.78rem;font-weight:700;aspect-ratio:1;border-radius:7px;
    border:1px solid var(--border);background:var(--surface-2);color:var(--muted);transition:.12s;padding:0}
  .gn button:hover{border-color:var(--petrol-3)}
  .gn button.ans{background:var(--petrol);border-color:var(--petrol);color:#fff}
  .gn button.mark{background:#fdf0e6;border-color:#e6b58f;color:#b8531f}
  .gn button.cur{outline:3px solid var(--gold);outline-offset:1px}
  .gnlegend{display:flex;gap:16px;margin-top:14px;font-size:.76rem;color:var(--muted);flex-wrap:wrap}
  .gnlegend span{display:inline-flex;align-items:center;gap:6px}
  .gnlegend i{width:13px;height:13px;border-radius:4px;display:inline-block;border:1px solid var(--border)}
  .gnlegend i.a{background:var(--petrol)} .gnlegend i.m{background:#fdf0e6;border-color:#e6b58f} .gnlegend i.u{background:var(--surface-2)}

  /* ---------- results ---------- */
  .resulthero{background:linear-gradient(155deg,#123e3f,#0c3030);color:#eaf3f1;border-radius:var(--r);padding:30px 26px;margin:28px 0;text-align:center}
  .resulthero .big{font-family:var(--mono);font-size:3.4rem;font-weight:800;line-height:1;color:#fff}
  .resulthero .big small{font-size:1.3rem;color:#9cc3bf;font-weight:600}
  .resulthero .pts{font-size:1.05rem;color:var(--gold);font-weight:700;margin-top:8px}
  .resulthero .meta{display:flex;justify-content:center;gap:26px;margin-top:18px;flex-wrap:wrap;font-size:.86rem}
  .resulthero .meta div{display:flex;flex-direction:column}
  .resulthero .meta b{font-family:var(--mono);font-size:1.15rem}
  .resulthero .meta span{color:#9cc3bf;font-size:.74rem}
  .sectiontitle{font-size:1.05rem;font-weight:800;margin:30px 0 14px;letter-spacing:-.01em}
  .subjtable{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
  .strow{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);font-size:.9rem}
  .strow:last-child{border-bottom:0}
  .strow .nm{flex:1;font-weight:600}
  .strow .track{width:120px;flex:none;display:block;height:8px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;overflow:hidden}
  .strow .fill{display:block;height:100%;background:var(--check)}
  .strow .fill.low{background:#d9863a} .strow .fill.bad{background:#c0392b}
  .strow .sc{width:64px;flex:none;text-align:right;font-family:var(--mono);font-size:.82rem;color:var(--muted)}
  .reviewbtns{display:flex;gap:10px;margin:24px 0 10px;flex-wrap:wrap}
  .toggle-r{background:var(--surface);border:1px solid var(--border-2);color:var(--ink);border-radius:999px;padding:9px 16px;font-weight:700;font-size:.86rem}
  .toggle-r.on{background:var(--petrol);color:#fff;border-color:var(--petrol)}
  .rcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:16px 18px;margin:10px 0}
  .rcard .rq{font-weight:600;margin:0 0 10px;white-space:pre-wrap}
  .rcard .ro{font-size:.88rem;margin:3px 0;padding:6px 10px;border-radius:6px;display:flex;gap:9px}
  .rcard .ro .l{font-family:var(--mono);font-weight:700;flex:none}
  .rcard .ro.c{background:var(--yellow);color:var(--yellow-ink);font-weight:600}
  .rcard .ro.x{background:var(--wrong);color:var(--wrong-ink)}
  .rcard .rexp{margin-top:10px;font-size:.86rem;color:#2c3a39;border-left:3px solid var(--petrol-3);padding-left:11px}
  .rstatus{font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 9px;border-radius:999px;float:right}
  .rstatus.ok{background:#e3f1ea;color:var(--check)} .rstatus.no{background:var(--wrong);color:var(--wrong-ink)} .rstatus.bos{background:var(--surface-2);color:var(--muted)}

  .footer{padding:28px 0 50px;text-align:center;color:var(--muted-2);font-size:.78rem}
  .footer b{color:var(--muted)}

  @media (max-width:640px){
    .hero h1{font-size:1.9rem}
    .modes{grid-template-columns:1fr}
    .bar .lab{width:118px}
    .runtop{top:56px}
    .qcard{padding:20px 16px}
    .stem{font-size:1.05rem}
    .navbtn,.markbtn{padding:11px 15px;font-size:.86rem}
    .wrap{padding:0 14px}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  /* ---------- bu sene final featured ---------- */
  .featured{margin:28px 0 4px}
  .bigcard{position:relative;overflow:hidden;width:100%;text-align:left;display:flex;flex-direction:column;gap:9px;
    background:linear-gradient(150deg,#1d1407,#3a2a0c 55%,#5a4209);border:1px solid var(--gold);border-radius:var(--r);
    padding:26px 24px;box-shadow:var(--shadow);color:#fff;transition:.18s}
  .bigcard:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(60,40,5,.32)}
  .bigcard .badge{display:inline-block;align-self:flex-start;font-size:.7rem;font-weight:800;letter-spacing:.07em;
    background:var(--gold);color:#241a05;padding:4px 12px;border-radius:999px}
  .bigcard h2{margin:5px 0 0;font-size:1.62rem;font-weight:800;letter-spacing:-.01em;color:#fff}
  .bigcard p{margin:0;color:#ebd9b2;font-size:.95rem;max-width:62ch}
  .bigcard .go{align-self:flex-start;margin-top:8px;background:var(--gold);color:#241a05;border:0;border-radius:999px;
    padding:11px 21px;font-weight:800;font-size:.95rem}
  .bigcard .corner{position:absolute;right:6px;top:-22px;font-size:6.6rem;font-weight:800;opacity:.16;color:var(--gold);line-height:1}
  .answerbox{margin-top:6px;border-left:4px solid var(--gold);background:#fbf4e3;border-radius:0 var(--r-sm) var(--r-sm) 0;
    padding:14px 16px;animation:fade .25s ease}
  .answerbox .et{font-size:.74rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--amber);margin:0 0 6px}
  .answerbox p{margin:0;font-size:1.02rem;color:#4a3a12;font-weight:600;line-height:1.5}
  .opt.reveal{justify-content:flex-start;border-style:dashed;color:var(--petrol);font-weight:700}
  .opt.reveal:hover{background:#eef5f4}
  .opt.reveal .ltr{background:var(--petrol);color:#fff;border-color:var(--petrol)}

  /* ---------- bütün sorular + flashcards ---------- */
  .minirow{display:flex;gap:12px;margin:16px 0 0;flex-wrap:wrap}
  .minibtn{flex:1;min-width:210px;display:flex;flex-direction:column;gap:2px;text-align:left;
    background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:13px 17px;
    box-shadow:var(--shadow-sm);transition:.15s}
  .minibtn:hover{border-color:var(--petrol-3);transform:translateY(-2px)}
  .minibtn .mt{font-weight:800;font-size:1.02rem;color:var(--petrol)}
  .minibtn .ms{font-size:.8rem;color:var(--muted)}
  .flashcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-sm);
    padding:26px 24px;margin:24px 0;cursor:pointer;min-height:210px;transition:.15s}
  .flashcard:hover{border-color:var(--border-2)}
  .flashcard .tapcue{color:var(--muted-2);font-size:.92rem;margin:26px 0 6px;text-align:center;font-style:italic}

<script>
const DATA = [{"k":1,"n":1,"s":"Histoloji","q":"Aşağıdaki organik matriksi yapan hücreler ile ilgili eşleştirmelerden hangisi yanlıştır?","o":{"A":"Sementte – sementoblastlar","B":"Kemikte – osteoblastlar","C":"Normal bağ dokusunda – fibroblastlar","D":"Dentinde – odontoblastlar","E":"Minede – sementoblastlar"},"c":"E","e":"Mineyi yapan hücre ameloblast'tır, sementoblast değil. \"Mine = ameloblast\" kuralını unutma; her sert doku kendi hücresine emanettir."},{"k":1,"n":2,"s":"Histoloji","q":"Aşağıdakilerden hangisi veya hangileri yanlıştır? I. Dentin tübüllerinin iç yüzeyini saran dentine peritübüler dentin denir. II. Tübüller arası boşluğu dolduran dentine intratübüler dentin denir. III. Dentin kanallarının içinde yer alan odontoblast uzantılarına Tomes fibrili denir.","o":{"A":"II ve III","B":"Yalnız II","C":"I ve III","D":"Yalnız I","E":"I, II ve III"},"c":"B","e":"Tübüller arası boşluğu dolduran dentin intertübüler dentindir (\"inter\" = arası), \"intratübüler\" değil. I ve III doğru; tek hatalı ifade II."},{"k":1,"n":3,"s":"Histoloji","q":"İki tabaka epitel hücrelerinden içteiç mine epiteli, dışta dış mine epiteli hücrelerinden oluşan birleşik mine epitel hortumuna ne ad verilir?","o":{"A":"Stratum intermedium hücreleri","B":"Mine pulpası","C":"Hertwig epitel kını","D":"Membrana formativa","E":"Dental papilla"},"c":"C","e":"İç + dış mine epitelinin birleşip kök şeklini yöneten yapı Hertwig epitel kını'dır — kök gelişiminin mimarı. Görevi bitince Malassez artıklarına dönüşür."},{"k":1,"n":4,"s":"Histoloji","q":"Sement ile ilgili aşağıdakilerden hangisi yanlıştır?","o":{"A":"Mezoderm kökenli bir dokudur.","B":"Hücresiz sement ilk oluşan sement dokusudur.","C":"Hücreli sement çoğunlukla kökün koronal kısmında bulunur.","D":"Kalınlığı apikalde servikal alandan daha fazladır.","E":"Dentinden daha açık renktedir."},"c":"C","e":"Hücreli (sellüler) sement apikal 1/3'te yoğundur, koronalde değil. Mantık: fonksiyonel yük apikalde tamir/yapım gerektirir → hücreli sement orada kalınlaşır."},{"k":1,"n":5,"s":"Histoloji","q":"Diş gelişim döneminde ilk salgılanan doku _____ tarafından üretilen _____ dokusudur. Boşluklar hangi seçenekle doldurulabilir?","o":{"A":"odontoblast / dentin","B":"sementoblast / dentin","C":"ameloblast / dentin","D":"odontoblast / mine","E":"ameloblast / sement"},"c":"A","e":"Diş gelişiminde ilk sözü odontoblast söyler ve ilk dokuyu dentin olarak yapar; mine ancak dentin tabanı oluştuktan sonra başlar. \"Önce dentin, sonra mine.\""},{"k":1,"n":6,"s":"Histoloji","q":"Aşağıdakilerden hangisi veya hangileri doğrudur? I. Mine dış yüzeyinden mine-dentin sınırına gidildikçe mine prizmalarının çapı azalır. II. Mine prizmaları kesitlerde anahtar deliği şeklinde görülür. III. Mine prizmalarının kuyruk kısımları asit ataklarına karşı duyarlıdır. IV. Aprizmatik mine, mineralizasyonu yüksek bir tabakadır.","o":{"A":"I, II ve IV","B":"III ve IV","C":"I, II ve III","D":"I ve II","E":"I, II, III ve IV"},"c":"A","e":"Prizma kuyruğu asit ataklarına dirençlidir (III yanlış). Çap MDS'ye doğru azalır, kesitte anahtar deliği görünür, aprizmatik mine en mineralize tabakadır — diğer üçü doğru."},{"k":1,"n":7,"s":"Histoloji","q":"Dentin ile ilgili aşağıdakilerden hangisi yanlıştır?","o":{"A":"Mineral içeriği yaşla birlikte artar.","B":"Mineden daha açık renktedir.","C":"Mezoderm kökenli bir dokudur.","D":"Dentin formasyonu pulpa canlı kaldığı sürece devam eder.","E":"Sement ve kemikten daha serttir."},"c":"B","e":"Mine, dentinden daha açık renktedir; dentin sarımsı/daha koyudur. Diğerleri doğru: dentin yaşla mineralize olur, mezoderm kökenli, pulpa canlıyken üretim sürer, sement/kemikten serttir."},{"k":1,"n":8,"s":"Histoloji","q":"Mine prizmalarının kalsifikasyon bozukluğu veya mineyi oluşturan ameloblastlardaki bozukluk sonucu oluşan ince yaprak şeklindeki yapılara ne ad denir?","o":{"A":"Mine lamelleri","B":"Nazmit zarı","C":"Mine pistonları","D":"Mine tuğları","E":"Mine demetleri"},"c":"A","e":"Kalsifikasyon/ameloblast kusuruyla oluşan ince yaprak şeklindeki hipomineralize yapı mine lamelidir — mine yüzeyinden DMS'ye uzanan zayıf hat, çürük için giriş kapısı."},{"k":1,"n":9,"s":"Histoloji","q":"Mine-dentin sınırından pulpaya yaklaştıkça dentin kanallarının boyu _____, çapı _____, birim alandaki kanal sayısı _____.","o":{"A":"Kısalır – Daralır – Azalır","B":"Kısalır – Genişler – Artar","C":"Uzar – Daralır – Azalır","D":"Uzar – Genişler – Artar","E":"Değişmez – Değişmez – Artar"},"c":"B","e":"Pulpaya yaklaştıkça tübüller huni gibi toplanır: boy kısalır, çap genişler, birim alandaki sayı artar. Bu yüzden derin dentin daha geçirgen ve hassastır."},{"k":1,"n":10,"s":"Histoloji","q":"Mine ile ilgili aşağıdakilerden hangisi yanlıştır?","o":{"A":"Ameloblast hücreleri tarafından oluşturulur.","B":"Rengi sarımsı beyaz veya grimsi beyazdır.","C":"Tüm mineralize dokular içinde en fazla florür içeren dokudur.","D":"Kalınlığı insizal/okluzal yüzeyde servikal alandan daha fazladır.","E":"Mine-dentin sınırından dış yüzeye doğru gidildikçe sertlik değeri artar."},"c":"C","e":"Mine florür içerir ama \"en fazla içeren doku\" demek hatalı; florür birikimi yüzeyde yoğundur, \"tüm dokular içinde en fazla\" iddiası abartılıdır."},{"k":1,"n":11,"s":"Histoloji","q":"Aşağıdakilerden hangisi veya hangileri yanlıştır? I. Hunter-Schreger çizgileri minenin dış kısmında izlenir. II. Hunter-Schreger çizgileri büyüme çizgileri olarak kabul edilebilir. III. Retzius çizgisinin mine dış yüzeyine ulaştığı yerde meydana getirdiği girinti perikimatadır. IV. Neonatal çizgi diğer Retzius çizgilerinden daha ince ve açık renktedir.","o":{"A":"Yalnız III","B":"I ve II","C":"II, III ve IV","D":"I, II, III ve IV","E":"I, II ve IV"},"c":"E","e":"Hunter-Schreger bantları minenin iç 2/3'ünde görülür ve optik bir olaydır (büyüme çizgisi DEĞİL — o Retzius). Neonatal çizgi diğerlerinden daha kalın ve koyudur (doğum stresi). Sadece III (perikimata) doğru."},{"k":1,"n":12,"s":"Histoloji","q":"Dentin dokusunun semente bakan yüzünde yer alan, tam bir sement yapısı göstermeyen, tipik bir dentin yapısında da olmayan tabakaya ne ad verilir?","o":{"A":"Hücresiz sement","B":"Hücreli sement","C":"Ara sement","D":"Birincil sement","E":"Sekonder sement"},"c":"C","e":"Dentin–sement sınırında, ne tam dentin ne tam sement olan geçiş tabakası ara sementtir (hyalin/Hopewell-Smith tabakası). Kökün dış dentinini örten ince ara katman."},{"k":1,"n":13,"s":"Histoloji","q":"Manto dentinin altında yer alanve pulpaya doğru uzanan primer dentin dokusuna ne ad verilir?","o":{"A":"Predentin","B":"İntertübüler dentin","C":"Circumpulpal (sirkumpulpal) dentin","D":"İnterglobüler dentin","E":"Peritübüler dentin"},"c":"C","e":"Manto dentinin altında, pulpayı çepeçevre saran ve dentinin büyük kısmını oluşturan primer dentin sirkumpulpal dentindir (\"circum\" = çevresinde). Manto = en dış ilk dentin; sirkumpulpal = altındaki ana kütle."},{"k":1,"n":14,"s":"Histoloji","q":"Hücreli sementin oluşumu hangi döneme denk gelir?","o":{"A":"Dişin mine ve dentin gelişiminden hemen sonra","B":"Kök gelişimi tamamlanmadan önce","C":"Diş okluzal düzleme ulaştıktan sonra","D":"Embriyonik dönemde","E":"Mine-sement birleşimi sırasında"},"c":"C","e":"Önce asellüler sement (kök yüzeyine), sonra sellüler sement diş fonksiyona girince (okluzal temas başlayınca) yapılır. Yük → tamir ihtiyacı → hücreli sement."},{"k":1,"n":15,"s":"Restoratif (TR)","q":"Yumuşak dentinin bir ekskavatör ile, hatta presel ucuna sarılmış bir pamuk parçası ile bile rahatça kaldırılabildiği, dentinin yumuşak hissedildiği lezyonlara ne ad verilir?","o":{"A":"Islak (yumuşak) çürük","B":"Kronik (sert) çürük","C":"Kronik (ıslak) çürük","D":"Sert (ıslak) çürük","E":"Yumuşak (kronik) çürük"},"c":"A","e":"Ekskavatörle hatta pamukla bile kolayca kalkan, yumuşak-nemli lezyon akut/ıslak (yumuşak) çürüktür — hızlı ilerler. Kronik çürük tam tersi: koyu, sert, yavaş."},{"k":1,"n":16,"s":"Restoratif (TR)","q":"Aşağıdakilerden hangisi çürük lezyonunun dişte bulunduğu bölgeye (anatomik bölge) göre yapılan sınıflandırmaya örnektir?","o":{"A":"Kompleks çürükler","B":"Akut/kronik çürükler","C":"Meziyal, distal çürükler","D":"Fissürler, servikal çürükler","E":"Seri/hızlı çürükler"},"c":"D","e":"Anatomik bölge = dişin neresinde (fissür, servikal/boyun) olduğudur. Meziyal/distal = yüzeye göre; akut/kronik = hıza göre; kompleks = tutulan yüzey sayısına göre."},{"k":1,"n":17,"s":"Restoratif (TR)","q":"Yapılan muayenede ağzında1 adet kavitasyonlu çürük bulunan birey risk açısından hangi gruba girer?","o":{"A":"Düşük risk","B":"Çok yüksek risk","C":"Orta risk","D":"Artmış risk","E":"Yüksek risk"},"c":"E","e":"1 veya daha fazla aktif kavitasyonlu çürük = yüksek risk. Beyaz leke + risk faktörü = orta; hiç çürük yok = düşük; çok sayıda/yaygın kök çürüğü = çok yüksek."},{"k":1,"n":18,"s":"Restoratif (TR)","q":"Çürük meydana gelmesi için mikroorganizmaların besinlere ihtiyacı vardır. Aşağıdaki besin gruplarından hangisi bu süreçte en önemli besin kaynağı olarak görev yapar?","o":{"A":"Yağ","B":"Fermente olabilen karbonhidrat","C":"Protein","D":"Mineral","E":"Şeker değişkenleri"},"c":"B","e":"Bakteriler fermente olabilen karbonhidratı parçalayıp asit üretir → çürük. Yağ/protein fermente olmaz, asit yapmaz. \"Fermente karbonhidrat = bakterinin yakıtı.\""},{"k":1,"n":19,"s":"Restoratif (TR)","q":"Aşağıdakilerden hangisi 'çürük lezyonlarının bulundukları diş yüzeylerine göre sınıflandırılmasına' ait örneklerden biri DEĞİLDİR?","o":{"A":"Distal çürük","B":"Okluzal çürük","C":"Lingual çürük","D":"Hızlı ilerleyen çürük","E":"Bukkal çürük"},"c":"D","e":"\"Hızlı ilerleyen\" bir yüzey değil, yayılım/ilerleme özelliğidir. Distal-okluzal-lingual-bukkal = dişin yüzeyleri. Yüzey adı içermeyen tek seçenek budur."},{"k":1,"n":20,"s":"Restoratif (TR)","q":"Dentin çürüğü ile ilgili aşağıdaki cümlelerden hangisi yanlıştır?","o":{"A":"Enfekte olmuş dentin bölgesi bakterilerle dolu, bozulmuş dentin içerir.","B":"Turbid dentin bölgesinde dentin kendini tamir edemez.","C":"Turbid, bakteri invazyonunun olduğu tabakadır.","D":"Enfekte olmuş dentin bölgesi muhakkak korunmalıdır.","E":"Enfekte olmuş dentin bölgesi muhakkak kaldırılmalıdır."},"c":"D","e":"Enfekte dentin kaldırılmalıdır (korunmaz!) — bakteriyle dolu, geri dönüşümsüz. Korunması gereken, alttaki etkilenmiş (affected) dentindir. D ve E çelişir; doğru olan E, hatalı ifade D."},{"k":1,"n":21,"s":"Restoratif (TR)","q":"Radyasyon çürükleri ile ilgili aşağıdaki bilgilerden hatalı olan hangisidir?","o":{"A":"Kompleks yapıdadırlar.","B":"Servikal bölgeden başlayarak yayılırlar.","C":"Yaygın çürüklerdir.","D":"İlerleme hızları çok fazladır.","E":"Genellikle kahverengi renktedirler."},"c":"B","e":"Servikalde görülür ama \"servikalden başlayıp yayılmak\" tipik özellikleri değildir; radyasyon çürüğü yaygın, hızlı, kahverengi ve komplekstir. Tuzak: \"servikalden başlar\" ifadesi."},{"k":1,"n":22,"s":"Restoratif (TR)","q":"Aktif çürüklere ait verilen özelliklerden hangisi hatalıdır?","o":{"A":"Yüzey rengi hafif pigmentedir.","B":"Yüzey altı dentin ağrısızdır.","C":"Pulpa yönünde yayılım gösterir.","D":"Yüzeyi yumuşaktır.","E":"Çocuklarda sık görülür."},"c":"B","e":"Aktif çürükte yüzey altı dentin hassasiyet oluşturur, ağrısız değil. Aktif = yumuşak, ilerleyen, hassas. \"Ağrısız\" inaktif/duran çürüğü çağrıştırır → tuzak."},{"k":1,"n":23,"s":"Restoratif (TR)","q":"Düz yüzey çürükleriyle ilgili verilen bilgilerden hangisi yanlıştır?","o":{"A":"Diş dizisinde yeterli fizyolojik temizlik sağlanamamaktadır.","B":"Genellikle ön dişlerin vestibül yüzeylerinde görülür.","C":"Çocuklarda daha sık görülür.","D":"Dişte mine dokusunun kalitesi iyi değildir.","E":"İleri atılım (rampant) yapan çürüklerdir."},"c":"E","e":"Düz yüzey çürüğü yavaş ilerler, başlangıçta beyaz leke verir, remineralizasyon şansı vardır — rampant (ileri atılım) değildir. Rampant = biberon/radyasyon/seri çürükler."},{"k":1,"n":24,"s":"Restoratif (TR)","q":"Aşağıdakilerden hangisi/hangileri mine çürüğü tabakalarındandır? I. Saydam tabaka II. Turbid tabaka III. Yüzeyel tabaka","o":{"A":"Yalnız I","B":"I ve II","C":"II ve III","D":"I ve III","E":"I, II, III"},"c":"D","e":"Mine çürük tabakaları: yüzeyel, gövde, karanlık, saydam (I ve III). Turbid (II) bir DENTİN çürüğü tabakasıdır, mineye ait değil. Karıştırma tuzağı."},{"k":1,"n":25,"s":"Restoratif (TR)","q":"Akut ilerleyen bir yumuşak çürük için çürük yapıcı koşullar ortadan kalkarsa lezyonlar hangi çürük tipine değişim gösterir?","o":{"A":"İleri atılım yapan çürük","B":"Yaygın çürük","C":"Stasyoner çürük","D":"Akut çürük","E":"Foramen çekim çürükleri"},"c":"C","e":"Çürük yapıcı koşullar ortadan kalkınca lezyon durur → stasyoner (durmuş/arrested) çürük. Akut + ortamın düzelmesi = duran çürük. Aktiften inaktife geçiş."},{"k":1,"n":26,"s":"Restoratif (TR)","q":"Demineralizasyon süreci galip geldikten sonra kaviteleşmeye kadar geçen süre ne kadardır?","o":{"A":"12-24 ay","B":"6-8 ay","C":"8-10 ay","D":"3-4 ay","E":"10-12 ay"},"c":"A","e":"Demineralizasyon baskın hale geldikten sonra kaviteleşmeye kadar yaklaşık 12-24 ay geçer. Bu pencere = remineralizasyon/koruyucu müdahale fırsatıdır."},{"k":1,"n":27,"s":"Restoratif (TR)","q":"Aşağıdakilerden hangisi çürük yapıcı mikroorganizmaların özelliklerinden değildir?","o":{"A":"Diş yüzeyine tutunabilme","B":"Hücre dışına ekstrasellüler polisakkarit sentezleyebilme","C":"Asit ortamda yaşayabilme (asidürik olma)","D":"Koloni oluşturamama","E":"Ağıza şeker girmese bile intrasellüler polisakkaritle asit üretebilme"},"c":"D","e":"Çürük bakterileri koloni oluşturur (tutunup çoğalır) — \"oluşturamama\" bir özellik değil, çelişkidir. Asidojen + asidürik + yapışkan + polisakkarit deposu = ideal çürük bakterisi."},{"k":1,"n":28,"s":"Restoratif (TR)","q":"Aşağıdaki cümlelerden hangisi/hangileri yanlıştır? I. Hayat boyu dentin oluşumu devam etmez. II. Çürük, mine dokusunda sement dokusuna göre daha hızlı ilerler. III. Sement çürüğü, mine-dentin çürüğünden farklı olarak sirküler çürük oluşturma eğilimindedir.","o":{"A":"I ve II","B":"II ve III","C":"Hepsi","D":"I ve III","E":"Yalnız III"},"c":"A","e":"Dentin oluşumu hayat boyu devam eder (I yanlış). Çürük sementte mineye göre daha hızlı ilerler — sement yumuşaktır (II yanlış). Sement çürüğünün sirküler (halka) yayılması doğrudur (III)."},{"k":1,"n":29,"s":"Restoratif (TR)","q":"Demineralizasyon olayında meydana gelen asit atağı ile ilgili bilgilerden hangisi yanlıştır?","o":{"A":"Asitler mine rodları arasından ilerler.","B":"Asitler kristal yapının paralel olmadığı zayıf bölgelerden penetre olurlar.","C":"Glikoliz sonucu meydana gelen laktik asit dişlere atak yapar.","D":"Asitler inorganik yapıyı çözerek etki gösterirler.","E":"Ağız ortamında pH değeri düşünce asit konsantrasyonu artmaya başlar."},"c":"D","e":"Asit atağı önce inorganik (mineral) yapıyı çözer. Not: Bu soru orijinal kâğıtta \"?\" ile işaretlenmiş, net bir cevap anahtarı verilmemiş; işaretlenen şık D'dir, ancak ders notunla bir kez daha karşılaştırmanı öneririm."},{"k":1,"n":30,"s":"Restoratif (TR)","q":"30 'Çürüğü oluşturan mikroorganizmalar tek tür/tip değildir.' cümlesi doğrumu yanlış mı?","o":{"A":"Doğru","B":"Yanlış"},"c":"A","e":"Doğru. Çürük tek bir türün işi değil; S. mutans başlatır, laktobasiller ilerletir, Actinomyces kök çürüğünde rol alır. Polimikrobiyal bir süreçtir."},{"k":1,"n":31,"s":"Restoratif (TR)","q":"Çürük oluşumu için mine yüzeyinde _____ iyonları yoğunlaşırve atak yapar. Boşluğa uygun kelime hangisidir?","o":{"A":"Potasyum","B":"Kalsiyum","C":"Azot","D":"Hidrojen","E":"Silisyum"},"c":"D","e":"Asit demek hidrojen(H+) iyonu demek; mine yüzeyindeH+ yoğunlaşır, mineralleri çözer. pH düşüşünün failidir."},{"k":1,"n":32,"s":"Restoratif (TR)","q":"Mine çürüğü için kritikpH= _____ iken, sement çürüğü için kritikpH= _____ 'dır. Boşluklara gelebilecek uygun değerler hangileridir?","o":{"A":"7 / 4","B":"7 / 6","C":"5,5 / 6,7","D":"3 / 7","E":"4 / 5"},"c":"C","e":"Mine kritik pH ≈ 5,5; kök/sement kritik pH ≈ 6,7. Sement daha az mineralize olduğu için daha yüksek (daha az asidik) pH'da çözünür — bu yüzden kök çürüğü daha kolay başlar."},{"k":1,"n":33,"s":"Restoratif (TR)","q":"Aşağıdaki cümlelerden hangisi/hangileri yanlıştır? I. Sement çürüklerinde kök yüzeyi açığa çıkmadan çürük oluşmaz. II. Sement çürükleri klinikte görülebilir hale geldiğinde olay dentine ulaşmıştır. III. Sement çürüğünde aktinomiçesler rol oynamamaktadır. IV. Sement çürüklerine genç bireylerde sıklıkla rastlanır.","o":{"A":"I ve II","B":"III ve IV","C":"I, III, IV","D":"Hepsi","E":"II, III, IV"},"c":"B","e":"Sement çürüğünde aktinomiçesler rol OYNAR (A. viscosus, A. naeslundii) → III yanlış. Ve yaşlılarda sık görülür, genç değil → IV yanlış. I-II doğru."},{"k":1,"n":34,"s":"Restoratif (TR)","q":"Servikal bölgede görülen çürüklerle ilgili verilen bilgilerden hangisi hatalıdır?","o":{"A":"Genelde vestibül yüzeyde görülürler.","B":"Islak çürüklerdir.","C":"Akut ilerlerler.","D":"Lezyon sınırında opak mine çerçevesi vardır.","E":"İleri atılım (rampant) yaparlar."},"c":"E","e":"Servikal çürükler ileri atılım (rampant) yapmaz → E hatalı. Vestibülde görülür, ıslak karakterdedir, kenarında opak mine halkası bulunur."},{"k":1,"n":35,"s":"Restoratif (TR)","q":"Diş sert dokusuna göre yapılan çürük sınıflandırması aşağıdakilerden hangisidir?","o":{"A":"Hızlı ilerleyen – progresif – non-invazif çürük","B":"Hiçbiri","C":"Yumuşak – sert çürük","D":"Mine – pulpa – sement çürüğü","E":"Pulpa – sement – akut çürük"},"c":"B","e":"Diş sert dokusuna göre sınıflama mine–dentin–sement çürüğüdür. Seçeneklerin hiçbiri bunu doğru vermiyor (D'de \"pulpa\" var, dentin yok) → doğru cevap Hiçbiri."},{"k":1,"n":36,"s":"Restoratif (TR)","q":"Aşağıdakilerden hangisi klasik çürük teorilerinden biri değildir?","o":{"A":"Parazitler (septik) teori","B":"Proteoliz-şelasyon teorisi","C":"Kimyasal (asit) teori","D":"Kurt teorisi","E":"Vital teori"},"c":"B","e":"Proteoliz-şelasyon MODERN teoridir, klasik değil. Klasikler: Kurt, Vital, Parazit, Kimyasal (Asit). Modernler: Kemoparaziter, Proteolitik, Proteoliz-Şelasyon."},{"k":1,"n":37,"s":"Restoratif (TR)","q":"Çürük yapıcı mikroorganizmalar tarafından alınan besinlerin son ürünü olarak üretilen _____ diş minesine atak yapar. Boşluğa hangisi gelmelidir?","o":{"A":"Glikoz","B":"Sitrik asit","C":"Sukroz","D":"Amilaz","E":"Laktik asit"},"c":"E","e":"Bakteriler şekeri glikolizle parçalayınca son ürün laktik asittir; mineye atak yapan da odur. Şeker → laktik asit → demineralizasyon zinciri."},{"k":1,"n":38,"s":"Restoratif (TR)","q":"Aşağıdaki cümlelerden hangisi/hangileri doğrudur? I. Çürüğün beyaz lekesi ile mine hipokalsifikasyonunun ayırt edilmesi önemlidir. II. Çürük belirleme ve değerlendirme sisteminde tek skor kullanılmaktadır. III. Karanlık tabaka mine lezyonunun en üstteki tabakasıdır ve dikkat edilmesi gerekmektedir.","o":{"A":"Yalnız II","B":"Yalnız III","C":"I ve II","D":"Yalnız I","E":"I ve III"},"c":"D","e":"Sadece I doğru: çürük beyaz lekesini mine hipokalsifikasyonundan ayırmak şart. Değerlendirmede tek skor kullanılmaz (II yanlış); minenin en üst tabakası yüzey tabakasıdır, karanlık değil (III yanlış)."},{"k":1,"n":39,"s":"Restoratif (TR)","q":"Aşağıdaki cümlelerden hangisi/hangileri yanlıştır? I. Sement çürüğüne çok genç yaşta rastlanır. II. Dişin kolesinde (boyun) sement kalınlığı çok fazladır. III. Sement çürüğü olabilmesi için sementin ağız ortamıyla temasta olması gerekir.","o":{"A":"I ve II","B":"II ve III","C":"I ve III","D":"I, II, III","E":"Yalnız III"},"c":"A","e":"Sement çürüğü yaşlılarda sık (I yanlış); sement kolede ince, apekse doğru kalınlaşır (II yanlış). III doğru: sement ağız ortamına açılmadan çürüyemez."},{"k":1,"n":40,"s":"Restoratif (TR)","q":"Aşağıdakilerden hangisi dentin çürüğü tabakalarından değildir?","o":{"A":"Transparan dentin bölgesi","B":"Yüzeyel dentin bölgesi","C":"Subtransparan dentin bölgesi","D":"Turbid (bulanık) dentin bölgesi","E":"Enfekte olmuş dentin bölgesi"},"c":"B","e":"Dentin çürük tabakaları: transparan (sklerotik), subtransparan, turbid, enfekte (+ bazı kaynaklarda nekrotik). \"Yüzeyel dentin bölgesi\" diye bir tabaka yoktur → B."},{"k":1,"n":41,"s":"Restoratif (TR)","q":"Aproksimal bölgede görülen çürüklerde genellikle başlangıç noktası neresidir?","o":{"A":"Kesici kenara yakın bölge","B":"Marjinal mine tümseği","C":"Gingival oluk","D":"Dişetinin altı","E":"Kontak noktasının hemen altı"},"c":"E","e":"Aproksimal çürük kontak noktasının hemen altında başlar — orası temizliğin en zor, plağın en çok biriktiği bölgedir. Komşu dişle temasın hemen servikalinde."},{"k":1,"n":42,"s":"Restoratif (TR)","q":"Uluslararası çürük belirlemeve değerlendirme sisteminin kısaltması aşağıdakilerden hangisidir?","o":{"A":"IBDAS","B":"ICDAS","C":"IDCAS","D":"IGDAS","E":"ICCDAS"},"c":"B","e":"ICDAS = International Caries Detection and Assessment System (Uluslararası Çürük Belirleme ve Değerlendirme Sistemi). C-D-A-S harf sırasını hatırla."},{"k":1,"n":43,"s":"Restoratif (TR)","q":"Çürük gelişimi sürecindeen önemli etken olan mikroorganizmalar aşağıdakilerden hangisidir?","o":{"A":"Veillonellalar","B":"Laktobasiller","C":"Aktinomiçesler","D":"Streptokokus mutanslar","E":"Streptokokus mitisler"},"c":"D","e":"Çürüğü başlatan ve sürecin baş aktörü S. mutans'tır. Laktobasil ilerletir, Actinomyces kök çürüğü yapar, Veillonella laktat tüketir (primer etken değil)."},{"k":1,"n":44,"s":"Restoratif (TR)","q":"Rampant çürüklerle ilgili aşağıdakilerden hangisi doğrudur?","o":{"A":"Lezyon açık sarı/pembe yerine daha çok koyu kahverengindedir.","B":"Rampant çürükler yalnızca belirli bir yaş aralığında görülür.","C":"Ağız kuruluğu olan hastalarda rampant çürük gelişme ihtimali azalır.","D":"Öncelikle maksiller kesici dişlerin labial yüzeylerinde beyaz tebeşir görünümlü lezyon olarak başlar.","E":"Önce dişlerin tedavisi yapılmalı, etiyolojik faktörlere ikinci basamakta bakılmalıdır."},"c":"D","e":"Rampant çürük üst kesici dişlerin labial yüzeyinde beyaz tebeşirimsi lezyonla başlar → D doğru. Açık renkli/yumuşaktır, her yaşta olur, kuru ağız riski artırır, önce etiyoloji yönetilir."},{"k":1,"n":45,"s":"Restoratif (TR)","q":"Derin dentin çürükleri için etkilenmiş dentinve enfekte dentinin klinik/histolojik ayrımı hakkında hangi seçenek en doğrudur?","o":{"A":"Etkilenmiş dentinde kollajen fibriller tamamen yıkılmıştır, mutlaka kaldırılmalıdır.","B":"Enfekte dentin fizyolojik olarak remineralize olabilir ve odontoblastik tabakası korunmuştur.","C":"Etkilenmiş dentin yumuşak-sarı olup tamamen çıkarılmalıdır çünkü remineralizasyon potansiyeli yoktur.","D":"Enfekte dentin bakteriyel kontaminasyonu yüksek, yumuşak, sarı renkli ve geri dönüşümsüz etkilenmiş bir tabakadır.","E":"Enfekte dentin bakteri invazyonu düşük, sert yapıda ve canlı tabakanın korunduğu bölgedir."},"c":"D","e":"Enfekte dentin = bol bakteri + yumuşak + geri dönüşümsüz → kaldırılır (D doğru). Etkilenmiş (affected) dentin ise az bakteri, remineralize olabilir, korunur. A/C/E enfekte ile etkilenmişi yer değiştirmiş."},{"k":1,"n":46,"s":"Biyokimya","q":"Aşağıdaki faktörlerden hangisi biyolojik çözünürlük döngüsünde remineralizasyon tarafında etkili DEĞİLDİR?","o":{"A":"Antimikrobiyal ajanlar","B":"Tükürük","C":"Zayıf diş yapısı","D":"Uygun diyet","E":"Remineralizasyon ajanları"},"c":"C","e":"Zayıf diş yapısı çürüğe YATKINLIĞI artırır — demineralizasyon tarafındadır, remineralizasyona katkısı yok. Antimikrobiyal/tükürük/diyet/florür dengeyi remineralizasyona çeker."},{"k":1,"n":47,"s":"Biyokimya","q":"Hastadan alınan anamneze bağlı olarak kötü beslenmeyle ilişkili çürük aktivitesi şüphesi varsa, hangi testle daha kesin tanı koyabilirsiniz?","o":{"A":"Tamponlama kapasitesi ölçümü","B":"Maya sayımı","C":"Mutans streptokok sayımı","D":"Laktobasil sayımı","E":"Tükürük akış hızı ölçümü"},"c":"D","e":"Laktobasil sayımı beslenme/şeker tüketimiyle doğrudan ilişkilidir; yüksek laktobasil = yüksek karbonhidrat alımı. Diyet kaynaklı çürük şüphesinde tercih edilen testtir."},{"k":1,"n":48,"s":"Biyokimya","q":"48 ''Çeşitli mikroorganizmaların diş yüzeyindeki glikoprotein film tabakasında oluşturduğu yapışkan, horizontal ve vertikal gelişen birikintiye _____ denir.'' Boşluğa hangisi gelir?","o":{"A":"Mikrop","B":"Çürük","C":"Pelikıl","D":"Bakteri plağı","E":"Kronik yapı"},"c":"D","e":"Glikoprotein film üzerinde gelişen yapışkan, horizontal-vertikal birikinti bakteri plağıdır (biofilm). Pelikıl onun altındaki ilk asellüler tabakadır; plak onun üstüne kurulur."},{"k":1,"n":49,"s":"Biyokimya","q":"Uyarılmamış tükürük içerisindeen aktif çalışan tamponlama sistemi aşağıdakilerden hangisidir?","o":{"A":"Fosfat tamponlama sistemi","B":"Bikarbonat tamponlama sistemi","C":"Üre","D":"Amonyak","E":"Ca-PO4 sistemi"},"c":"A","e":"Dinlenmiş (uyarılmamış) tükürükte fosfat tamponu baskındır; akış hızı artınca (uyarılmış) bikarbonat devreye girer. Düşük akış = fosfat, yüksek akış = bikarbonat."},{"k":1,"n":50,"s":"Biyokimya","q":"Ağız ortamındakipH değerinin düşmesi için hangi iyon konsantrasyonunun artması gerekir?","o":{"A":"H","B":"OH","C":"PO4","D":"Ca","E":"F"},"c":"A","e":"pH'ı düşüren şeyH+ (hidrojen) iyonu artışıdır.OH- tam tersine pH'ı yükseltir. Asitlik=H+ bolluğu."},{"k":1,"n":51,"s":"Biyokimya","q":"Aşağıdakilerden hangisi yanlıştır?","o":{"A":"Ağız mukozası sınırsız nem oranına sahiptir.","B":"Ağız mukozası 6,0-7,8 arasında uygun pH değerlerine sahiptir.","C":"Ağız mukozasında 25-40°C ısı değişkenliği mevcuttur.","D":"Ağız mukozası bakteriler için sürekli beslenme olanaklarına sahiptir.","E":"Ağız mukozası ekosistemi oluşturan yapılardan biri değildir."},"c":"E","e":"Ağız mukozası tam tersine çok iyi bir ekosistem sağlar (nem, ısı, pH, besin hepsi var) → \"ekosistem oluşturmaz\" ifadesi yanlış. Diğer dört şık ideal bakteri ortamını anlatır."},{"k":1,"n":52,"s":"Biyokimya","q":"Remineralizasyon sürecinde mine kristalleri içeriğine hangi iyon çökeldiği zaman kristal yapı form değiştirir ve güçlenir?","o":{"A":"Ca","B":"PO4","C":"F","D":"H","E":"OH"},"c":"C","e":"Florür(F-) mine kristaline girince hidroksiapatit→ floroapatite dönüşür; daha güçlü, asite daha dirençli, daha düşük çözünürlüklü. Remineralizasyonun yıldız iyonu."},{"k":1,"n":53,"s":"Biyokimya","q":"Oral kavitede tükürük miktarı azaldığında aşağıdaki değişimlerden hangisi GÖRÜLMEZ?","o":{"A":"Minenin olgunlaşması etkilenir.","B":"Yeme zamanı uzar.","C":"Daha fazla besin retansiyonu meydana gelir.","D":"Ağız florasında değişimler gözlenir.","E":"Besinler daha kolay sindirilebilir."},"c":"E","e":"Tükürük azalınca sindirim zorlaşır, kolaylaşmaz → E görülmez. Kuru ağızda olgunlaşma bozulur, yemek uzar, besin birikir, flora değişir."},{"k":1,"n":54,"s":"Biyokimya","q":"Mine apatitinin kimyasal dengesini sağlayan faktörlerden hangisi yanlıştır?","o":{"A":"Tükürükteki serbest Ca konsantrasyonu","B":"Ortam pH'sı","C":"TükürüktekiPO4 konsantrasyonu","D":"Tükürükteki serbest F konsantrasyonu","E":"Apatit kristallerinin dizilimi"},"c":"E","e":"Kristal dizilimi yapısal bir özelliktir, kimyasal denge faktörü değil. Dengeyi Ca,PO4,F konsantrasyonları ve pH belirler (çözünürlük çarpımı). Dizilim denkleme girmez."},{"k":1,"n":55,"s":"Biyokimya","q":"Tükürüğün koruyucu görevlerinden biri olan gıdaların kayganlaştırılması _____ tarafından sağlanır. Boşluğa hangisi gelmelidir?","o":{"A":"Lizozim","B":"Üre","C":"Fosfat","D":"Amilaz","E":"Müsin"},"c":"E","e":"Müsin tükürüğün kayganlaştırıcısı/yağlayıcısıdır; lokmayı kaplar, yutmayı kolaylaştırır, mukozayı korur. Tükürüğe \"viskoz jel\" kıvamını veren glikoprotein."},{"k":1,"n":56,"s":"Biyokimya","q":"Aşağıdaki testlerden hangisi tükürük akış hızını tespit etmemizi sağlar?","o":{"A":"Snyder testi","B":"Dentocult CA","C":"Oricult N","D":"Proflow","E":"Dentobuff"},"c":"D","e":"Proflow tükürük akış hızını ölçer. Snyder = asit/çürük aktivitesi, Dentocult CA = Candida, Oricult N = oral mikroorganizma, Dentobuff = tamponlama kapasitesi."},{"k":1,"n":57,"s":"Biyokimya","q":"Ağızda gerçekleşen sindirimde özellikle nişastave glikojen tipindeki polisakkaritlerin parçalanması hangi enzim tarafından katalize edilir?","o":{"A":"Apoenzim","B":"Tripsin","C":"Alfa amilaz","D":"Pepsin","E":"Beta kohidraz"},"c":"C","e":"Ağızda nişasta/glikojen gibi polisakkaritleri parçalayan enzim alfa-amilaz (pityalin). Tripsin/pepsin = protein; apoenzim = enzimin protein kısmı; beta kohidraz eski/geçersiz bir addır."},{"k":1,"n":58,"s":"Biyokimya","q":"Tükürük bileşimindeki maddelerden hangisinin mikroorganizmalar üzerinde antibakteriyel etkisi bulunmaz?","o":{"A":"Alfa-amilaz","B":"Üre","C":"Statherin","D":"Histatin","E":"Laktoferrin"},"c":"B","e":"Üre'nin doğrudan antibakteriyel etkisi yoktur; amonyağa dönüşüp pH'ı yükselterek tamponlama yapar. Histatin (antifungal/antibakteriyel) ve laktoferrin (demir bağlar) gerçek savunma proteinleridir."},{"k":1,"n":59,"s":"Biyokimya","q":"Tamamen temizlenen bir diş yüzeyinde pelikıl kalınlığı süreç içinde _____. Boşluğa hangi kelime uygundur?","o":{"A":"Önce azalıp sonra artmaktadır","B":"Azalmaktadır","C":"Artmaktadır","D":"Değişmemektedir","E":"Önce artıp sonra azalmaktadır"},"c":"C","e":"Diş temizlendikten saniyeler sonra pelikıl yeniden oluşur ve zamanla kalınlığı artar. Tükürük proteinleri sürekli birikir; durdurulamayan bir kaplama sürecidir."},{"k":1,"n":60,"s":"Biyokimya","q":"Disakkaritlerden olan laktozun (süt şekeri) bileşenleri aşağıdakilerden hangisinde doğru verilmiştir?","o":{"A":"Fruktoz – Nişasta","B":"Glikoz – Galaktoz","C":"Glikoz – Glikoz","D":"Glikoz – Fruktoz","E":"Galaktoz – Fruktoz"},"c":"B","e":"Laktoz = Glikoz + Galaktoz (süt şekeri). Karıştırma: Maltoz = Glikoz+Glikoz, Sakkaroz = Glikoz+Fruktoz. \"Süt → galaktoz\" diye hatırla."},{"k":1,"n":61,"s":"Pedodonti","q":"Beslenme ile çürük ilişkisinde aşağıdaki kriterlerden hangisi önemli değildir?","o":{"A":"Tükürük akış oranı","B":"Florid varlığı","C":"Plak kompozisyonu","D":"Alınan protein ve yağ miktarı","E":"Fermente edilebilen karbonhidrat tipi ve alım miktarı"},"c":"D","e":"Çürük karbonhidrata bağlıdır; protein ve yağ miktarı önemli değildir (fermente olmaz, asit yapmaz). Önemli olan: tükürük, florür, plak ve karbonhidrat alımı."},{"k":1,"n":62,"s":"Pedodonti","q":"Ksilitolün karyostatik etkisi aşağıdaki bilgilerden hangisi ile ilişkili değildir?","o":{"A":"Mikroorganizmaların hücre duvarını yıkarlar.","B":"Plakta amonyak meydana getirerek tamponlama yapar.","C":"Florürle sinerji etki oluşturur.","D":"Bakteri enzimlerini doğrudan inhibe edebilir.","E":"Hiçbir bakteri tarafından fermente edilemez."},"c":"A","e":"Ksilitol hücre duvarını yıkmaz; bakteriyi metabolize edemediği şekerle \"aç bırakır\", enerjisini boşa harcatır. Mekanizma: açlık + enzim inhibisyonu + florür sinerjisi."},{"k":1,"n":63,"s":"Pedodonti","q":"Aşağıdaki gıdalardan hangisi çürük oluşturma potansiyeli açısından ''güvenilir gıdalar'' arasında kabul edilmez?","o":{"A":"Lifli Gıda","B":"Kakao","C":"Kepekli Un","D":"Peynir","E":"Zeytinyağı"},"c":"E","e":"Çürük açısından \"güvenilir gıdalar\" listesinde lifli gıda, kakao, kepekli un ve peynir vardır;"},{"k":1,"n":64,"s":"Pedodonti","q":"İdeal bir diş macunu aşağıdaki özelliklerden hangisine sahip değildir?","o":{"A":"Çürük önleyici etkisi olmalı","B":"Fiyatı uygun olmalı","C":"Kolay temizlenebilir olmalı","D":"Ağız mukozasını irrite etmemeli","E":"Sert aşındırıcı partiküllerle etkili temizlik yapabilmeli"},"c":"E","e":"Macun sert/aşındırıcı OLMAMALI — mineyi ve dentini aşındırır. İdeal macun düşük abrazyonlu, irrite etmeyen, koruyucu olmalıdır. \"Sert aşındırıcı\" istenmeyen bir özelliktir."},{"k":1,"n":65,"s":"Pedodonti","q":"Çürük riski tespit edilen bir hastanın diyeti düzenlenirken aşağıdaki önerilerden hangisi VERİLMEZ?","o":{"A":"Asitli içecekleri ana öğünlerinizde tüketin.","B":"Yiyecekleri haşlamak yerine kızartarak yiyin.","C":"Şekerleri ana öğünle alın.","D":"Öğünleri peynirle bitirin.","E":"Ara öğünlerde tükürük akışını uyaran besinler tüketin."},"c":"B","e":"Kızartmak yerine haşlamak daha sağlıklıdır → B verilmez. Diğer öneriler doğru: asit/şekeri ana öğünde sınırla, peynirle bitir (pH yükseltir), tükürüğü uyar."},{"k":1,"n":66,"s":"Pedodonti","q":"Diş macunlarının içerdiği maddeler göz önüne alındığında aşağıdakilerden hangisi bulunmaz?","o":{"A":"Siyanoakrilat","B":"Kalsiyum karbonat","C":"Sodyum bikarbonat","D":"Sodyum lauryl sülfat","E":"Sodyum klorid"},"c":"A","e":"Siyanoakrilat = \"Japon yapıştırıcısı\", macunda bulunmaz. Diğerleri var: Ca-karbonat (abraziv), Na-bikarbonat (tampon), SLS (köpürtücü), NaCl."},{"k":1,"n":67,"s":"Pedodonti","q":"Aşağıdakilerden hangisi çocukluk döneminde diş çürüğü riski belirleme kriterleri arasında değildir?","o":{"A":"Dişlerde yapısal bozukluklar","B":"Fissür örtücü uygulamaları","C":"Ara öğün beslenmesinin sıklığı","D":"Şeker içeren ilaçların sık alınması","E":"Yüksek mutans streptokok düzeyi"},"c":"B","e":"Fissür örtücü çürüğü ÖNLER, risk faktörü değil — tam tersi koruyucudur. Risk kriterleri: yapısal bozukluk, sık ara öğün, şekerli ilaç, yüksek S. mutans."},{"k":1,"n":68,"s":"Pedodonti","q":"Aşağıdaki yöntemlerden hangisi plağı dişler üzerinden uzaklaştırmada etkili değildir?","o":{"A":"Diş fırçaları","B":"Diş ipleri","C":"Ara yüz fırçaları","D":"İnterdental temizlik araçları","E":"Fissür sealantlar"},"c":"E","e":"Fissür sealant plak temizlemez; okluzal pit-fissürleri kapatarak çürüğü önler — mekanik temizlikle alakası yok. Plak uzaklaştırma = fırça, ip, arayüz fırçası."},{"k":1,"n":69,"s":"Pedodonti","q":"Aşağıdaki gıdalardan hangisi plak pH'ını 5,5'in altına düşmesine neden olmaz?","o":{"A":"Fındık","B":"Portakal","C":"Beyaz ekmek","D":"Elma","E":"Kuru incir"},"c":"A","e":"Fındık (yağlı kuruyemiş) fermente olmaz, plak pH'ını kritik 5,5'in altına düşürmez → çürük yapıcı değil. Portakal/elma (asit+şeker), beyaz ekmek (nişasta), incir (yapışkan şeker) düşürür."},{"k":1,"n":70,"s":"Pedodonti","q":"Aşağıda verilen seçeneklerden hangisi plak kontrol işlemleri sırasında kullanılan interdental araçlara örnek değildir?","o":{"A":"Ağız duşu","B":"Diş ipi","C":"Ara yüzey fırçası","D":"Polisaj lastiği","E":"Lastik uçlu stimülatör"},"c":"D","e":"Polisaj lastiği cila/parlatma aracıdır, interdental temizlik aracı değil — plak kontrolüyle ilgisi yok. İnterdental araçlar: ağız duşu, ip, arayüz fırçası, stimülatör."},{"k":1,"n":71,"s":"Pedodonti","q":"Düşük karyojenik potansiyeli olan bir gıdada aşağıdaki özelliklerden hangisi bulunmaz?","o":{"A":"6,0'dan büyük pH","B":"Orta ölçüde yağ içeriği","C":"Yüksek karbonhidrat içeriği","D":"Güçlü tamponlama kapasitesi","E":"Tükürük akışını stimüle etme kabiliyeti"},"c":"C","e":"Yüksek karbonhidrat = yüksek karyojenik potansiyel → düşük karyojenik gıdada bulunmaz. Düşük riskli gıda: yüksek pH, yağ içeren, tamponlayan, tükürüğü uyaran gıdadır."},{"k":1,"n":72,"s":"Pedodonti","q":"Aşağıdakilerden hangisi fissür örtücü uygulamalarında başarısızlık nedenleri arasında yer almaz?","o":{"A":"Asitleme sonrasında yeterli yıkama yapılmaması","B":"Asitleme süresinin yetersiz olması","C":"Dişin tükürük ile kontamine olması","D":"Polimerizasyon için yeterli süre ve ışık yoğunluğunun kullanılmaması","E":"Asitleme öncesi yüzeyin iyi temizlenmesi"},"c":"E","e":"Asitleme öncesi yüzey temizliği DOĞRU bir adımdır, başarı sağlar → başarısızlık i değil. Başarısızlık: kötü yıkama, kısa asitleme, tükürük bulaşı, eksik polimerizasyon."},{"k":1,"n":73,"s":"Pedodonti","q":"Yetişkin diş macunundaki flor konsantrasyonu aşağıdakilerden hangisinde doğru verilmiştir?","o":{"A":"550 ppm","B":"750 ppm","C":"1450 ppm","D":"1150 ppm","E":"350 ppm"},"c":"C","e":"Yetişkin = 1450 ppm. Çocuk 0-3 yaş ≈ 1000 ppm, 3-6 yaş 1000-1450 ppm, yüksek riskte reçeteli 5000 ppm. Standart yetişkin macunu = 1450."},{"k":1,"n":74,"s":"Pedodonti","q":"Aşağıdakilerden hangisi günümüzdeen sık kullanılan fissür örtücü materyalidir?","o":{"A":"Bis-GMA esaslı rezinler","B":"Cam İyonomer Simanlar","C":"Poliüretanlar","D":"Siyanoakrilatlar","E":"Polikarboksilat Simanlar"},"c":"A","e":"Günümüzde en sık Bis-GMA esaslı rezinler kullanılır (iyi retansiyon, dayanıklılık). Cam iyonomer flor salar ama daha az tutucudur → ıslak/uyumsuz sahalarda alternatiftir."},{"k":1,"n":75,"s":"Pedodonti","q":"Aşağıdakilerden hangisi iyi bir fissür örtücüde bulunması gereken özellikler arasında yer almaz?","o":{"A":"Organizma ve diş dokuları için toksik olmamalı","B":"Çeşitli sıvı ve iyonların geçişine izin vermeli","C":"Fissürlere iyi yerleşecek şekilde viskozitesi az, akışkanlığı fazla olmalı","D":"Uygulaması kolay olmalı","E":"Ağızdaki tüm fonksiyonel kuvvetlere dirençli olmalı"},"c":"B","e":"Örtücü fissürü tam kapatmalı, sıvı/iyon geçişine izin VERMEMELİ → B yanlış özellik. Amaç bakteriyi/asidi dışarıda tutmak; geçirgenlik koruma amacını bozar."},{"k":1,"n":76,"s":"Pedodonti","q":"Aşağıdakilerden hangisi fissür örtücü endikasyonları arasında yer almaz?","o":{"A":"Arayüz çürüğü bulunan dişler","B":"Oral hijyeni yeterince sağlayamayan hastalar","C":"Sürmesini tamamlamış dişler","D":"Derin ve dar fissür/pitleri olan süt molar, daimi molar ve premolar dişler","E":"Lingual pit ve fissür bulunan kesici dişler"},"c":"A","e":"Arayüz (aproksimal) çürüğü olan diş restoratif tedavi ister, fissür örtücü tek başına yetmez → endikasyon değil. Örtücü sağlam/derin fissürlü okluzal yüzeyler içindir."},{"k":1,"n":77,"s":"Pedodonti","q":"Aşağıdaki uygulamalardan hangisi profesyonel flor uygulamaları arasında değildir?","o":{"A":"Vernikler","B":"Jeller","C":"Gargaralar","D":"Solüsyonlar","E":"Cilalar"},"c":"C","e":"Gargaralar bireysel (evde) uygulamadır, profesyonel değil. Hekim tarafından uygulanan profesyonel formlar: vernik, jel, solüsyon, cila (köpük dahil)."},{"k":1,"n":78,"s":"Pedodonti","q":"Aşağıdakilerden hangisi akut flor zehirlenmesi bulguları arasında değildir?","o":{"A":"Abdominal ağrı","B":"Kramp","C":"Mide bulantısı","D":"Kabızlık","E":"Kardiak aritmi"},"c":"D","e":"Akut flor zehirlenmesinde kabızlık DEĞİL, ishal görülür (bağırsak hareketi artar). Bulgular: karın ağrısı, kramp, bulantı/kusma, aritmi. \"Kabızlık\" tuzaktır."},{"k":1,"n":79,"s":"Pedodonti","q":"79 %2-4'lük NaF solüsyonu için aşağıda verilenlerden hangisi yanlıştır?","o":{"A":"Çürük riski yüksek ve ağzında fazla restorasyon olanlarda kullanımı önerilir.","B":"Nötral pH'ya sahiptir.","C":"Knutson tekniği ile uygulanır.","D":"Solüsyon plastik şişelerde saklanmalıdır.","E":"Dişlerde boyama yapabilir."},"c":"E","e":"NaF dişleri boyamaz; boyama kalay (Sn) içeren SnF2 preparatlarına özgüdür. NaF nötral pH'lı, Knutson tekniğiyle uygulanır, plastik şişede saklanır (cam, F ile reaksiyona girer)."},{"k":1,"n":80,"s":"Pedodonti","q":"Aşağıdaki hastaların hangisinde özel bakım programı hazırlamamıza gerek yoktur?","o":{"A":"Hipertansiyonlu hasta","B":"Otizmli hasta","C":"Serebral Palsili hasta","D":"Madde Bağımlısı Hasta","E":"Kanser Hastası"},"c":"A","e":"Hipertansiyon hastası kendi öz bakımını yapabilir → özel program gerekmez. Otizm, serebral palsi, madde bağımlılığı ve kanser hastaları özel gereksinim/destek ister."},{"k":1,"n":81,"s":"Pedodonti","q":"81Ön dişler arasında yer alan, lokalizasyonve form olarak değişiklik gösteren dişlere ne ad verilir?","o":{"A":"Ektopik diş","B":"Odontoma","C":"Mesiodens","D":"Natal diş","E":"Neonatal diş"},"c":"C","e":"İki üst santral arasında yerleşen, küçük/konik supernümerer diş mesiodens'tir. Ektopik = yanlış yerde süren; odontoma = tümör benzeri; natal = doğumda var; neonatal = ilk 30 günde süren."},{"k":1,"n":82,"s":"Pedodonti","q":"Aşağıdaki durumlardan hangisi daha çok erişkin dönemde ortaya çıkan sürme hareketiyle ilişkilidir?","o":{"A":"12-18 yaş alveol yükseklik artışına bağlı yeniden aktif sürme","B":"Okluzyona ulaşan dişlerde birkaç yıllık inaktif dönem","C":"Atrizyon ve abrazyona bağlı okluzal boyut azalması sonrası görülen diş hareketi","D":"Okluzyona ulaşmadan hemen sonra görülen vertikal büyüme","E":"Okluzal temasa bağlı minimal devam eden fizyolojik diş hareketi"},"c":"C","e":"Erişkinde aşınma (atrizyon/abrazyon) okluzal boyutu azaltınca diş bunu telafi için sürmeye devam eder → C. Diğerleri genç/gelişim dönemine ait sürme evreleridir."},{"k":1,"n":83,"s":"Pedodonti","q":"Aşağıdakilerden hangisi erken çocukluk çağı çürüğünün (EÇÇ) gelişmesindeki risk faktörlerinden biri değildir?","o":{"A":"S. mutans gibi karyojenik bakterilerin ağızda kolonize olması","B":"Gece boyunca biberonla süt/şekerli sıvı içirilerek uyutulması","C":"Emziğin bala/reçele batırılarak verilmesi","D":"Dişlerde immatür mine ve/veya derin pit-fissür varlığı","E":"Şekerli içecekler tüketilirken pipet kullanılması"},"c":"E","e":"Pipet, sıvıyı dişlere doğrudan değdirmez → çürük riskini azaltır, risk faktörü değil. Gerçek riskler: erken S. mutans kolonizasyonu, gece biberonu, ballı emzik, immatür mine."},{"k":1,"n":84,"s":"Pedodonti","q":"Aşağıdakilerden hangisi kök gelişimi teorisinin diş sürmesini açıklamada yetersiz kalmasının bir nedenidir?","o":{"A":"Dişlerin hiç kök gelişimi olmadan sürebilmesi","B":"Periodontal liflerin oluşumunun daha erken başlaması","C":"Diş sürmesi sırasında sinir gelişiminin artması","D":"Kök gelişiminin diş sürmesinden sonra başlaması","E":"Sadece süt dişleri için geçerli olması"},"c":"A","e":"Kök hiç gelişmeden bile diş sürebiliyor → \"kökün itmesi sürmeyi sağlar\" teorisini çürütür. Bu gözlem teorinin temelini geçersiz kılar."},{"k":1,"n":85,"s":"Pedodonti","q":"Geleneksel çürük uzaklaştırma teknikleri ile ilgili hangisi yanlıştır?","o":{"A":"Çürük temizliğinde ağrı kontrolü için lokal anesteziye ihtiyaç duyulabilir.","B":"Geleneksel yöntemle çürük temizlenirken hasta basınç ve titreşim hissetmemektedir.","C":"Çürük lezyonunu temizlemek için yüksek hızlı el aletleri kullanılır.","D":"Enfekte/etkilenmiş doku seçici çıkarılamadığı için pulpada olumsuz biyolojik reaksiyon olabilir.","E":"Titreşim, basınç, ağrı ve anestezi gereksinimi çocuk hastalarda tedavi sürecini olumsuz etkileyebilir."},"c":"B","e":"Geleneksel (frez) yöntemde hasta basınç ve titreşimi HİSSEDER → B yanlış. Yüksek devirli aletler titreşim, ısı, gürültü ve sık anestezi gerektirir; çocukta zorludur."},{"k":1,"n":86,"s":"Pedodonti","q":"86 '_____' dişin sürmemesiyle sonuçlanan, kuron ile kök arasında ciddi bir açı ile karakterize dental deformitedir. Boşluğa hangisi gelir?","o":{"A":"Hiperdonti","B":"Taurodontizm","C":"Odontoma","D":"Dilaserasyon","E":"Mesiodens"},"c":"D","e":"Kuron–kök arasında ciddi açılanma = dilaserasyon (genelde gelişim sırasında travmaya bağlı). Taurodontizm = uzun pulpa/apikal furkasyon; hiperdonti = fazla diş; odontoma = hamartom."},{"k":1,"n":87,"s":"Pedodonti","q":"Süt dişlerive sürekli dişler arasındaki farklarla ilgili aşağıdakilerden hangisi yanlıştır?","o":{"A":"Süt dişi minesinin organik içeriği sürekli diş mineninkinden fazladır.","B":"Süt azılarında 1. azıdan 2. azıya doğru pulpa odası yüksekliği artar, daimilerde azalır.","C":"Süt dişlerinde peritübüler ve intertübüler dentin mineralizasyonu daha düşüktür.","D":"Süt dişi pulpa hacmi sürekli dişlerden büyüktür.","E":"Süt dişleri arasındaki septum sürekli dişlerdekinden daha geniştir."},"c":"B","e":"Süt dişlerinde pulpa odası yüksekliğinde düzenli bir artış olduğu söylenemez → B yanlış. Diğerleri doğru: süt minesi daha organik, daha az mineralize dentin, büyük pulpa, geniş septum."},{"k":1,"n":88,"s":"Pedodonti","q":"Süt dişlerinin sürmesi sırasında sürekli dişlerle ilgili aşağıdaki ifadelerden hangisi doğrudur?","o":{"A":"Sürekli dişlerin kök gelişimi süt dişleri sürdükten sonra başlar.","B":"Sürekli dişlerin kuron gelişimi süt dişi kök rezorpsiyonu tamamlanınca başlar.","C":"Sürekli dişlerin kuronları, süt dişleri sürerken kemik kriptaları içinde oluşumunu sürdürür.","D":"Sürekli dişlerin mineralizasyonu süt dişleri sürmeden önce tamamlanır.","E":"2. büyük azı dişinin mineralizasyonu 9 yaşın sonuna doğru başlar."},"c":"C","e":"Süt dişleri ağızdayken sürekli dişler kemik kriptaları içinde sessizce gelişir → C doğru. Gelişim eşzamanlı ve kademelidir; süt dişi sürmesini beklemez."},{"k":1,"n":89,"s":"Pedodonti","q":"Aşağıdakilerden hangisi erken çocukluk çağı çürüğünün (EÇÇ) klinik ilerleyişive tutulum paternini doğru tanımlar?","o":{"A":"EÇÇ koyu kahve-siyah, kavitasyonlu lezyonlarla başlar; beyaz nokta dikkate alınmaz.","B":"Çürükler çiğneyici yüzeyden başladığı için EÇÇ'den ilk süt molarlar etkilenir.","C":"EÇÇ önce alt kesicilerde görülür çünkü tükürükle sürekli temastadır.","D":"EÇÇ yalnızca kavite oluşunca fark edilir; dekalsifikasyon bantları belirti sayılmaz.","E":"Üst dört kesici süt dişi EÇÇ'den ilk etkilenir; alt kesiciler dil ve tükürük korumasıyla genelde sağlam kalır."},"c":"E","e":"EÇÇ üst dört kesiciyi önce vurur; alt kesiciler dil + tükürük bezi korumasıyla genelde sağlam kalır → E doğru. Beyaz nokta lezyonu en erken bulgudur (A/D yanlış)."},{"k":1,"n":90,"s":"Pedodonti","q":"Aşağıdakilerden hangisi erken süt dişi kayıplarının nedenlerinden biri değildir?","o":{"A":"Papillon-Lefevre Sendromu","B":"Hipofosfatazi","C":"Diyabet","D":"Cleidocranial Dysostosis","E":"Nötropeni"},"c":"D","e":"Cleidocranial dysostosis'te dişler erken DÜŞMEZ, tam tersi GEÇ sürer/gömülü kalır → D. Diğerleri (Papillon-Lefevre, hipofosfatazi, diyabet, nötropeni) periodontal yıkımla erken kayba yol açar."},{"k":1,"n":91,"s":"Pedodonti","q":"Aşağıdakilerden hangisi geç sürekli diş sürmesi nedenlerinden biri değildir?","o":{"A":"Juvenil Diyabet","B":"Hipertiroidizm","C":"D vitamini eksikliği","D":"Cleidocranial Dysostosis","E":"Down Sendromu"},"c":"B","e":"Hipertiroidizm sürmeyi GECİKTİRMEZ, HIZLANDIRIR → geç sürme nedeni değil. Geç sürme yapanlar: juvenil diyabet, D vitamini eksikliği, cleidocranial dysostosis, Down sendromu."},{"k":1,"n":92,"s":"Pedodonti","q":"Aşağıdakilerden hangisi erken çocukluk çağı çürüklerinin yol açabileceği problemlerden biri değildir?","o":{"A":"Üst dört kesicide madde kaybına bağlı özdeğer/özgüven kaybı","B":"Erken süt dişi kaybıyla konuşma ve okluzyon bozuklukları","C":"Ağrı, enfeksiyon, hayat kalitesinde düşüş","D":"Yaşıtlarına göre iştah artışı ve hızlı kilo alımı","E":"Hastaneye yatış/maliyet artışı ve günlük aktivitelerde kısıtlanma"},"c":"D","e":"EÇÇ'de tam tersi olur: ağrı/yeme zorluğu nedeniyle iştah ve kilo azalır, artmaz → D. Estetik kaybı, konuşma/okluzyon sorunu, ağrı ve yüksek tedavi maliyeti gerçek sonuçlardır."},{"k":1,"n":93,"s":"Pedodonti","q":"Ektodermal displazili bir hastada aşağıdaki bulgulardan hangisi görülmez?","o":{"A":"Tırnak malformasyonları","B":"Şekil bozukluğu olan ve konik dişler","C":"Ter ve yağ bezlerinin çok çalışması","D":"Çok sayıda diş eksikliği","E":"Saçların azlığı ve inceliği"},"c":"C","e":"Ektodermal displazide ter bezleri az gelişir → terleme AZALIR, \"çok çalışması\" yanlış. Ektoderm kökenli yapılar etkilenir: seyrek saç, konik/eksik diş, tırnak bozukluğu."},{"k":1,"n":94,"s":"Dental Maddeler (TR)","q":"Bir preparasyonda kavite ile pulpa arasındaki dentin tabakası çok ince ise, ısı iletimine bağlı diş hassasiyetini önlemek için aşağıdaki işlemlerden hangisi yapılabilir?","o":{"A":"Ek bir yalıtıcı siman tabaka uygulanması","B":"Porselen veya altın inlay restorasyon uygulanması","C":"Dişe kanal tedavisi uygulanması","D":"Isı iletkenliği zayıf bir materyal ile restore edilmesi","E":"Hepsi"},"c":"A","e":"Pulpaya yakın ince dentinde yalıtıcı (baz) siman tabakası konularak kalınlık artırılır, ısı yalıtılır → A. Bu, pulpayı termal şoktan korumanın temel yöntemidir."},{"k":1,"n":95,"s":"Dental Maddeler (TR)","q":"üyeli bir köprü restorasyonunda uygulanacak okluzalve fonksiyonel kuvvetler dikkate alındığında aşağıdaki ifadelerden hangisi doğrudur?","o":{"A":"Bükülme kuvvetleri pontiğin okluzal tarafını içbükey, doku tarafını dışbükey yapar.","B":"En zayıf bölge köprü gövdesidir.","C":"Fonksiyonel kuvvetler okluzalde çekme, doku tarafında makaslama gerilimi yapar.","D":"Çiğneme yükü pontiği okluzale doğru büker.","E":"Fonksiyonel kuvvetler okluzalde çekme, doku tarafında basma gerilimi yapar."},"c":"A","e":"Yük altında pontik gingivale doğru bükülür → okluzal yüzey içbükey (basma), doku yüzeyi dışbükey (çekme) olur → A. En zayıf bölge gövde değil konnektörlerdir; pontik gingivale çöker."},{"k":1,"n":96,"s":"Dental Maddeler (TR)","q":"Bir maddenin biyolojik özellikleri ile ilgili aşağıdaki ifadelerden hangisi yanlıştır?","o":{"A":"Mine ve dentin dokusunun ısısal iletkenlik ve geçirgenliği metallerden daha azdır.","B":"Restorasyon ile diş arasındaki boşluklar mikrosızıntı olarak ifade edilir.","C":"Restorasyon ile diş arasında daima mikro boşluklar bulunur.","D":"Poliakrilik asite dayanan bazı sistemler hariç geleneksel restoratif malzemelerin hiçbiri tam adezyon sağlayamaz.","E":"Isısal değişiklikler bütün restoratif maddelerde dişten daha fazla büzülme/genleşmeye sebep olur."},"c":"A","e":"Mine/dentinin ısısal iletkenliği metallerden düşüktür (doğru), AMA geçirgenliği düşük DEĞİL — dentin, tübülleri sayesinde geçirgendir; metal değildir. İfade ikisini birden \"daha az\" dediği için yanlış → A."},{"k":1,"n":97,"s":"Dental Maddeler (TR)","q":"Aşağıdaki ifadelerden hangisi yanlıştır?","o":{"A":"Bir maddenin difüzyonu esas olarak sıcaklığa bağlıdır.","B":"Döküm restorasyonların simantasyonu, simanın metal ve diş yüzeyindeki düzensizliklere mekanik bağlanmasıdır.","C":"Adezyonu meydana getiren ara tabakaya aderent, yapıştırılan materyale de adeziv denir.","D":"Difüzyon hızı atom boyutuna, atomlar/moleküller arası bağlara bağlıdır.","E":"Yüzey enerjisi ne kadar yüksekse adezyon kapasitesi o kadar fazladır."},"c":"C","e":"Terimler ters verilmiş: yapıştırıcı/ara tabaka = adeziv, yapıştırılan materyal = aderent → C yanlış. Sıcaklık↑ difüzyon↑, yüksek yüzey enerjisi↑ ıslanma↑ adezyon↑ (diğerleri doğru)."},{"k":1,"n":98,"s":"Dental Maddeler (TR)","q":"Bir yapıyı bozmak veya kırmak için gerekli olan maksimum gerilim,o yapının hangi özelliğini ifade eder?","o":{"A":"Elastiklik","B":"Dayanıklılık","C":"Maksimum gerilim","D":"Sertlik","E":"Esneklik"},"c":"B","e":"Bir yapıyı kırmak için gereken maksimum gerilim → dayanıklılık (mukavemet). \"Maksimum gerilim\" özellik değil ölçülen bir değerdir; sertlik = penetrasyona direnç; elastiklik = kuvvet kalkınca eski hale dönme."},{"k":1,"n":99,"s":"Dental Maddeler (TR)","q":"Bir yapının orantı sınırının altında gerilmesi durumunda adsorbe ettiği enerji miktarına ne ad verilir?","o":{"A":"Dövülebilirlik","B":"Durulma","C":"Çekilebilirlik","D":"Deformasyon","E":"Reziliens"},"c":"E","e":"Elastik (orantı) sınırına kadar absorbe edilen enerji = reziliens. Dövülebilirlik = levha olabilme; çekilebilirlik = tel olabilme; deformasyon = şekil değişikliği."},{"k":1,"n":100,"s":"Dental Maddeler (TR)","q":"Aşağıdaki ifadelerden hangisi yanlıştır?","o":{"A":"İki madde arasında en iyi bağlanma moleküler etkileşimden çok mekanik bağlanma ile sağlanır.","B":"Bir adezivin ıslatabilme miktarı genellikle adeziv-aderent arasındaki değme açısıyla belirlenir.","C":"Katı yüzey ile sıvı damlacığının ilişkisi temas açısı olarak tanımlanır.","D":"Birbirine benzemeyen moleküller arasındaki çekim kuvvetine adezyon denir.","E":"Mine ve dentinin ıslanabilirliği sulu flor çözeltisi uygulanınca büyük artış gösterir."},"c":"E","e":"Sulu flor çözeltisi mine/dentinin ıslanabilirliğini artırmaz, olumsuz etkileyebilir → E yanlış. Düşük değme açısı = iyi ıslanma; benzemeyen moleküller arası çekim = adezyon (diğerleri doğru)."},{"k":2,"n":1,"s":"Anatomi (teorik)","q":"Cerebellumun esas fonksiyonu hangisidir?","o":{"A":"Dil üretimi","B":"Hormonal regülasyon","C":"Denge ve koordinasyon","D":"Görme refleksi","E":"Ağrı modülasyonu"},"c":"C","e":"Serebellum hareketlerin düzgün, uyumlu ve dengeli yapılmasını sağlar. Hasarında ataksi, dengesizlik ve koordinasyon bozukluğu (dismetri) görülür. Özetle: küçük beyin = denge ve koordinasyon merkezi."},{"k":2,"n":2,"s":"Anatomi (teorik)","q":"Serebellar hemisferdeki klinik nokta hangi yapıdır?","o":{"A":"Vermis","B":"Fastigial nukleus","C":"Tonsilla cerebelli","D":"Flocculus","E":"Nodulus"},"c":"C","e":"Tonsilla cerebelli kritik klinik noktadır: foramen magnum (tonsiller) herniasyonunda aşağı kayıp medulla oblongata'ya bası yapar → solunum-dolaşım durması. Vermis orta hatta, flocculus-nodulus vestibüloserebellumun parçasıdır."},{"k":2,"n":3,"s":"Anatomi (teorik)","q":"Subdural hematom hangi iki zar arasında oluşur?","o":{"A":"Dura – periost","B":"Pia – araknoid","C":"Dura – araknoid","D":"Pia – dura","E":"Epidural aralık"},"c":"C","e":"“Subdural = dura'nın altı” → dura ile araknoid arasında köprü venlerinin yırtılmasıyla oluşur. Pia-araknoid arası subaraknoid aralıktır (BOS burada); dura-periost arası ise epidural hematomun yeridir."},{"k":2,"n":4,"s":"Anatomi (teorik)","q":"Araknoid villusların asıl görevi nedir?","o":{"A":"BOS üretmek","B":"BOS'u filtrelemek","C":"BOS'un venöz dolaşıma geri emilmesini sağlamak","D":"Kan-beyin bariyeri oluşturmak","E":"Sinaps yapmak"},"c":"C","e":"Araknoid villuslar BOS'u venöz sinüslere geri EMER (rezorpsiyon). Üretim plexus choroideus'un işidir; kan-beyin bariyerini kapiller endotel + astrosit ayakları kurar; sinaps ise nöronların görevidir."},{"k":2,"n":5,"s":"Anatomi (teorik)","q":"Talamusun kapısı olarak tanımlanan çekirdek hangisidir?","o":{"A":"Nucleus caudatus","B":"Pulvinar","C":"Nucleus reticularis","D":"Substantia nigra","E":"Lentiform nukleus"},"c":"C","e":"Nucleus reticularis talamusu bir kalkan gibi sarar ve tüm talamokortikal trafiği denetler; bu yüzden “talamusun kapısı/bekçisi” denir (dikkat, uyku-uyanıklık, talamik aktivite). Pulvinar en büyük posterior çekirdek; caudatus/lentiform bazal ganglion; substantia nigra mezensefalondadır."},{"k":2,"n":6,"s":"Anatomi (teorik)","q":"Anatomik açıdan bazal ganglion olmamasına rağmen fizyolojik olarak bazal ganglion kabul edilen yapı hangisidir?","o":{"A":"Talamus","B":"Substantia nigra","C":"Claustrum","D":"Amygdala","E":"Hippocampus"},"c":"B","e":"Substantia nigra mezensefalonda (orta beyin) yer alır, yani anatomik olarak bazal ganglion değildir; ancak bazal ganglion devreleriyle (dopamin yolağı, Parkinson) çok sıkı çalıştığı için fizyolojik olarak bu gruba dâhil edilir. Amygdala ve hippocampus limbik sistemdendir."},{"k":2,"n":7,"s":"Anatomi (teorik)","q":"Motor homunculusun bulunduğu korteks alanı hangisidir?","o":{"A":"Postcentral gyrus","B":"Precentral gyrus","C":"Angular gyrus","D":"Supramarginal gyrus","E":"Uncus"},"c":"B","e":"Motor homunculus precentral gyrus'tadır (primer motor korteks, Brodmann 4). Postcentral gyrus ise DUYUSAL homunculusu barındırır. Pratik ezber: “Pre = hareket (motor), Post = his (duyu).”"},{"k":2,"n":8,"s":"Anatomi (teorik)","q":"Baş ve yüzde hafif dokunma duyusunu taşıyan yolun 2. nöron gövdesi nerede bulunur?","o":{"A":"Ganglion trigeminale","B":"Nucleus spinalis nervi trigemini","C":"Nucleus principalis nervi trigemini","D":"Nucleus ambiguus","E":"Ganglion geniculi"},"c":"C","e":"Trigeminal dokunma yolu: 1. nöron ganglion trigeminale, 2. nöron nucleus principalis (pontin) nervi trigemini, 3. nöron talamus VPM. Ağrı-ısının 2. nöronu ise nucleus spinalis'tedir. Nucleus ambiguus motor, ganglion geniculi tat (VII) ile ilgilidir."},{"k":2,"n":9,"s":"Anatomi (teorik)","q":"Beyin sapının dorsalinde bulunan yapı hangisidir?","o":{"A":"Cerebellum","B":"Hypothalamus","C":"Medulla spinalis","D":"Corpus callosum","E":"Basal ganglion"},"c":"A","e":"Cerebellum, pons ve medulla oblongata'nın arkasında (dorsalinde) oturur; aralarında 4. ventrikül vardır. Hypothalamus diensefalonda, medulla spinalis beyin sapının kaudal devamı, corpus callosum ise iki hemisferi bağlayan yapıdır."},{"k":2,"n":10,"s":"Anatomi (teorik)","q":"BOS hangi yapıda üretilir?","o":{"A":"Arachnoid villus","B":"Dura mater","C":"Plexus choroideus","D":"Pia mater","E":"Sinus sagittalis superior"},"c":"C","e":"BOS, ventriküllerdeki plexus choroideus tarafından üretilir. Arachnoid villus ise BOS'u venöz sisteme geri EMER (üretmez). Dura/pia meninks zarları, sinus sagittalis superior ise emilimin gerçekleştiği venöz sinüstür."},{"k":2,"n":11,"s":"Anatomi (teorik)","q":"Okuma-yazma merkezi yanında konuşma merkezi olarak bilinen alan hangisidir?","o":{"A":"Broca alanı","B":"Wernicke alanı","C":"Gyrus precentralis","D":"Limbik sistem","E":"Area striata"},"c":"B","e":"Wernicke alanı (temporal lob) dili ANLAMA ve okuma-yazmayla iç içe çalışan duyusal konuşma merkezidir. Broca ise konuşmanın MOTOR (üretim) merkezidir. Gyrus precentralis primer motor korteks, area striata primer görme korteksidir."},{"k":2,"n":12,"s":"Anatomi (teorik)","q":"Yalnızca motor lif içeren kranial sinir hangisidir?","o":{"A":"N. trigeminus","B":"N. facialis","C":"N. vestibulocochlearis","D":"N. hypoglossus","E":"N. glossopharyngeus"},"c":"D","e":"N. hypoglossus (XII) dil kaslarının saf motor siniridir. Saf motorlar: III, IV, VI, XI, XII. Trigeminus, fasialis ve glossofaringeus karışık (motor+duyu); vestibülokoklear ise saf duyudur."},{"k":2,"n":13,"s":"Anatomi (teorik)","q":"Motor lif taşımayan kranial sinir hangisidir?","o":{"A":"N. abducens","B":"N. facialis","C":"N. glossopharyngeus","D":"N. vestibulocochlearis","E":"N. accessorius"},"c":"D","e":"N. vestibulocochlearis (VIII) tamamen duyusaldır; işitme ve denge bilgisini taşır. Saf duyu sinirleri: I (koku), II (görme), VIII (işitme-denge). Diğer şıklar motor lif içerir."},{"k":2,"n":14,"s":"Anatomi (teorik)","q":"Rectus lateralis kasını innerve eden sinir hangisidir?","o":{"A":"N. oculomotorius","B":"N. trochlearis","C":"N. trigeminus","D":"N. abducens","E":"N. facialis"},"c":"D","e":"Klasik kural “LR6 – SO4 – diğerleri 3”: Rectus Lateralis → VI (abducens), Obliquus Superior → IV (trochlearis), kalan tüm ekstraoküler kaslar → III (oculomotorius)."},{"k":2,"n":15,"s":"Anatomi (teorik)","q":"N. trochlearis felcinde hasta hangi yönde çift görmeden şikayet eder?","o":{"A":"Yukarı bakış","B":"Aşağı bakış","C":"Mediale bakış","D":"Laterale bakış","E":"Yakına bakış"},"c":"B","e":"N. trochlearis (IV) m. obliquus superior'u innerve eder; bu kas gözü aşağı ve dışa çevirir. Felcinde hasta özellikle merdiven inerken / aşağı bakışta diplopi (çift görme) yaşar."},{"k":2,"n":16,"s":"Anatomi (teorik)","q":"Foramen rotundumdan craniumu terk eden sinir hangisidir?","o":{"A":"N. ophthalmicus","B":"N. mandibularis","C":"N. maxillaris","D":"N.
