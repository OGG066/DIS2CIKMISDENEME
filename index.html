:","o":{"A":"Erosion","B":"Abfraction","C":"Abrasion","D":"Attrition","E":"Cracked tooth syndrome"},"c":"C","e":"Yabancı cisim/madde ile mekanik aşınma = ABRAZYON (örn. sert fırçalama). Attrition = diş-diş teması, Erosion = kimyasal/asit, Abfraction = servikalde bükülme stresi."},{"k":5,"n":32,"s":"İng. Restoratif","q":"Which of the following refers to wear resulting from mechanical processes involving foreign substances or objects?","o":{"A":"Erosion","B":"Abfraction","C":"Abrasion","D":"Attrition","E":"Caries"},"c":"C","e":"Aynı tanım: dış cisim → ABRAZYON. (Soru 11 ile birebir; ezberini sağlamlaştır: yabancı madde = abrazyon.)"},{"k":5,"n":33,"s":"İng. Restoratif","q":"In clinical practice, when should the dentist consider a 'watch and wait' strategy for non-carious lesions?","o":{"A":"The tooth is hypersensitive","B":"Pulpal exposure is likely","C":"The defect is esthetically unacceptable","D":"Structural integrity is threatened","E":"The lesion is shallow"},"c":"E","e":"Yüzeyel (sığ) non-karyöz lezyon, belirti/risk yoksa hemen restore edilmez → izle-bekle. Hassasiyet, estetik sorun, açılma riski veya yapısal tehdit varsa müdahale gerekir."},{"k":5,"n":34,"s":"İng. Restoratif","q":"In which clinical situation should the dentist consider a 'watch and wait' strategy for non-carious cervical lesions?","o":{"A":"The tooth is hypersensitive","B":"Pulpal exposure is likely","C":"The defect is aesthetically unacceptable","D":"The lesion is shallow","E":"The structural integrity is threatened"},"c":"D","e":"Tekrar: sığ servikal lezyon = izle-bekle. Müdahale gerektiren durumlar (hassasiyet, estetik, açılma, yapı kaybı) yoksa restore etmeye acele etme. (Soru 18 ile aynı.)"},{"k":5,"n":35,"s":"İng. Maddeler ve Aletler","q":"Which type of bur shank is used in a high-speed handpiece?","o":{"A":"Latch-type shank","B":"Friction-grip shank","C":"Straight handpiece (HP) shank","D":"Right-angle shank","E":"Threaded shank"},"c":"B","e":"Yüksek hız (airotor) → friction-grip (sürtünmeli) sap. Düşük hız (anguldruva) → latch (mandallı). High speed = friction grip; low speed = latch."},{"k":5,"n":36,"s":"İng. Maddeler ve Aletler","q":"Which of the following handpiece shank types is used with a high-speed handpiece?","o":{"A":"Friction-grip","B":"Latch-type","C":"Straight HP","D":"Right-angle latch","E":"Threaded"},"c":"A","e":"Aynı kural: yüksek hız = friction-grip. (Soru 6'nın ikizi.)"},{"k":5,"n":37,"s":"İng. Maddeler ve Aletler","q":"Which sequence correctly represents endodontic file colors from coarse (large) to fine (small)? ⚑ Not: Şüpheli / zayıf hatırlanan soru — ISO renk dizisinde 'brown' büyük olasılıkla 'black' yerine geçmiş. Kaynaktan doğrula.","o":{"A":"Blue → Green → Brown","B":"Green → Brown → Blue","C":"Brown → Green → Blue","D":"Blue → Brown → Green","E":"Green → Blue → Brown"},"c":"C","e":"ISO renk sırası boyutla değişir: 40 = siyah, 35 = yeşil, 30 = mavi. Kalın(büyük) → ince(küçük) = siyah → yeşil → mavi. 'Brown'u 'black' kabul edersek C uyar."},{"k":5,"n":38,"s":"İng. Maddeler ve Aletler","q":"Which instrument is most appropriate for mixing dental cement on a glass slab? ⚑ Not: Görsele bağlı — orijinalde siman spatülü gösterildi.","o":{"A":"Cement spatula","B":"Amalgam carrier","C":"Condenser (plugger)","D":"Burnisher","E":"Explorer (probe)"},"c":"A","e":"Cam üzerinde siman karıştırmak için düz, esnek ağızlı siman spatülü kullanılır. Amalgam taşıyıcı/kondenser farklı amaçlıdır."},{"k":5,"n":39,"s":"İng. Maddeler ve Aletler","q":"Which bur is most appropriate for removal of an old amalgam restoration?","o":{"A":"Inverted cone bur","B":"Pear-shaped bur","C":"Tapered fissure bur","D":"Needle-shaped bur","E":"Round carbide bur (black band)F) Round diamond bur (red band)"},"c":"E","e":"Eski amalgamı (metal) verimli kesen = karbid frez (round carbide, siyah bant). Elmas frez minede iyidir; ters koni retansiyon oluğu, iğne ucu ince şekillendirme içindir."},{"k":5,"n":40,"s":"İng. Maddeler ve Aletler","q":"In a non-cutting dental instrument, what is the name of the part that serves as the working end?","o":{"A":"Blade","B":"Nib","C":"Tip","D":"Shank","E":"Handle"},"c":"B","e":"Kesici olmayan aletlerde çalışan uç = nib (örn. kondenser nib'i). Kesici aletlerde çalışan uç = blade. Tip = ucun en noktası, shank = sap-uç arası, handle = sap."},{"k":5,"n":41,"s":"İng. Maddeler ve Aletler","q":"Why is the inverted (reverse) pen grasp used more frequently than the modified pen grasp in certain dental procedures?","o":{"A":"Because it provides better access and visibility to the operating area","B":"Because it generates greater cutting force","C":"Because it reduces operator fatigue","D":"Because it improves moisture isolation","E":"Because it increases patient comfort"},"c":"A","e":"Ters kalem tutuşu, özellikle alt ön/lingual gibi ulaşılması zor bölgelerde daha iyi görüş ve erişim sağlar. Tercih sebebi: açı ve görüş avantajı."},{"k":5,"n":42,"s":"İng. Maddeler ve Aletler","q":"From the set of burs shown, which bur is used to remove an old amalgam restoration? (The answer is the black-banded one.) ⚑ Not: Görsele bağlı — orijinalde siyah bantlı frez işaretlendi (Soru 25 ile uyumlu).","o":{"A":"Yellow-banded bur (extra-fine)","B":"Red-banded bur (fine)","C":"Blue-banded bur (medium)","D":"Green-banded bur (coarse)","E":"Black-banded bur"},"c":"E","e":"Siyah bant = en kaba / karbid frez; eski amalgamı (metal) hızlı söker. (Soru 25 ile aynı: amalgam sökümü = siyah bantlı round carbide frez.)"},{"k":5,"n":43,"s":"İng. Restoratif","q":"Which type of dentin will remineralize if the pulp remains vital?","o":{"A":"Necrotic dentin","B":"Infected dentin","C":"Soft dentin","D":"Contaminated dentin","E":"Firm (affected) dentin"},"c":"E","e":"Sert/deri kıvamındaki 'affected' (etkilenmiş) dentin, pulpa canlıysa yeniden mineralize olur → bırakılabilir. İnfekte/yumuşak dentin mineralize olmaz, kaldırılır. Sert = kurtulur, yumuşak = atılır."},{"k":5,"n":44,"s":"İng. Restoratif","q":"Which of the following is commonly used as a cavity disinfectant in restorative dentistry?","o":{"A":"Hydrogen peroxide","B":"Sodium hypochlorite","C":"Glutaraldehyde","D":"Ethanol","E":"Chlorhexidine"},"c":"E","e":"Restoratifte en yaygın kavite dezenfektanı = klorheksidin (%2). Geniş antibakteriyel etki + kalıcılık (substantivite) + MMP inhibisyonu ile bağlanmayı korur."},{"k":5,"n":45,"s":"İng. Restoratif","q":"Which method determines the hardness criterion of a carious dentin lesion?","o":{"A":"Tactile pressure by moving a probe or excavator over the surface","B":"Radiography","C":"Patient symptoms","D":"Change in color / discoloration","E":"Using a caries-detector dye"},"c":"A","e":"Çürüğün 'sertlik' kriteri dokunsal değerlendirilir: sond/ekskavatörün hissi (yumuşak mı, sert mi?). Renk ya da röntgen sertliği ölçmez; boya yalnız çürüğü boyar."},{"k":5,"n":46,"s":"İng. Restoratif","q":"Which ICDAS code corresponds to a lesion with no distinct cavitation — the first visual change in enamel seen only after prolonged air drying?","o":{"A":"ICDAS 0","B":"ICDAS 1","C":"ICDAS 2","D":"ICDAS 3","E":"ICDAS 5"},"c":"B","e":"ICDAS 1 = minede yalnızca kurutunca görülen ilk değişiklik, kavitasyon yok. (0 = sağlam, 2 = ıslakken görülen değişiklik, 3 = mine kırığı/mikrokavite, 5 = dentine ulaşan belirgin kavite.)"},{"k":5,"n":47,"s":"İng. Restoratif","q":"Which option is correct regarding the use of the selective caries removal (SCR) method?","o":{"A":"It is used for shallow caries","B":"It is used for full-cuspal caries","C":"It is used for deep cavities with a healthy pulp","D":"It is used only for occlusal-surface caries","E":"It is used when the pulp is already necrotic"},"c":"C","e":"SCR (selektif/parsiyel çürük temizleme), canlı pulpalı derin lezyonlarda pulpayı açmamak için uygulanır → pulpaya yakın affected dentin bırakılır. Sığ çürükte gereksiz."},{"k":5,"n":48,"s":"İng. Restoratif","q":"A 22-year-old patient has mild sensitivity to cold and sweets in tooth #46, with no spontaneous pain. The tooth responds normally to vitality tests, has no percussion sensitivity, and radiographs show caries extending into the middle dentin (occlusal surface) without pulpal involvement. According to Black's classification, this lesion is: ⚑ Not: Black sınıfı YÜZEYE göredir; orijinalde oklüzal yüzey varsayılır (#46 = alt 1. molar).","o":{"A":"Class I","B":"Class II","C":"Class III","D":"Class V","E":"Class IV"},"c":"A","e":"Black sınıflaması konuma bakar, derinliğe değil. Molar (#46) oklüzal pit/fissür çürüğü → Class I. 'Middle dentin' derinliği sınıfı değiştirmez."},{"k":5,"n":49,"s":"İng. Restoratif","q":"Which of the following is NOT a parameter for the classification of a tooth preparation?","o":{"A":"Number of involved surfaces","B":"Extension of the preparation","C":"Depth and proximity to the pulp","D":"Sensation of pain during the vitality test","E":"Size and site of the caries"},"c":"D","e":"Vitalite testindeki ağrı bir teşhis bulgusudur, preparasyonu sınıflandırma parametresi değildir. Sınıflama: yüzey sayısı, yayılım, derinlik/pulpaya yakınlık, çürüğün boyut-yeri."},{"k":6,"n":1,"s":"Anatomi (teorik)","q":"Aşağıdakilerden hangisi dilin alt yüzünden görülmez?","o":{"A":"Plica sublingualis","B":"Frenulum linguae","C":"Papilla fungiformis","D":"Caruncula sublingualis","E":"Plica fimbriata"},"c":"C","e":"· Fungiform papillalar dilin ÜST yüzünde (özellikle uç ve kenarlarda) tat tomurcuğu taşır. Dil altı = frenulum + caruncula + plica'ların dünyasıdır; papillanın orada işi yok."},{"k":6,"n":2,"s":"Anatomi (teorik)","q":"Aşağıdakilerden hangisi karın arka duvarının oluşumuna katılmaz?","o":{"A":"M. quadratus lumborum","B":"M. iliacus","C":"M. psoas minor","D":"M. psoas major","E":"Diaphragma cruris"},"c":"E","e":"· Arka duvarın temel kasları: quadratus lumborum + psoas (major/minor) + iliacus. Diyafragma bacakları (crura) diyaframa aittir, duvar kas yapısına değil."},{"k":6,"n":3,"s":"Anatomi (teorik)","q":"Aşağıdakilerden hangisi gl. submandibularis ve gl. sublingualis'e sekresyon yaptıran sinirdir?","o":{"A":"N. mandibularis","B":"N. chorda tympani","C":"N. petrosus minor","D":"N. lingualis","E":"N. glossopharyngeus"},"c":"B","e":"· Chorda tympani (VII) parasempatik liflerini taşır → submandibular + sublingual bezleri salgılatır. N. lingualis sadece bu lifleri taşıyan otobüstür; petrosus minor ve glossopharyngeus parotis ekibindendir."},{"k":6,"n":4,"s":"Anatomi (teorik)","q":"Aşağıdaki oluşumlardan hangisinin hasarında dilden acı lezzeti alınamaz?","o":{"A":"Chorda tympani","B":"Nucleus solitarius'un alt ucu","C":"N. facialis","D":"N. glossopharyngeus","E":"N. lingualis"},"c":"D","e":"· Acı tat ağırlıkla dilin arka 1/3'ünden gelir; oranın tat siniri glossopharyngeus'tur (IX). Ön 2/3 tadı ise chorda tympani'nin işi. Kısaca: acı = arka = IX."},{"k":6,"n":5,"s":"Anatomi (teorik)","q":"Aşağıdakilerden hangisi nasopharynx'de yer alan bir yapı değildir?","o":{"A":"Torus tubarius","B":"Tonsilla pharyngea","C":"Tonsilla palatina","D":"Tonsilla tubaria","E":"Ostium pharyngeum tubae auditivae"},"c":"C","e":"· Tonsilla palatina, adı üstünde damak kavisleri arasında, yani OROpharynx'tedir. Nasopharynx'in sakinleri: faringeal/tubal tonsil, torus tubarius ve östaki borusu ağzı."},{"k":6,"n":6,"s":"Anatomi (teorik)","q":"Aşağıdakilerden hangisi n. petrosus minor tarafından innerve edilir?","o":{"A":"Gl. submandibularis","B":"Gl. parotidea","C":"Gl. lacrimalis","D":"Papilla fungiformis","E":"Papilla foliata"},"c":"B","e":"· Petrosus MİNÖR → parotis bezi. Petrosus MAJÖR → gözyaşı (lakrimal) bezi. \"Minör parti tükürük, majör parti gözyaşı\" ayrımı klasik tuzaktır."},{"k":6,"n":7,"s":"Anatomi (teorik)","q":"Aşağıdakilerden hangisi abeslang (dil basacağı) ile ağız muayenesi yapılan birinde görülmez?","o":{"A":"Arcus palatoglossus","B":"Tonsilla palatina","C":"Arcus palatopharyngeus","D":"Uvula","E":"Tonsilla pharyngea"},"c":"E","e":"· Abeslang ile oropharynx açılır; faringeal tonsil ise nasopharynx'in tavanında saklıdır → ancak ayna/endoskopla görülür, çıplak gözle değil."},{"k":6,"n":8,"s":"Anatomi (teorik)","q":"Ductus choledochus, ductus pancreaticus major ve minor'un açıldığı; papilla duodeni major (Vater)'in bulunduğu duodenum bölümü hangisidir?","o":{"A":"Bulbus duodeni","B":"Pars descendens","C":"Pars superior","D":"Pars horizontalis","E":"Pars ascendens"},"c":"B","e":"· Vater papillası inen kısımda (pars descendens, 2. parça) oturur. \"Safra ve pankreas kanalları ikinci kapıdan girer\" diye hatırla."},{"k":6,"n":9,"s":"Anatomi (teorik)","q":"Aşağıdakilerden hangisi parotis bezi içinde bulunan bir oluşum değildir?","o":{"A":"V. retromandibularis","B":"A. carotis interna","C":"A. carotis externa","D":"N. facialis","E":"N. auriculotemporalis"},"c":"B","e":"· Parotisin içinden geçen üçlü (yüzeyden derine): n. facialis → v. retromandibularis → a. carotis externa (+ n. auriculotemporalis). A. carotis interna boyunda hiç dal vermeden yukarı kaçar, beze uğramaz."},{"k":6,"n":10,"s":"Anatomi (teorik)","q":"Aşağıdakilerden hangisi porta hepatis'te bulunur?","o":{"A":"A. hepatica communis","B":"A. hepatica propria","C":"Truncus coeliacus","D":"A. mesenterica superior","E":"A. cystica"},"c":"B","e":"· Porta hepatis üçlüsü (portal triad): v. portae + a. hepatica PROPRIA + ductus hepaticus communis. \"Communis\" daha aşağıda ikiye ayrılır; karaciğer kapısına çıkan \"propria\"dır."},{"k":6,"n":11,"s":"Anatomi (teorik)","q":"Aşağıdakilerden hangisi karaciğerin visseral yüzünde yer almaz?","o":{"A":"Lig. venosum","B":"A. hepatica propria","C":"Lig. falciforme hepatis","D":"Ductus cysticus","E":"V. porta"},"c":"C","e":"· Lig. falciforme ön/diyafragmatik yüzdedir, karaciğeri ön karın duvarına bağlar. Visseral (alt) yüz ise porta yapıları ile lig. venosum'un sahnesidir."},{"k":6,"n":12,"s":"Anatomi (teorik)","q":"Aşağıdaki venlerden hangisi v. porta hepatis'e açılmaz?","o":{"A":"V. hepatica","B":"V. splenica","C":"V. gastrica dextra","D":"V. mesenterica superior","E":"V. mesenterica inferior"},"c":"A","e":"· V. hepatica kanı karaciğerden ÇIKARIR ve doğrudan v. cava inferior'a döker → portal sistemin parçası değildir. Splenik ve mezenterik venler ise portal veni besler."},{"k":6,"n":13,"s":"Anatomi (teorik)","q":"A. gastrica dextra ve sinistra'nın lokalizasyonu aşağıdakilerden hangisi ile ilişkilidir?","o":{"A":"Mesoappendix vermiformis","B":"Mesenter","C":"Omentum minus","D":"Omentum majus","E":"Bursa omentalis"},"c":"C","e":"· Mide gastrika arterleri küçük kurvatur boyunca, omentum minus'un iki yaprağı arasında ilerler. Büyük kurvatur ve majus ise gastroepiploik arterlerin yoludur."},{"k":6,"n":14,"s":"Anatomi (teorik)","q":"Aşağıdakilerden hangisi ekstrahepatik bir safra yolu değildir?","o":{"A":"Ductus hepaticus dexter","B":"Ductus choledochus","C":"Ductus hepaticus communis","D":"Ductus interlobularis","E":"Ductus cysticus"},"c":"D","e":"· İnterlobüler kanallar karaciğer İÇİNDE (intrahepatik) yer alır. Ekstrahepatik dörtlü: sağ/sol ve communis hepatik kanal, koledok ve sistik kanal."},{"k":6,"n":15,"s":"Anatomi (teorik)","q":"Pankreas başı ile processus uncinatus arasında oluşan bir tümör, aşağıdaki organlardan hangisinin kanlanmasını olumsuz yönde etkiler?","o":{"A":"Duodenum (distal kısım)","B":"Mide","C":"Karaciğer","D":"Dalak","E":"Özofagus"},"c":"A","e":"· O dar aralıktan a. mesenterica superior geçer; sıkışınca SMA'nın beslediği distal duodenum (ayrıca jejunum, ileum, sağ kolon) iskemiye girer. Mide, dalak ve karaciğer çölyaktan beslenir, etkilenmez."},{"k":6,"n":16,"s":"Fizyoloji","q":"Postprandial dönemde bağırsak epitel hücrelerinden sodyum emilimi hangi mekanizma ile gerçekleşir?","o":{"A":"Primer aktif transport","B":"Basit difüzyon","C":"Sekonder aktif transport","D":"Kolaylaştırılmış difüzyon","E":"Osmoz"},"c":"C","e":"· Yemek sonrası Na⁺, glukoz/aminoasitlerle birlikte SGLT taşıyıcısına bedavaya binerek girer = sekonder aktif transport. Enerjiyi asıl bazolateraldeki Na⁺/K⁺ ATPaz harcar."},{"k":6,"n":17,"s":"Fizyoloji","q":"İnce bağırsakta B12 vitamininin emilimini sağlayan ve midede üretilen molekül hangisidir?","o":{"A":"Haptokorrin","B":"HCl","C":"İntrinsik faktör","D":"Pepsin","E":"Gastrin"},"c":"C","e":"· İntrinsik faktör (paryetal hücre yapımı) B12'ye sarılıp onu ileumun sonuna sağ salim taşır. Haptokorrin yalnızca mide/ağızda B12'yi korur, emdirmez."},{"k":6,"n":18,"s":"Fizyoloji","q":"Gastrik asit sekresyonunda H⁺ iyonlarının lümene salınımını sağlayan pompa hangisidir?","o":{"A":"H⁺/K⁺ ATPaz","B":"Ca²⁺ ATPaz","C":"Na⁺/K⁺ ATPaz","D":"Cl⁻/HCO₃⁻ değiştirici","E":"Na⁺/H⁺ değiştirici"},"c":"A","e":"· Asidi mideye basan tek \"proton pompası\" H⁺/K⁺ ATPaz'dır (PPI ilaçlarının da hedefi). Diğerleri iyon taşır ama lümene H⁺ pompalamaz."},{"k":6,"n":19,"s":"Fizyoloji","q":"cAMP'nin bağırsakta Cl⁻ sekresyonu üzerindeki etkisi nedir?","o":{"A":"Cl⁻ sekresyonunu azaltır","B":"Cl⁻ absorbsiyonunu arttırır","C":"Cl⁻ absorbsiyonunu azaltır","D":"Cl⁻ sekresyonunu arttırır","E":"Hiçbir etkisi yoktur"},"c":"D","e":"· cAMP, CFTR kanalını açar → Cl⁻ lümene boşalır (kolera ishalinin mekanizması da budur). Su da Cl⁻'yi takip ederek kayıp artar."},{"k":6,"n":20,"s":"Fizyoloji","q":"Bağırsakta glukoz ve galaktozun apikal membrandan hücre içine emilimi hangi taşıyıcı ile gerçekleşir?","o":{"A":"GLUT2","B":"GLUT5","C":"PepT1","D":"SGLT1","E":"GLUT3"},"c":"D","e":"· Glukoz + galaktoz apikalde Na⁺ ile birlikte SGLT1'den girer. GLUT5 = fruktoz, GLUT2 = şekerin kana çıkış kapısı (bazolateral). \"SGLT = Sodyumla giren glukoz.\""},{"k":6,"n":21,"s":"Fizyoloji","q":"Gastrik asit sekresyonunu uyaran histamin hangi hücreden salgılanır?","o":{"A":"G hücreleri","B":"Paryetal hücreler","C":"D hücreleri","D":"Enterokromaffin benzeri (ECL) hücreler","E":"Şef hücreleri"},"c":"D","e":"· ECL hücreleri histamin salar → paryetal hücreyi asit yapmaya kışkırtır. G = gastrin, D = somatostatin, şef = pepsinojen."},{"k":6,"n":22,"s":"Fizyoloji","q":"Pankreatik asiner hücreler tarafından salgılanan sindirim enzimlerinin öncüllerine ne ad verilir?","o":{"A":"Proteazlar","B":"Zimojenler","C":"Hormonlar","D":"Nörotransmitterler","E":"Preprohormonlar"},"c":"B","e":"· Enzimler inaktif (kapalı) halde, yani zimojen olarak salınır ki pankreas kendi kendini sindirmesin. Bağırsakta aktive olurlar (örn. tripsinojen → tripsin)."},{"k":6,"n":23,"s":"Fizyoloji","q":"Mide epitelinde sekretin sekresyonu hangi hücre tarafından gerçekleştirilir?","o":{"A":"D hücreleri","B":"Şef hücreleri","C":"Paryetal hücreler","D":"G hücreleri","E":"S hücreleri"},"c":"E","e":"· \"S hücresi = Sekretin.\" Duodenuma asit geldiğinde S hücreleri sekretin salar ve pankreastan bikarbonat ister, asidi nötrlemek için."},{"k":6,"n":24,"s":"Fizyoloji","q":"Kolesistokinin (CCK) salgısı hangi besin maddesi tarafından en yüksek seviyede uyarılır?","o":{"A":"Vitaminler","B":"Karbonhidratlar","C":"Proteinler","D":"Yağ asitleri","E":"Mineraller"},"c":"D","e":"· Yağ (ve biraz protein) duodenuma gelince CCK fışkırır → safra kesesini kastırır, pankreas enzimini saldırır. \"Yağ gördü mü CCK çağırır.\""},{"k":6,"n":25,"s":"Fizyoloji","q":"Aşağıdaki hücre gruplarından hangisinin salgısı gastrik asit sekresyonunu inhibe eder?","o":{"A":"Enterokromaffin benzeri (ECL) hücreler","B":"Paryetal hücreler","C":"D hücreleri","D":"G hücreleri","E":"Şef hücreleri"},"c":"C","e":"· D hücresi somatostatin salar = midenin freni. Gastrin, histamin ve asidi birden kısar. (Gaz pedalı ECL/G, fren ise D.)"},{"k":6,"n":26,"s":"Fizyoloji","q":"Aşağıdaki organlardan hangisi doğrudan sindirime katılmamakla birlikte sindirim sistemine destek sağlayan aksesuar organlardandır?","o":{"A":"Mide","B":"Kolon","C":"Karaciğer","D":"İnce bağırsak","E":"Özofagus"},"c":"C","e":"· Karaciğer kanaldan besin geçirmez ama safra üretip yağ sindirimine destek olur → aksesuar organdır. (Diğerleri: safra kesesi, pankreas, tükürük bezleri.)"},{"k":6,"n":27,"s":"Fizyoloji","q":"Gastrik asit sekresyonunda hangi hücre doğrudan asit salgısını gerçekleştirir?","o":{"A":"Enterokromaffin benzeri (ECL) hücreler","B":"Paryetal hücreler","C":"G hücreleri","D":"Şef hücreleri","E":"D hücreleri"},"c":"B","e":"· HCl'yi bizzat üreten paryetal hücredir (intrinsik faktörü de o yapar). G ve ECL yalnızca sinyal verir; musluğu açıp asidi akıtan paryetaldir."},{"k":6,"n":28,"s":"Fizyoloji","q":"Bağırsakta apikal bikarbonat salgılanması hangi mekanizma ile gerçekleşir?","o":{"A":"Cl⁻/HCO₃⁻ kotransportu","B":"ATP'ye bağlı H⁺ pompası","C":"Cl⁻/HCO₃⁻ değiştiricisi","D":"Na⁺/K⁺ pompası","E":"Glukoz/HCO₃⁻ değiştiricisi"},"c":"C","e":"· Apikalde Cl⁻ içeri girerken HCO₃⁻ dışarı (lümene) çıkar = antiport/değiştirici. Kotransport olsaydı ikisi aynı yöne giderdi; burada takas vardır."},{"k":6,"n":29,"s":"Fizyoloji","q":"Gastrik asit sekresyonunun direkt uyarılmasında hangi nörotransmitter görevlidir?","o":{"A":"Asetilkolin","B":"Dopamin","C":"Serotonin","D":"Somatostatin","E":"VIP"},"c":"A","e":"· Üçlü tetikçi: ACh + gastrin + histamin → asit↑. Bunlardan nörotransmitter olan asetilkolindir (vagus aracılığıyla). Somatostatin ise tam tersine asidi↓ yapar."},{"k":6,"n":30,"s":"Fizyoloji","q":"Sindirim süreci hangi organda başlar?","o":{"A":"Kalın bağırsak","B":"Ağız","C":"Mide","D":"İnce bağırsak","E":"Pankreas"},"c":"B","e":"· Sindirim ağızda başlar: çiğneme (mekanik) + tükürük amilazı/lipazı (kimyasal). Yol haritası: ağız → farinks → özofagus → mide → ince/kalın bağırsak."},{"k":6,"n":31,"s":"Fizyoloji","q":"Pankreas salgısının en güçlü humoral uyarıcısı nedir?","o":{"A":"Kolesistokinin","B":"Glukagon","C":"Gastrin","D":"İnsülin","E":"Sekretin"},"c":"E","e":"· Duodenum asitlenince sekretin salınır → pankreastan bol bikarbonatlı sıvı ister. CCK enzim salgısını tetikler, ama bikarbonat/sıvının en güçlü humoral uyarıcısı sekretindir."},{"k":6,"n":32,"s":"Fizyoloji","q":"Yağların esas sindirimi hangi enzimin aracılığıyla olur?","o":{"A":"Enterik lipaz","B":"Lingual lipaz","C":"Pankreatik lipaz","D":"Gastrik lipaz","E":"Kolonik lipaz"},"c":"C","e":"· Yağın aslan payını pankreatik lipaz sindirir. Lingual/gastrik lipazlar (özellikle bebeklerde) küçük katkı yapar; \"kolonik lipaz\" diye bir enzim yoktur."},{"k":6,"n":33,"s":"Fizyoloji","q":"Bağırsakta basolateral membrandan hücre içerisine klor iyonu sağlayan yapı hangisidir?","o":{"A":"CFTR kanalı","B":"Na-K ATPaz","C":"CaCC kanalı","D":"NKCC1 (Na-K-2Cl)","E":"Cl⁻/HCO₃⁻ değiştirici"},"c":"D","e":"· Cl⁻'yi hücreye bazolateralden dolduran taşıyıcı NKCC1'dir; biriken Cl⁻ sonra apikaldeki CFTR'den lümene boşalır. CFTR ise Cl⁻'yi içeri değil, dışarı atar."},{"k":6,"n":34,"s":"Fizyoloji","q":"Midede proteinlerin sindirimini sağlayan enzim hangisidir?","o":{"A":"Pepsin","B":"Tripsin","C":"Kimotripsin","D":"Amilaz","E":"Pankreatik lipaz"},"c":"A","e":"· Midenin asidik ortamında çalışan tek protein kıyıcısı pepsindir (pepsinojenden HCl ile aktive olur). Tripsin/kimotripsin bağırsakta, amilaz nişastada, lipaz yağda çalışır."},{"k":6,"n":35,"s":"Fizyoloji","q":"Yağ asitlerinin emilmeden önce protonlanmasını sağlayan iyon hangisidir?","o":{"A":"Ca²⁺","B":"Na⁺","C":"Cl⁻","D":"Mg²⁺","E":"H⁺"},"c":"E","e":"· Yağ asitleri H⁺ ile protonlanıp yüksüz hale gelince apikal membrandan kolayca geçebilir. Yani cevap basitçe protondur (H⁺)."},{"k":6,"n":36,"s":"Fizyoloji","q":"Gastrik asit sekresyonunun \"sefalik fazı\" hangi uyaranla başlar?","o":{"A":"Mide duvarının gerilmesi","B":"Besinlerin kokusunun alınması","C":"Mideye giren besinler","D":"Duodenumda yağların varlığı","E":"Kan şekerinin düşmesi"},"c":"B","e":"· Sefalik faz \"kafadan\" başlar: yemeğin kokusu/görüntüsü/düşüncesi bile vagusu uyarır. Mide gerilmesi = gastrik faz; duodenumdaki yağ = intestinal faz."},{"k":6,"n":37,"s":"Histoloji","q":"Aşağıdaki seçeneklerden hangisi tükürüğün fonksiyonlarından biri değildir?","o":{"A":"Karbonhidrat sindirimini başlatır","B":"Diş minesi demineralizasyonunu kolaylaştırır","C":"Ağız içi pH'ını tamponlayarak asitleri nötralize eder","D":"Antimikrobiyal etki gösterir","E":"Yutmayı ve konuşmayı kolaylaştırır"},"c":"B","e":"· Tükürük tam tersini yapar: kalsiyum-fosfatıyla REmineralizasyonu destekler, mineyi korur. \"Demineralizasyonu kolaylaştırır\" ifadesi yanlış olduğu için cevap odur."},{"k":6,"n":38,"s":"Histoloji","q":"Sindirim kanalındaki enterik sinir sistemi hangi iki pleksustan oluşur?","o":{"A":"Ruffini ve Meissner","B":"Auerbach ve Mater","C":"Pacinian ve Merkel","D":"Meissner ve Krause","E":"Meissner ve Auerbach"},"c":"E","e":"· İkili: Meissner (submukozal; salgı + kan akımı) ve Auerbach (myenterik; motilite). Ruffini/Pacinian/Merkel/Krause ise DERİ duyu reseptörleridir — tuzak şıkları."},{"k":6,"n":39,"s":"Histoloji","q":"Brunner bezleri hangi bölgeye özgüdür ve işlevi nedir?","o":{"A":"Jejunum – Sindirim enzimleri salgılar","B":"İleum – Su emilimini arttırır","C":"Duodenum – Gastrik asidi nötralize eder","D":"Mide – Pepsin üretimini destekler","E":"Kolon – Mukus üretimini arttırır"},"c":"C","e":"· Brunner bezleri yalnızca duodenum submukozasındadır; alkali mukus salgılayıp mideden gelen asidi nötralize eder. \"Brunner = duodenumun tamponu.\""},{"k":6,"n":40,"s":"Histoloji","q":"Mide mukozasında bulunan fundik bezlerde hangi hücreler hidroklorik asit üretir?","o":{"A":"Şef hücreler","B":"Enteroendokrin hücreler","C":"Goblet hücreler","D":"Paryetal hücreler","E":"M hücreleri"},"c":"D","e":"· HCl + intrinsik faktör = paryetal (oksintik) hücre işi. Şef = pepsinojen; goblet midede yok; M hücreleri bağırsak lenfoid dokusunda (Peyer plakları) görev yapar."},{"k":6,"n":41,"s":"Histoloji","q":"Sirkumvallat papillalarla ilişkili Von Ebner bezlerinin salgı fonksiyonu nedir?","o":{"A":"Dil mukozasını nemlendirir","B":"Dil epitelini yeniler","C":"Dilin mekanik hareketine yardımcı olur","D":"Tat tomurcuklarının temizlenmesini sağlayarak yeni duyulara hazırlar","E":"Protein sindirimini başlatır"},"c":"D","e":"· Von Ebner (seröz) bezleri papilla hendeklerini yıkar, eski tat moleküllerini süpürür → tomurcuklar yeni tadı algılamaya hazır olur. \"Tat tabağını yıkayan bulaşık makinesi.\""},{"k":6,"n":42,"s":"Histoloji","q":"Ameloblastların özel apikal çıkıntısı nedir?","o":{"A":"Tomes uzantısı","B":"Enamelum membranı","C":"Sharpey lifleri","D":"Herring kanalı","E":"Peritübüler dentin"},"c":"A","e":"· Ameloblastın ucundaki Tomes uzantısı mine prizmalarına şekil verir. Sharpey lifleri sementte, peritübüler dentin ise dentin yapısındadır — karıştırma."},{"k":6,"n":43,"s":"Histoloji","q":"Sindirim kanalının histolojik yapısında en dış tabaka aşağıdakilerden hangisidir?","o":{"A":"Mukoza","B":"Muskularis eksterna","C":"Submukoza","D":"Lamina propria","E":"Seroza / Adventisya"},"c":"E","e":"· İçten dışa dört kat: Mukoza → Submukoza → Muscularis externa → Seroza/Adventisya. En dışta organ periton ile örtülüyse seroza, değilse adventisya denir."},{"k":6,"n":44,"s":"Histoloji","q":"Dilde en fazla bulunan papilla tipi aşağıdakilerden hangisidir?","o":{"A":"Sirkumvallat papilla","B":"Filiform papilla","C":"Fungiform papilla","D":"Foliat papilla","E":"Mikst papilla"},"c":"B","e":"· Filiform papillalar dilin her yerini kaplar, keratinizedir ve tat tomurcuğu TAŞIMAZ — görevi mekaniktir (tutma/sürtünme). Sayıca açık ara birincidir."},{"k":6,"n":45,"s":"Histoloji","q":"Aşağıdaki mukozalardan hangisi tat alma ile ilişkilidir?","o":{"A":"Seröz mukoza","B":"Döşeyici mukoza","C":"Özelleşmiş mukoza","D":"Çiğneme mukozası","E":"Sekretuar mukoza"},"c":"C","e":"· Dilin sırtındaki \"özelleşmiş mukoza\" tat tomurcuklarını barındırır. Döşeyici mukoza (yanak/dudak içi) ve çiğneme mukozası (damak/dişeti) tat almaz."},{"k":6,"n":46,"s":"Histoloji","q":"Kupffer hücrelerinin temel görevi nedir?","o":{"A":"Fagositoz","B":"Safra üretimi","C":"Detoksifikasyon","D":"Glikojen depolamak","E":"Lipoprotein sentezlemek"},"c":"A","e":"· Kupffer = karaciğerin makrofajı; yaşlı eritrositleri ve bakterileri yutarak kanı temizler. Safra, detoks, glikojen ve lipoprotein işleri ise hepatositlere aittir."},{"k":6,"n":47,"s":"Histoloji","q":"Pankreasta insülini salgılayan hücreler hangisidir?","o":{"A":"Beta hücreleri","B":"Alfa hücreleri","C":"Delta hücreleri","D":"F hücreleri","E":"Enterositler"},"c":"A","e":"· Langerhans adacıklarında β = insülin, α = glukagon, δ = somatostatin, F (PP) = pankreatik polipeptid. \"Beta = Besler; şekeri içeri sokar.\""},{"k":6,"n":48,"s":"Histoloji","q":"Hepatositlerin metabolit alışverişi yaptığı alan aşağıdakilerden hangisidir?","o":{"A":"Sinüzoidal boşluk","B":"Portal ven","C":"Mall boşluğu","D":"Kupffer hücreleri","E":"Disse mesafesi"},"c":"E","e":"· Hepatosit ile kan arasındaki madde takası, sinüzoid ile hepatosit arasındaki Disse mesafesinde olur (mikrovilluslar buraya sarkar). Sinüzoid sadece kanın aktığı kanaldır."},{"k":6,"n":49,"s":"Histoloji","q":"Pankreasın ekzokrin kısmında sindirim enzimlerini üreten yapılar nelerdir?","o":{"A":"Goblet hücreleri","B":"Langerhans adacıkları","C":"Paryetal hücreler","D":"Hepatositler","E":"Asiner hücreler"},"c":"E","e":"· Ekzokrin pankreasın enzim fabrikaları asiner hücrelerdir (zimojen salgılar). Langerhans adacıkları ise endokrin kısımdır (insülin/glukagon)."},{"k":6,"n":50,"s":"Biyokimya","q":"Paratiroid hormonu (PTH) ile ilgili aşağıdaki ifadelerden hangisi doğrudur?","o":{"A":"Böbreklerde Ca²⁺ geri emilimini azaltır","B":"Aktif D vitamini, paratiroid bezini uyararak PTH sekresyonunu arttırır","C":"Serumda serbest Ca²⁺ artması sonucu PTH salgısı artar","D":"Hedef dokuları kemik ve böbreklerdir","E":"Kemik dokusunda mineralizasyonu arttırır"},"c":"D","e":"· PTH kanda kalsiyumu YÜKSELTİR: kemikten rezorpsiyon + böbrekte geri emilim. Hedefi kemik ve böbrektir. (A, B, C ve E'nin hepsi ters yönde olduğu için yanlıştır.)"},{"k":6,"n":51,"s":"Biyokimya","q":"Kan tahlilinde düşük serbest T4, yüksek TSH ve pozitif Anti-TPO saptanan hastada hangi hastalık düşünülür?","o":{"A":"Toksik Multinodüler Guatr","B":"Paget Hastalığı","C":"Graves Hastalığı","D":"Hashimoto tiroiditi","E":"Addison Hastalığı"},"c":"D","e":"· Düşük T4 + yüksek TSH = primer HİPOtiroidi; üstüne pozitif Anti-TPO = otoimmün tiroidit → Hashimoto. Graves ve toksik guatr hiPERtiroidi yapar (T4 yüksek olurdu)."},{"k":6,"n":52,"s":"Biyokimya","q":"Aşağıdakilerden hangisi tiroid hormonlarının metabolik etkilerinden biri değildir?","o":{"A":"Oksijen tüketimini artırır","B":"LDL reseptörlerini artırarak kolesterol yıkımını artırır","C":"Glikolizi ve glikoneogenezi artırır","D":"Termogenezi artırır","E":"Bazal metabolizma hızını yavaşlatır"},"c":"E","e":"· Tiroid hormonu metabolizmanın gaz pedalıdır: BMR'yi, O₂ tüketimini, ısıyı ve kalp hızını ARTIRIR. \"Yavaşlatır\" demek tam tersi → cevap E."},{"k":6,"n":53,"s":"Biyokimya","q":"Yenidoğan bebekte üridin difosfat glukuronoziltransferaz (UGT) eksikliği şüphesi varsa, tanıyı desteklemek için hangisinin konsantrasyonu ölçülmelidir?","o":{"A":"Hemoglobin","B":"Safra Asitleri","C":"Üre","D":"Kreatinin","E":"Bilirubin"},"c":"E","e":"· UGT, bilirubini glukuronik asitle konjuge eden enzimdir. Eksikse konjuge olmamış bilirubin birikir → sarılık. Bu yüzden bilirubin bakılır (Crigler-Najjar / Gilbert mantığı)."},{"k":6,"n":54,"s":"Biyokimya","q":"Aşağıda verilen bilgilerden hangisi yanlıştır?","o":{"A":"Hepatosellüler hasar belirteçlerinden ALT, AST'ye göre daha spesifiktir","B":"De Ritis oranı, alkole bağlı karaciğer hastalıklarında 2'den küçüktür","C":"Pre-hepatik sarılıkta idrarda bilirubin bulunmaz","D":"Albumin ölçümü gerçek karaciğer fonksiyon testidir","E":"ALP'nin klinik önemi, hepatobiliyer ile osteojenik hastalığı ayırt etmesidir"},"c":"B","e":"· De Ritis oranı = AST/ALT. Alkolik hepatitte bu oran genellikle 2'den BÜYÜK olur (\"alkolde AST baskın\"). \"2'den küçüktür\" demek yanlış → cevap B."},{"k":6,"n":55,"s":"Biyokimya","q":"Verilen enzimlerden (I. ALT, II. GGT, III. AST, IV. 5'-nükleotidaz) hangisi/hangileri kolestaz belirteçleridir?","o":{"A":"II ve IV","B":"I ve II","C":"III ve IV","D":"II ve III","E":"Yalnız I"},"c":"A","e":"· Kolestaz ekibi: ALP, GGT, 5'-nükleotidaz. ALT ve AST ise hepatosellüler hasar belirtecidir. Listede kolestaza ait olanlar GGT (II) ve 5'-NT (IV)'tür."},{"k":6,"n":56,"s":"Biyokimya","q":"Primer hemostaz aşağıdaki kan hücrelerinden hangisi ile gerçekleşir?","o":{"A":"Trombosit","B":"Nötrofil","C":"Lökosit","D":"Lenfosit","E":"Eritrosit"},"c":"A","e":"· Primer hemostaz = trombosit tıkacı (yapışma + agregasyon). Pıhtılaşma faktörleri/fibrin ise sekonder hemostazdır. \"Önce trombosit tıkacı, sonra fibrin örgü.\""},{"k":6,"n":57,"s":"Biyokimya","q":"Plazma ve serum arasındaki farkla ilgili aşağıdaki ifadelerden hangisi doğrudur?","o":{"A":"Serum, pıhtılaşmış kandan elde edilir ve fibrinojen içermez","B":"Serum, antikoagülan eklenmiş kandan elde edilir ve fibrinojen içerir","C":"Plazma, pıhtılaşma sonrası oluşan sıvı kısımdır","D":"Plazma, pıhtılaşmış kandan elde edilir ve pıhtılaşma faktörlerini içermez","E":"Serum ve plazma arasında pıhtılaşma faktörleri açısından fark yoktur"},"c":"A","e":"· Serum = kan pıhtılaştıktan SONRA kalan sıvı → fibrinojen ve faktörler harcanmıştır, içermez. Plazma ise antikoagülanlı kandan ayrılır, faktörleri içerir. Asıl fark tam burada."},{"k":6,"n":58,"s":"Biyokimya","q":"Aşağıdaki seçeneklerden hangisi hemostaz parametreleri arasında değildir?","o":{"A":"Trombositler","B":"Pıhtılaşma proteinleri","C":"Damarın iç yüzeyini kaplayan endotel hücreleri","D":"Eritrositler ve genel kan dolaşımı","E":"Fibrinolitik sistem"},"c":"D","e":"· Hemostazın temel oyuncuları: endotel + trombosit + pıhtılaşma faktörleri + fibrinolitik sistem. Eritrositler ve \"genel kan dolaşımı\" bu dörtlüye doğrudan dahil değildir → cevap D."},{"k":6,"n":59,"s":"Biyokimya","q":"Aterosklerozlu / aterotrombozlu olgularda kullanılan aspirin ile ilgili hangisi doğrudur?","o":{"A":"Aspirin, trombosit agregasyonunu doza bağlı azaltan bir ajandır","B":"Aspirin ve heparinin etki mekanizması birbirine benzer","C":"Aspirin, pıhtılaşma proteinlerini etkileyerek pıhtılaşma zamanını uzatır","D":"Aspirin, hemostazda sıklıkla kullanılan bir antikoagülandır","E":"Aspirin ve oral antikoagülanlar aynı etkiyi gösterir"},"c":"A","e":"· Aspirin bir antiAGREGAN'dır (trombositi etkiler), antikoagülan değil. Heparin/warfarin ise pıhtılaşma faktörlerini etkiler → mekanizmaları farklıdır."},{"k":6,"n":60,"s":"Biyokimya","q":"Ateroskleroz tarifi ile ilgili en doğru seçenek aşağıdakilerden hangisidir?","o":{"A":"Trombositlerin aktif olduğu bir hastalık","B":"Pıhtılaşma proteinlerinin aktif olduğu bir hastalık","C":"Hemoglobin A1c ve kan şekerinin yüksek olduğu bir hastalık","D":"Kolesterol düzeylerinin yüksek olduğu bir hastalık","E":"Endotel hasarı ile karakterize kronik inflamatuar bir hastalık"},"c":"E","e":"· Ateroskleroz özünde endotel hasarıyla başlayan KRONİK İNFLAMATUAR damar hastalığıdır. Yüksek kolesterol önemli bir risktir ama tanım değildir; A1c yüksekliği diyabet tanımıdır."},{"k":6,"n":61,"s":"Biyokimya","q":"Verilenlerden (I. Hematokrit, II. B12, III. Hemoglobin, IV. Ferritin) hangisi/hangileri anemi tanısında 1. kademe testlerdendir?","o":{"A":"I ve II","B":"II ve III","C":"I ve III","D":"Yalnız IV","E":"III ve IV"},"c":"C","e":"· 1. kademe = \"Anemi var mı?\" sorusunu yanıtlayan tam kan sayımı parametreleri: Hematokrit + Hemoglobin. B12 ve ferritin ise \"neden?\" sorusunun 2. kademe testleridir."},{"k":6,"n":62,"s":"Biyokimya","q":"Aşağıdaki seçeneklerden hangisi anemi tipleri için yanlıştır?","o":{"A":"Megaloblastik anemide DNA sentezi bozulmuştur","B":"Mikrositik anemide temel problem hemoglobin sentezi bozukluğudur","C":"Demir eksikliği anemisinde ferritin düzeyi yükselmiştir","D":"Makrositik anemide eritrositler normalden büyüktür","E":"Globin sentezi bozulmuşsa talasemi söz konusudur"},"c":"C","e":"· Demir eksikliğinde ferritin (demir deposu) DÜŞER, yükselmez — \"depo boşalmış\" demektir."},{"k":6,"n":63,"s":"Biyokimya","q":"Bakteriyel laktik asit, plak pH'ını düşürerek hidroksiapatiti çözer. Diş macunundaki hangi iyon, hidroksiapatiti güçlendirip mineyi demineralizasyona karşı korur?","o":{"A":"Klorür","B":"Florür","C":"Gümüş","D":"Çinko","E":"Magnezyum"},"c":"B","e":"· Florür, hidroksiapatitle birleşip floroapatit oluşturur; bu yapı aside çok daha dayanıklıdır. \"Flor = minenin zırhı.\""},{"k":6,"n":64,"s":"Biyokimya","q":"Dental mine demineralizasyonu için kritik pH değeri aşağıdakilerden hangisidir?","o":{"A":"pH 5.5","B":"pH 7.5","C":"pH 6.5","D":"pH 4.5","E":"pH 3.5"},"c":"A","e":"· Mine, pH ~5.5'in altına düşünce çözünmeye başlar = kritik pH. (Dentin/sement için bu eşik daha yüksektir, ~6.2–6.7.) \"5.5 = minenin kırmızı çizgisi.\""},{"k":6,"n":65,"s":"Mikrobiyoloji","q":"Aşağıdaki antimikrobiyal peptitlerden hangisi bakterilere bağlanarak aglütinasyonuna neden olur ve böylece yutkunmayla elimine edilmelerini sağlar?","o":{"A":"Staterin","B":"Alfa defensin","C":"Lizozim","D":"Müsin","E":"Laktoferrin"},"c":"D","e":"· Müsin bakterileri birbirine yapıştırıp kümeler (aglütinasyon) → tükürükle yutulup atılırlar. Ayrıca yüzeyleri kayganlaştırıp tutunmayı engeller."},{"k":6,"n":66,"s":"Mikrobiyoloji","q":"Aşağıdaki bakterilerden hangisi süperantijen özelliğinde toksin üretebilir?","o":{"A":"Streptococcus anginosus","B":"Streptococcus pneumoniae","C":"Streptococcus pyogenes","D":"Streptococcus agalactiae","E":"Streptococcus mitis"},"c":"C","e":"· S. pyogenes (A grubu) süperantijenleriyle (örn. toksik şok toksini) bağışıklığı topyekûn azdırır. Pneumoniae'de kapsül, agalactiae'de yenidoğan sepsisi öne çıkar."},{"k":6,"n":67,"s":"Mikrobiyoloji","q":"Aşağıdaki bakterilerden hangisi diş çürüğünün oluşmasında birinci derecede sorumludur?","o":{"A":"Streptococcus mutans","B":"Streptococcus salivarius","C":"Streptococcus bovis","D":"Streptococcus vestibularis","E":"Streptococcus intermedius"},"c":"A","e":"· S. mutans çürüğün başlatıcısıdır: asit üretir, dişe yapışır, düşük pH'ta yaşar. (İlerletmede Lactobacillus devreye girer.) \"Mutans = çürüğün mimarı.\""},{"k":6,"n":68,"s":"Mikrobiyoloji","q":"Aşağıdaki antimikrobiyal peptitlerden hangisi bakteri hücre duvarının peptidoglikan yapısını parçalayarak etkili olur?","o":{"A":"Müsin","B":"Lizozim","C":"Alfa defensin","D":"Staterin","E":"Laktoferrin"},"c":"B","e":"· Lizozim, peptidoglikandaki bağı (NAM–NAG) keser → duvar çöker, bakteri patlar. Defensinler zarda por açar, laktoferrin demiri çalar; duvarı kıran lizozimdir."},{"k":6,"n":69,"s":"Mikrobiyoloji","q":"Aşağıdaki bakterilerden hangisinin etken olduğu enfeksiyonlarda apse örneğinde \"sülfür granülleri\" saptanabilir?","o":{"A":"Actinomyces israelii","B":"Lactobacillus rhamnosus","C":"Eubacterium yurii","D":"Streptococcus intermedius","E":"Propionibacterium acnes"},"c":"A","e":"· Aktinomikozun imzası, akıntıda görülen sarı \"sülfür granülleri\"dir (aslında bakteri kolonileri). Klasik etken Actinomyces israelii'dir."},{"k":6,"n":70,"s":"Mikrobiyoloji","q":"Aşağıdaki bakterilerden hangisinin asite toleransı diğerlerinden daha yüksektir?","o":{"A":"Streptococcus","B":"Lactobacillus","C":"Staphylococcus","D":"Enterococcus","E":"Actinomyces"},"c":"B","e":"· Lactobacillus hem bol asit üretir (asidojenik) hem de o asitte hayatta kalır (asidürik). Bu yüzden çürük ilerledikçe ortamda baskın hale gelir."},{"k":6,"n":71,"s":"Mikrobiyoloji","q":"Aşağıdaki ifadelerden hangisi yanlıştır?","o":{"A":"Periodontal enfeksiyonlarda pH değeri yükselir","B":"Diş çürüğü durumunda pH değeri düşer","C":"Asidofilik bakteriler yüksek asitli ortamlarda üreyemezler","D":"Siyah pigmentli anaeroplar, hem grubu içeren molekülleri parçalayabilir","E":"Diş eti oluğu sıvısı, IgG gibi konak savunma elemanlarını içerir"},"c":"C","e":"· Asidofilik (\"asit seven\") bakteriler tam da asitli ortamda üRER. \"Üreyemezler\" demek tersidir → cevap C. (Periodontitte protein yıkımı amonyak yapıp pH yükseltir; çürükte asit yapıp pH düşürür.)"},{"k":6,"n":72,"s":"Mikrobiyoloji","q":"Actinomyces naeslundii aşağıdaki yapılardan hangisi ile diş yüzeyindeki diğer bakterilerle bağlantı kurar?","o":{"A":"Tip I Fimbria","B":"Tip II Fimbria","C":"M proteini","D":"Antijen I/II","E":"PRR proteini"},"c":"B","e":"· Tip II fimbria → diğer bakterilere koagregasyon (bakteriler arası kenetlenme). Tip I fimbria ise pelikül/tükürük proteinlerine, yani diş yüzeyine tutunmayı sağlar."},{"k":6,"n":73,"s":"Mikrobiyoloji","q":"Oral mikrobiyotada bulunan alfa hemolitik streptokoklar, aşağıdaki terimlerden hangisi ile ifade edilir?","o":{"A":"Patojen ilişkili streptokoklar","B":"A grubu streptokoklar","C":"B grubu streptokoklar","D":"Viridans streptokoklar","E":"Latent streptokoklar"},"c":"D","e":"· Ağzın alfa-hemolitik (yeşilimsi hemoliz) streptokokları \"viridans\" grubudur (S. mutans, mitis, salivarius...). A grubu = S. pyogenes, B grubu = S. agalactiae."},{"k":6,"n":74,"s":"Mikrobiyoloji","q":"Protein A, aşağıdaki bakterilerin hangisinin hücre duvarında bulunur?","o":{"A":"Streptococcus pneumoniae","B":"Enterococcus faecalis","C":"Actinomyces israelii","D":"Staphylococcus aureus","E":"Eubacterium yurii"},"c":"D","e":"· Protein A, S. aureus'un önemli virülans faktörüdür: IgG'nin Fc ucuna ters yapışıp opsonizasyon ve fagositozu engeller. \"Protein A = stafilokokun kalkanı.\""},{"k":6,"n":75,"s":"Mikrobiyoloji","q":"Aşağıdaki oral streptokok gruplarından hangisi iç organlardaki piyojenik ve derin yerleşimli apselerde diğerlerinden daha yüksek oranda saptanır?","o":{"A":"Anginosus","B":"Mutans","C":"Mitis","D":"Sanguinis","E":"Salivarius"},"c":"A","e":"· Anginosus grubu (S. anginosus/intermedius/constellatus) derin apse yapmaya eğilimlidir. Mutans = çürük, sanguinis = endokardit, mitis/salivarius = ağız florası ile anılır."},{"k":6,"n":76,"s":"Mikrobiyoloji","q":"Aşağıdakilerden hangisi birincil (primer) lenfoid organdır?","o":{"A":"Lenf düğümleri","B":"Timus","C":"Peyer plağı","D":"Dalak","E":"Bademcik (Tonsil)"},"c":"B","e":"· Primer lenfoid organlar = lenfositlerin OLGUNLAŞTIĞI yerlerdir: kemik iliği ve timus. Lenf düğümü, dalak, tonsil ve Peyer plağı ise sekonder (karşılaşmanın olduğu) organlardır."},{"k":6,"n":77,"s":"Mikrobiyoloji","q":"Antikorlar için aşağıdaki önermelerden hangisi yanlıştır?","o":{"A":"Bir patojenin, farklı antikorlarca tanınan birçok antijenik bölgesi vardır","B":"Her antikorun en az iki adet benzer antijen bağlanma bölgesi vardır","C":"Antijenleri spesifik olarak tanıyan proteinlerdir","D":"Antikorlar, serum proteinlerinin immünoglobülin (Ig) grubundadır","E":"Her B lenfosit en az iki farklı antikor salgılar"},"c":"E","e":"· \"Bir B hücresi → bir antikor özgüllüğü\" (klonal seçim). Bir B lenfosit yalnızca TEK çeşit özgüllükte antikor üretir; \"iki farklı\" demek yanlış → cevap E."},{"k":6,"n":78,"s":"Mikrobiyoloji","q":"Aşağıdaki klinik tablolardan hangisi Tip II aşırı duyarlılık (IgG aracılı) kapsamına girer?","o":{"A":"Sistemik anafilaksi","B":"Kontakt dermatit","C":"M. tuberculosis granülomu","D":"Graves hastalığı","E":"Sistemik Lupus Eritematozus (SLE)"},"c":"D","e":"· Graves'te IgG antikorları doğrudan TSH reseptörüne bağlanır = Tip II. Anafilaksi Tip I; kontakt dermatit ve TB granülomu Tip IV; SLE / serum hastalığı Tip III'tür."},{"k":6,"n":79,"s":"Mikrobiyoloji","q":"Aşağıdakilerden hangisi sekonder (ikincil) immün yetmezlik hastalıklarındandır?","o":{"A":"DiGeorge Sendromu","B":"X-bağımlı SCID","C":"Bare lenfosit sendromu","D":"Acquired Immunodeficiency Syndrome (AIDS)","E":"Lökosit adezyon yetmezliği"},"c":"D","e":"· AIDS sonradan kazanılır (HIV) → sekonder. Diğerleri doğuştan/genetiktir = primer immün yetmezlik. İsmindeki \"Acquired\" (edinilmiş) zaten ipucudur."},{"k":6,"n":80,"s":"Mikrobiyoloji","q":"Aşağıdaki hücre gruplarından hangisi naif T helper hücrelerine antijen sunar?","o":{"A":"Sitotoksik T hücreleri","B":"Eozinofiller","C":"Nötrofiller","D":"Bazofiller","E":"Dendritik hücreler"},"c":"E","e":"· Naif T hücresini ilk uyaran profesyonel antijen sunucu dendritik hücredir (MHC-II ile). Eozinofil/nötrofil/bazofil efektör hücrelerdir, naif T'yi eğitmezler."},{"k":6,"n":81,"s":"Mikrobiyoloji","q":"Aşağıdakilerin hangisi doğal (innate) immün yanıt özelliğidir?","o":{"A":"Hafıza oluşur","B":"Daha önce karşılaşılan antijene cevap hızı farklıdır","C":"Antijene özgül (spesifik) yanıt oluşur","D":"Antikorlar üretilir","E":"Mekanizmaları enfeksiyon öncesinde de aktiftir"},"c":"E","e":"· Doğal bağışıklık hızlı, hazır ve HAFIZASIZDIR; enfeksiyondan önce de görevdedir. Hafıza, özgüllük ve antikor üretimi ise edinsel (adaptif) bağışıklığın işidir."},{"k":6,"n":82,"s":"Mikrobiyoloji","q":"Bazı immün hücreler iki nitelik taşır: mikroplara özgül yanıt geliştirir ve karşılaştığı mikroba karşı hafıza kazanır. Bu iki özelliği birden gösteren hücre hangisidir?","o":{"A":"NK hücreleri","B":"B lenfositler","C":"Dendritik hücreler","D":"Makrofajlar","E":"Nötrofiller"},"c":"B","e":"· Özgüllük + hafıza = adaptif bağışıklığın imzası; bunu taşıyan B (ve T) lenfositlerdir. NK, dendritik, makrofaj ve nötrofil doğal bağışıklık ekibindendir."},{"k":6,"n":83,"s":"Mikrobiyoloji","q":"Aşağıdaki hücrelerin hangisi antijenleri işlenmiş olarak tanır?","o":{"A":"CD4+ T hücreleri","B":"NK hücreleri","C":"Makrofajlar","D":"Dendritik hücreler","E":"Nötrofiller"},"c":"A","e":"· CD4+ T hücresi antijeni ancak MHC-II üzerinde \"işlenmiş peptid\" olarak görür. Makrofaj/dendritik hücre sunan taraftır; NK ve nötrofil ise işlenmiş antijen tanımadan iş görür."},{"k":6,"n":84,"s":"Mikrobiyoloji","q":"Doğal immün yanıta ait hücrelerden hangisi enfeksiyon alanına ilk ulaşır?","o":{"A":"NK","B":"Bazofil","C":"Eozinofil","D":"Nötrofil","E":"Monosit"},"c":"D","e":"· Olay yerine ilk koşan asker nötrofildir (akut inflamasyonun ilk hücresi). Monosit/makrofaj sahaya nötrofilden sonra varır."},{"k":7,"n":1,"s":"Protez","q":"Aşağıdakilerden hangisi adeziv (Maryland) köprülerin avantajlarından biridir? Orijinal: 1","o":{"A":"Supragingival hazırlık","B":"Tekrar simante edilebilmesi","C":"Arka dişlere de uygulanabilmesi","D":"Anestezi uygulanmaması","E":"Minimum düzeyde diş preparasyonu"},"c":"E","e":"Adeziv köprünün ayırt edici üstünlüğü diş dokusunun maksimum korunmasıdır — preparasyon minimaldir. (Supragingival hazırlık ve anestezi gerekmemesi de avantajdır; ancak \"en"},{"k":7,"n":2,"s":"Protez","q":"Aşağıdakilerden hangisi adeziv köprünün avantajlarından DEĞİLDİR? Orijinal: 31","o":{"A":"Minimum diş preparasyonu","B":"Anestezi gereksiniminin az olması","C":"Supragingival bitim çizgisi","D":"Arka (posterior) dişlerde rutin kullanılabilmesi","E":"Komşu sağlam dişlerin korunması"},"c":"D","e":"Adeziv köprü esas olarak ön (anterior) bölge içindir; posteriorda çiğneme kuvvetleri yüksek olduğundan rutin endikasyonu yoktur. (1. sorunun tam tersi mantığı.)"},{"k":7,"n":3,"s":"Protez","q":"En yüksek eğme (bükülme) dayanımına sahip dental seramik hangisidir? ★ ÇOK ÇIKAN Orijinal: 2 · 4 · 12","o":{"A":"Zirkonya ile güçlendirilmiş alümina (ZTA)","B":"Y-TZP (zirkonya)","C":"IPS Empress 2","D":"Alümina","E":"IPS e.max (lityum disilikat)"},"c":"B","e":"Y-TZP zirkonya (~900–1200 MPa) dental seramikler içinde en yüksek eğme dayanımlı, \"en dayanıklı\" seramiktir. (Estetik sıralamada ise en geride; en estetik = feldspatik.) Bu kavram sınavda 3 kez çıktı."},{"k":7,"n":4,"s":"Protez","q":"Üç üyeli anterior köprü yapımında hangi tam seramik tercih edilir? Orijinal: 22","o":{"A":"IPS Empress","B":"IPS e.max press","C":"In-Ceram Spinell","D":"Feldspatik seramik","E":"Hepsi doğru"},"c":"B","e":"Lityum disilikat (e.max press) ön bölge köprüsü için yeterli dayanım + iyi estetik verir. Empress (lösitle güçlendirilmiş) ve feldspatik köprü için çok zayıftır → tek kron/veneer içindir."},{"k":7,"n":5,"s":"Protez","q":"Zirkonyada sinterleme işlemi ile ilgili aşağıdakilerden hangisi yanlıştır? Orijinal: 24","o":{"A":"Partiküllerin kaynaşmasıyla yoğunluk artar","B":"Mekanik dayanım artar","C":"Fiziksel özellikler gelişir","D":"Isısal özellikleri gelişirken fiziksel özellikleri azalır","E":"Translusensi/estetik özellikleri iyileşir"},"c":"D","e":"Sinterleme partikülleri kaynaştırır → yoğunluk, mekanik ve fiziksel özellikler hep ARTAR. \"Fiziksel özelliklerin azalması\" bu yüzden yanlıştır."},{"k":7,"n":6,"s":"Protez","q":"Aşağıdaki tam seramik sistemlerden hangisinin elastikiyet (elastisite) modülü en yüksektir? Orijinal: 45","o":{"A":"Procera AllCeram","B":"IPS e.max","C":"Feldspatik porselen","D":"IPS Empress","E":"Lityum disilikat"},"c":"A","e":"Procera AllCeram yoğun sinterlenmiş alümina esaslıdır → çok rijit. Sıralama: Alümina > Zirkonya > Lityum disilikat > Feldspatik. Püf nokta: en yüksek eğme dayanımı Y-TZP'de, en yüksek elastisite modülü alüminada!"},{"k":7,"n":7,"s":"Protez","q":"Ferrule (kenar kuşak) etkisi için aşağıdakilerden hangisi yanlıştır? Orijinal: 3","o":{"A":"Restorasyonun kırılma direncini arttırır","B":"Post-core restorasyonun başarısını arttırır","C":"En az 1,5–2 mm sağlam dentin kuşağı (yükseklik) gerektirir","D":"Kuvvetleri kök boyunca daha dengeli dağıtır","E":"Sağlam diş dokusuna ihtiyaç duymadan etkisini gösterir"},"c":"E","e":"Ferrule etkisi, kron kenarının 1,5–2 mm sağlam dentini sarmasıyla oluşur → sağlam dokuya MUTLAKA ihtiyaç vardır. \"Sağlam dokuya gerek yok\" ifadesi yanlıştır."},{"k":7,"n":8,"s":"Protez","q":"Döküm (cast) post ile ilgili aşağıdakilerden hangisi yanlıştır? Orijinal: 7","o":{"A":"Bazik metaller korozyona sebep olabilir","B":"Diş/dişeti renklenmesine yol açabilir","C":"Stresi olduğu gibi dentine iletir","D":"Elastisite modülü yüksektir","E":"Kök kırığı riski fiber posta göre daha düşüktür"},"c":"E","e":"Döküm metal postun elastisite modülü dentinden çok yüksektir; kuvvetleri absorbe etmeden iletir → kök kırığı riski fiber posttan DAHA YÜKSEKTİR. \"Daha düşük\" yanlıştır."},{"k":7,"n":9,"s":"Protez","q":"Post-core'un kor (core) kısmı için aşağıdakilerden hangisi kullanılmaz? Orijinal: 39","o":{"A":"Kompozit rezin","B":"Amalgam","C":"Cam iyonomer / rezin modifiye cam iyonomer","D":"Döküm metal","E":"Fiber"},"c":"E","e":"Fiber, kök kanalına yerleşen POST malzemesidir; koronal kor yapımında kullanılmaz. Kor için kompozit, amalgam, Gİ veya döküm metal kullanılır."},{"k":7,"n":10,"s":"Protez","q":"Zirkonya restorasyonların simantasyonu ile ilgili aşağıdaki maddelerden hangileri yanlıştır? Orijinal: 10 1. Büyük taneliAl2O3 tozuyla kumlama, küçük taneliye göre daha etkilidir. 2. MDP içeren rezin simanlar, BIS-GMA içeren konvansiyonel rezin simanlardan daha başarılıdır. 3. Zirkonya restorasyonlar yalnızca rezin simanlarla simante edilebilir. 4. Simantasyon öncesi lazer uygulaması bağlanma kuvvetini arttırır. 5. Silan bağlayıcı ajan, Y-TZP simantasyonunda etkilidir.","o":{"A":"Hepsi doğrudur","B":"2 ve 4","C":"3 ve 5","D":"1 ve 3","E":"4 ve 5"},"c":"D","e":"(1) Büyük taneler yüzeyde hasar/çatlak oluşturur → küçük taneli kumlama daha güvenlidir. (3) Zirkonya, cam iyonomer ve RMGİ ile de simante edilebilir → \"sadece rezin\" yanlış. Doğru cevap: 1 ve 3."},{"k":7,"n":11,"s":"Protez","q":"Aşağıdakilerden hangisi ideal (daimi) simanın özelliklerinden DEĞİLDİR? Orijinal: 14","o":{"A":"Yüksek basınç (kompresyon) dayanımı","B":"İnce film kalınlığı","C":"Mine ve dentine iyi bağlanması","D":"Ağız sıvılarında yüksek çözünürlük","E":"Biyouyumlu olması"},"c":"D","e":"İdeal siman ağız ortamında çözünmemelidir (düşük çözünürlük istenir). \"Yüksek çözünürlük\" ideal bir özellik değildir."},{"k":7,"n":12,"s":"Protez","q":"İdeal geçici simanın özelliği aşağıdakilerden hangisi DEĞİLDİR? Orijinal: 33","o":{"A":"Kolay sökülebilmesi","B":"Kısa sertleşme zamanı","C":"Fazlalıkların kolay uzaklaştırılması","D":"Düşük çözünürlük","E":"Kısa çalışma zamanı"},"c":"E","e":"Geçici simanda hekime rahat uygulama için yeterli (uzun) çalışma zamanı istenir; \"kısa çalışma zamanı\" bir avantaj değildir."},{"k":7,"n":13,"s":"Protez","q":"Pulpası geniş genç bir hastada, kuafaj yapılmış vital 25 numaralı dişe direkt yöntemle hazırlanan tam porselen kronun geçici simantasyonunda hangi materyal tercih edilir? Orijinal: 32","o":{"A":"Çinko fosfat siman","B":"Öjenollü geçici siman","C":"Kalsiyum hidroksitli geçici siman","D":"Cam iyonomer siman","E":"Rezin siman"},"c":"C","e":"Genç/geniş pulpa + kuafaj → pulpayı koruyucu etki gerekir. Final simantasyon rezinle yapılacağından öjenol (B) kontrendikedir (rezin polimerizasyonunu inhibe eder). En uygun: öjenolsüz + koruyucu kalsiyum hidroksitli geçici siman."},{"k":7,"n":14,"s":"Protez","q":"Cam iyonomer siman ile ilgili aşağıdakilerden hangisi yanlıştır? Orijinal: 41","o":{"A":"Flor salınımı yapar","B":"Diş dokusuna kimyasal olarak bağlanır","C":"Biyouyumludur","D":"Dayanıklılığı rezin simandan daha yüksektir","E":"Mine ve dentine adezyon gösterir"},"c":"D","e":"Cam iyonomerin mekanik dayanımı rezin simandan daha düşüktür (Dayanım: Rezin > Cam iyonomer). \"Rezinden daha yüksek\" yanlıştır."},{"k":7,"n":15,"s":"Protez","q":"Laminate veneer uygulamasında hangi ölçü maddesi kullanılır? Orijinal: 13 · 16","o":{"A":"Aljinat (irreversible hidrokolloid)","B":"Elastomerik ölçü maddesi (polieter / poli-vinil siloksan)","C":"Çinko oksit öjenol","D":"Kompozisyon (compound)","E":"Reversible hidrokolloid (agar)"},"c":"B","e":"Laminate hassas marjinal uyum ister → boyutsal stabilitesi ve detay verme kabiliyeti yüksek elastomerik (polieter/PVS) ölçü maddesi kullanılır."},{"k":7,"n":16,"s":"Protez","q":"Laminate veneer kesiminde geçici restorasyonda hangi siman tercih edilir? Orijinal: 8 · 20","o":{"A":"Çinko fosfat siman","B":"Öjenollü geçici siman","C":"Rezin içerikli (öjenolsüz) geçici siman","D":"Cam iyonomer siman","E":"Kalsiyum hidroksitli siman"},"c":"C","e":"Final yapıştırma rezinle olacağından öjenol kontrendike (rezin polimerizasyonunu bozar). Öjenolsüz, rezin içerikli geçici siman seçilir."},{"k":7,"n":17,"s":"Protez","q":"Estetik şikâyetle gelen bir hastaya (ör. kama/peg lateral diş) laminate veneer yapılacaktır. Hangi seramik ve siman tercih edilir? Orijinal: 36 · 37","o":{"A":"Zirkonya + cam iyonomer","B":"Feldspatik seramik + ışıkla sertleşen (light-cure) rezin siman","C":"Lityum disilikat + çinko fosfat","D":"Alümina + öjenollü siman","E":"Metal-seramik + rezin siman"},"c":"B","e":"İnce laminalarda en üstün estetik/translusensi feldspatik seramikle sağlanır; ince ve ışık geçirgen olduğundan ışıkla sertleşen (light-cure) rezin siman idealdir."},{"k":7,"n":18,"s":"Protez","q":"Pontik (köprü gövdesi) tipleri ile ilgili aşağıdakilerden hangisi yanlıştır? Orijinal: 15","o":{"A":"Sferoid/hijyenik pontik, ince krette (özellikle mandibulada) kullanılır","B":"Ridge-lap pontik, kret tepesinin bukkalinden başlar ve temizlenmesi kolaydır","C":"Saddle pontik tüm konturu vererek doğal dişe benzer ama temizliği zordur","D":"İleri kret rezorpsiyonunda molar/premolar bölgede hijyenik pontik kullanılır","E":"Hijyenik pontikte tam metal tercih edilir"},"c":"B","e":"Ridge-lap pontik, saddle ile birlikte temizliği EN ZOR tiplerdendir. \"Temizlenmesi kolaydır\" yanlıştır. (En hijyenik = sanitary/hijyenik pontik; en estetik = ovat/saddle, modifiye ridge-lap.)"},{"k":7,"n":19,"s":"Protez","q":"Aşağıdakilerden hangisi köprü gövdesi (pontik) özelliği DEĞİLDİR? Orijinal: 44","o":{"A":"Temizlenebilir olmalı","B":"Oklüzal kuvvetleri karşılayabilmeli","C":"Yumuşak dokuyu irrite etmemeli","D":"Doku ile teması küçük bir alanda ve içbükey (konkav) olmalı","E":"Fonksiyonel ve estetik uyum sağlamalı"},"c":"D","e":"Pontiğin doku teması küçük olmalı ANCAK dışbükey (konveks) olmalıdır → temizlenebilirlik ve doku sağlığı için. \"İçbükey\" yanlıştır."},{"k":7,"n":20,"s":"Protez","q":"Aşağıdakilerden hangisi dentin asitlemesinin (asit uygulamasının) amaçlarından DEĞİLDİR? Orijinal: 40","o":{"A":"Smear tabakasını kaldırır","B":"Dentin yüzey enerjisini arttırır","C":"İntertübüler ve intratübüler geçirgenliği arttırır","D":"Kollajen ağına penetre olup monomer geçişini sağlayarak yüzeyi bağlanmayahazırlar","E":"Dentinde demineralizasyon oluşturur"},"c":"D","e":"Asit; smear tabakasını kaldırır, demineralize eder, geçirgenliği ve yüzey enerjisini arttırır. Ancak kollajen ağına penetre olup monomer geçişini sağlamak ve yüzeyi bağlanmaya hazırlamak PRİMER'in görevidir."},{"k":7,"n":21,"s":"Protez","q":"Adeziv sistemlerde asit uygulamasının görevlerinden DEĞİLDİR? Orijinal: 47","o":{"A":"Dentin geçirgenliğini arttırır","B":"Dentinde intratübüler geçirgenliği arttırır","C":"Makromekanik tutuculuk (makroretansiyon) oluşturur","D":"İntertübüler geçirgenliği arttırır","E":"Smear tabakasını kaldırır"},"c":"C","e":"Asit mikro-retansiyon (mikroporözite) oluşturur; \"makromekanik retansiyon\" sağlamak asitin görevi değildir. (Kaynakta C şıkkı kesikti; konuya uygun yeniden yazıldı.)"},{"k":7,"n":22,"s":"Protez","q":"Diş sert dokuları ve adeziv bağlanma ile ilgili aşağıdakilerden hangisi yanlıştır? Orijinal: 19","o":{"A":"Mine yaklaşık %96 oranında inorganik yapıdadır","B":"Dentin yaklaşık %70 inorganik içeriğe sahiptir","C":"Adeziv/kompozit rezinler polimerizasyon büzülmesi gösterir","D":"En kolay bağlanan diş dokusu dentindir","E":"En zor bağlanan diş dokusu dentindir"},"c":"D","e":"Yüksek inorganik içeriği (%96) ve düzenli prizmatik yapısı sayesinde en kolay bağlanan doku MİNEdir; dentin (%70 inorganik, nemli/tübüler) en zor bağlanandır. \"En kolay bağlanan dentindir\" yanlıştır."},{"k":7,"n":23,"s":"Protez","q":"Metal-porselen (PFM) restorasyon için aşağıdakilerden hangisi yanlıştır? Orijinal: 46","o":{"A":"Metal alt yapı porselene destek sağlar","B":"Oklüzal kontak, metal-porselen birleşim hattında olmalıdır","C":"Metal-porselen bağ kuvveti yeterli olmalıdır","D":"Porselen yeterli kalınlıkta uygulanmalıdır","E":"Birleşim hattı, gerilimin yoğunlaştığı zayıf bir bölgedir"},"c":"B","e":"Metal-porselen birleşim hattı en zayıf/gerilimin yoğunlaştığı bölgedir; oklüzal kontak buraya denk getirilmemelidir (çatlama/chipping riski). \"Birleşim yerinde olmalıdır\" yanlıştır."},{"k":7,"n":24,"s":"Protez","q":"Tek kron bitimi ve uyumlaması ile ilgili aşağıdakilerden hangisi yanlıştır? Orijinal: 29","o":{"A":"İdeal olarak alt yapı materyali die/dişe yalnızca basamakta temas etmelidir","B":"Tamamen oturtulduktan sonra oklüzal uyumlama yapılır","C":"Aşırı kontur dişeti kenarını irrite eder ve plak birikimine neden olur","D":"Gingival temas ne kadar fazlaysa restorasyon o kadar başarılıdır","E":"Simantasyondan önce restorasyon hastaya gösterilip onay alınmalıdır"},"c":"D","e":"Aşırı gingival temas iltihap, kanama ve plak retansiyonuna yol açar → zararlıdır. \"Fazla gingival temas = daha başarılı\" yanlıştır. Doğru sıra: önce tam oturma → sonra oklüzal kontrol."},{"k":7,"n":25,"s":"Protez","q":"İnlay ve onlay restorasyonlar ile ilgili aşağıdakilerden hangisi yanlıştır? Orijinal: 28","o":{"A":"Endodontik tedavili dişte inlay tercih edilmelidir; onlay kama (wedge) etkisiyaratır","B":"Adezyon için dişe sırasıyla kumlama, %35 fosforik asit, primer ve bond uygulanır","C":"İnlay kavite içinde kalır, tüberkülleri örtmez","D":"Onlay bir veya daha fazla tüberkülü örterek kuspal koruma sağlar","E":"Madde kaybı fazla, endodontik tedavili dişte onlay kırılma riskini azaltır"},"c":"A","e":"Endodontik tedavili (kırılgan) dişlerde tüberkülleri örten ONLAY tercih edilir; inlay kama etkisiyle kırılmayı arttırabilir. Dolayısıyla \"inlay tercih edilmelidir\" ifadesi yanlıştır."},{"k":7,"n":26,"s":"Protez","q":"I Estetik, Renk ve Diş Dizaynı 26 Metamerizm tanımı aşağıdakilerden hangisidir? Orijinal: 25","o":{"A":"Bir cismin farklı açılardan farklı renkte görünmesi","B":"Bir ışık kaynağında eşleşen iki rengin, başka bir ışık kaynağında farklı görünmesi","C":"Dişin ışığı içten yansıtması (opalesans)","D":"Yüzeyin ışığı geçirme özelliği (translusensi)","E":"Renk algısının yaşla birlikte değişmesi"},"c":"B","e":"Metamerizm = bir ışık altında aynı görünen iki rengin, farklı ışık kaynağı altında farklı görünmesidir. (Renk seçimi farklı ışık kaynaklarında kontrol edilmelidir.)"},{"k":7,"n":27,"s":"Protez","q":"Estetik ile ilgili aşağıdakilerden hangisi yanlıştır? Orijinal: 27","o":{"A":"En büyük insizal embraşür santral ile lateral diş arasındadır","B":"Kanin diş hafif meziale eğimlidir","C":"İnsizal embraşürler orta hattan distale gidildikçe büyür","D":"Diş uzun eksenleri orta hatta doğru hafif meziale eğimlidir","E":"Santral dişler simetrik ve baskın olmalıdır"},"c":"A","e":"İnsizal embraşürler orta hattan uzaklaştıkça büyür → en büyük embraşür LATERAL– KANİN arasındadır, santral–lateral arasında değil. İlk ifade yanlıştır."},{"k":7,"n":28,"s":"Protez","q":"Erkek hastalarda diş dizaynı ve profil estetiğinde nazolabial açının yaklaşık kaç derece olması hedeflenir? Orijinal: 18","o":{"A":"60°","B":"75°","C":"90°","D":"105°","E":"120°"},"c":"C","e":"Erkeklerde daha düz/keskin profil için nazolabial açı ~90° hedeflenir (kadınlarda genelde daha geniş/açık)."},{"k":7,"n":29,"s":"Protez","q":"J Sabit Protez ve İmplant Tedavi Planlaması 29 Alt çenede; 35 ve 45 sağlam, 36 kayıp (kret boşluğu), 37 meziale devrik sağlam, 46 tüm çevre duvarlarını kaybetmiş başarılı kanal tedavili, 47 tam metal kron ile restore. İdeal tedavi planı hangisidir? ★ ÇOK ÇIKAN Orijinal: 11 · 38 · 43","o":{"A":"36 bölgesine tek implant + 46'ya tam kron","B":"37'ye parsiyel kron + 35–37 destekli 3 üyeli sabit köprü + 46'ya endokron","C":"35–47 arası uzun gövdeli sabit köprü","D":"Alt çeneye hareketli bölümlü protez","E":"37 çekimi + 35–46 köprü"},"c":"B","e":"Meziale devrik 37'ye parsiyel kron + 35–37 destekli 3 üyeli köprü 36 boşluğunu kapatır; koronal duvarı kalmamış ama kanalı sağlam 46'ya endokron idealdir (yeterli koronal doku yokken kanaldan retansiyon alır). Sınavda 3 kez çıktı."},{"k":7,"n":30,"s":"Protez","q":"İmplant ölçüsünün alınmasını sağlayan parça hangisidir? Orijinal: 26","o":{"A":"İyileşme başlığı (healing abutment)","B":"Ölçü postu (impression coping)","C":"Kapatma vidası (cover screw)","D":"Laboratuvar analoğu","E":"Daimi abutment"},"c":"B","e":"Ölçü postu (impression coping), implantın ağız içindeki üç boyutlu konumunu ölçü maddesine aktararak modele taşır."},{"k":7,"n":31,"s":"Protez","q":"K Hareketli Bölümlü Protez (HBP) 31 Üst çenede yalnızca 13, 23, 17, 27 dişleri mevcut (kaninler ve 2. molarlar); kaninlerde periodontal sorun ve dişeti çekilmesi var. En uygun tedavi planı hangisidir? Orijinal: 6 · 17","o":{"A":"Tüm boşlukları kapatan uzun gövdeli sabit köprü","B":"İmplant üstü sabit protez (tek seansta)","C":"Hareketli bölümlü protez (HBP)","D":"İmmediat tam protez","E":"Adeziv köprü"},"c":"C","e":"Destek diş sayısı az, dağılımı yetersiz, açıklık uzun ve kaninler periodontal olarak zayıf → sabit köprü için destek yetersiz. En uygun plan hareketli bölümlü protezdir (HBP)."},{"k":7,"n":32,"s":"Protez","q":"ADA döküm altın alaşımı sınıflamasına göre hareketli bölümlü protez iskeleti için hangi tip metal kullanılır? Orijinal: 48","o":{"A":"Tip I (yumuşak – inley)","B":"Tip II (orta – inley/onlay)","C":"Tip III (sert – kron-köprü)","D":"Tip IV (ekstra-sert)","E":"Tip V"},"c":"D","e":"ADA altın alaşımı: Tip I → inley, Tip II → inley/onlay, Tip III → kron-köprü, Tip IV (ekstra- sert) → HBP iskeleti, kroşe, post-core. HBP iskeleti yüksek dayanım ister → Tip IV."},{"k":7,"n":33,"s":"Protez","q":"Kroşeli HBP'de, tutucu (retansiyon) kolun karşısında yer alıp dişi dengeleyen ve onu tutucu kola doğru iten parça hangisidir? Orijinal: 30","o":{"A":"Majör konnektör","B":"Minör konnektör","C":"Resiprokal (karşılıklı) kol","D":"Oklüzal tırnak (rest)","E":"Proksimal plak"},"c":"C","e":"Resiprokal kol, tutucu kol diş üzerinden geçerken oluşan kuvveti dengeler (resiprokasyon) ve dişi korur. (Kaynakta doğru şık listede olmadığı için \"hiçbiri\" işaretlenmişti; doğru kavram resiprokal koldur.)"},{"k":7,"n":34,"s":"Protez","q":"Hassas tutuculu HBP'lerde, lingual veya paralel yüzeylerde hazırlanan basamakların (ledge) görevi nedir? Orijinal: 34","o":{"A":"Estetiği bozar, kaçınılmalıdır","B":"Retansiyon ve stabiliteye katkı sağlar","C":"Yalnızca dişeti sağlığı içindir","D":"Oklüzal kuvvetleri arttırır","E":"Hassas tutucunun yerini gizler"},"c":"B","e":"Ledge (basamak), hassas tutuculu protezlerde retansiyon ve stabiliteyi arttıran yardımcı tutucu unsurdur. Kron içi/dışı hassas tutucular ise alt yapı (metal/zirkonya) modelasyonu sırasında yerleştirilir."},{"k":7,"n":35,"s":"Protez","q":"HBP'de oklüzal tırnağın (rest) yatay düzlemi ile minör konnektör arasındaki açı nasıl olmalıdır? Orijinal: 35","o":{"A":"Tam 90° olmalıdır","B":"90°'den az olmalıdır","C":"90°'den fazla olmalıdır","D":"180° (düz) olmalıdır","E":"Açının bir önemi yoktur"},"c":"B","e":"Açı 90°'den az olmalıdır; böylece çiğneme kuvvetleri dişin uzun ekseni boyunca iletilir ve protezin dişten kayması/devrilmesi önlenir. (>90° olursa kuvvetler dişi iter, koruyucu etki kaybolur.)"},{"k":8,"n":1,"s":"Endodonti","q":"EDTA'nın endodontide temel kullanım amacı aşağıdakilerden hangisidir?","o":{"A":"Biofilmi tamamen yok etmek","B":"Smear tabakasının inorganik kısmını kaldırmak","C":"Dentin sertliğini artırmak","D":"Organik dokuyu çözmek","E":"Kanalı sterilize etmek"},"c":"B","e":"EDTA bir şelasyon (chelating) ajanıdır; kalsiyumu bağlayarak smear tabakasının inorganik kısmını çözer. Organik dokuyu çözen NaOCl'dir. Kısaca: EDTA = inorganik, NaOCl = organik."},{"k":8,"n":2,"s":"Endodonti","q":"Aşağıdakilerden hangisi düşük toksisite ve uzun süreli antimikrobiyal etki avantajına sahip olmasına rağmen doku çözücü özelliğe sahip değildir?","o":{"A":"CHX","B":"EDTA","C":"NaOCl","D":"HEDP","E":"Sitrik asit"},"c":"A","e":"Klorheksidin (CHX) güçlü antimikrobiyal etki + substantivite (uzun süreli kalıcı etki) sağlar ama dokuyu çözmez. Doku çözebilen tek irrigant NaOCl'dir."},{"k":8,"n":3,"s":"Endodonti","q":"Aşağıdaki irrigantlardan hangisinin biofilm kaldırma etkinliği en yüksektir?","o":{"A":"Hidrojen peroksit","B":"İyodin potasyum iyodid","C":"Sodyum hipoklorit","D":"Klorheksidin","E":"Serum fizyolojik"},"c":"C","e":"NaOCl hem organik dokuyu çözer hem biofilmi parçalar; endodontinin altın standart irrigantıdır. CHX antimikrobiyaldir ama biofilm/doku çözmede NaOCl kadar etkili değildir."},{"k":8,"n":4,"s":"Endodonti","q":"Aşağıdaki irrigasyon aktivasyon yöntemlerinden hangisi negatif basınç prensibiyle çalışır?","o":{"A":"EndoVac","B":"PUI","C":"Vibringe","D":"Eddy","E":"SmartLite Pro"},"c":"A","e":"EndoVac, apikalden sıvıyı vakumla (negatif basınç) geri çeker; bu sayede solüsyonun apeksten taşma riskini azaltır. PUI ultrasonik, Eddy ise sonik aktif sistemlerdir."},{"k":8,"n":5,"s":"Endodonti","q":"NaOCl ile klorheksidinin ardışık kullanımında oluşabilecek komplikasyonu önlemek için aşağıdakilerden hangisi yapılmalıdır?","o":{"A":"Arada salin veya distile su ile irrigasyon yapılmalıdır.","B":"NaOCl ısıtılmalıdır.","C":"EDTA kullanılmamalıdır.","D":"Ultrasonik aktivasyon uygulanmamalıdır.","E":"Kanal kurutulmamalıdır."},"c":"A","e":"NaOCl + CHX karşılaşınca kahverengi/turuncu PCA (parakloroanilin) çökeltisi oluşur; kanalı tıkar ve toksik olabilir. Aralarda salinle yıkayarak iki solüsyonun temasını önle."},{"k":8,"n":6,"s":"Endodonti","q":"Aşağıdakilerden hangisi irrigasyon solüsyonunun etkinliğini artıran değişkenlerden değildir?","o":{"A":"Uygulama zamanının uzunluğu","B":"Luerlock (vidalı) tipte enjektör kullanılması","C":"İrrigantın veriliş şekli","D":"Solüsyonun sonik aktivasyonu","E":"Solüsyonun ısısı"},"c":"B","e":"Luerlock enjektör iğnenin yerinden fırlamaması için güvenlik sağlar; solüsyonun etkinliğine katkısı yoktur. Etkinliği süre, ısı, hacim, aktivasyon ve veriliş şekli belirler."},{"k":8,"n":7,"s":"Endodonti","q":"Kanal Aletleri ve Preparasyon Aşağıdaki kanal aletlerinden hangisi yalnızca kanaldan çekilirken aktif kesim yapar?","o":{"A":"H-file","B":"K-reamer","C":"Flexofile","D":"K-file","E":"Gates-Glidden"},"c":"A","e":"H-file (Hedström) tek yönlü çalışır: sadece geri çekme (pull stroke) ile keser. Dişleri tornavida gibi sıralıdır. K-file ise hem itme hem çekmede aktiftir."},{"k":8,"n":8,"s":"Endodonti","q":"Aşağıdakilerden hangisi kanal preparasyonunda Nikel Titanyum eğe kullanımı avantajları arasında değildir?","o":{"A":"Ni-Ti eğeler, paslanmaz çelik eğelere göre 5 kat daha esnektir.","B":"Hafızalı metaller olmaları nedeniyle kolay deforme olmazlar.","C":"Esnek olması nedeniyle kırılma riski azdır.","D":"Sodyum hipoklorit ile birlikte kullanımında korozyon oluşmaz.","E":"Esnek olmaları nedeni ile horizontal yönde kanal transportasyonu riski daha azdır."},"c":"D","e":"NaOCl, Ni-Ti yüzeyinde korozyon ve yüzey bozulması yapabilir; \"korozyon oluşmaz\" ifadesi yanlıştır. Esneklik ve şekil hafızası ise Ni-Ti'nin gerçek avantajlarıdır."},{"k":8,"n":9,"s":"Endodonti","q":"Kanal eğesinde kesici kenar ile eğenin uzun aksı arasındaki açının adı nedir?","o":{"A":"Rake angle","B":"Kesme açısı","C":"Pitch angle","D":"Radial land","E":"Helical angle"},"c":"E","e":"Helical (heliks) açı = kesici kenarın eğenin uzun eksenine göre yaptığı açı. Karıştırma: rake angle kesici yüzey ile kesme doğrultusu arasındaki açıdır; radial land ise destekleyici yüzeydir."},{"k":8,"n":10,"s":"Endodonti","q":"Aşağıdaki uygulamalardan hangisi prosedürel hataları azaltmada EN etkili yaklaşımlardan biridir?","o":{"A":"Genişletmeye 25 nolu eğe ile başlayıp doğrudan apikale ulaşmak.","B":"Eğri kanalları 40 veya 45 numaralara kadar genişletmek.","C":"Kanalı kuru çalışmak.","D":"Küçük eğelerle başlayıp sıralı preparasyon yapmak.","E":"Eğe numaralarını atlayarak ilerlemek."},"c":"D","e":"Küçükten büyüğe, numara atlamadan sıralı (sequential) preparasyon; kırık eğe, basamak ve transportasyonu önler. Büyük eğeyle başlamak ya da numara atlamak hata riskini artırır; kanal kuru çalışılmaz."},{"k":8,"n":11,"s":"Endodonti","q":"Kanal preparasyonunda apikal daralımın orijinal genişliğinin korunması ile ilgili aşağıdakilerden hangisi yanlıştır?","o":{"A":"Periapikal dokularda travma olmaz.","B":"Apikal daralım gutta perkalı dolgu teknikleri için iyi bir direnç sağlar.","C":"Apikal daralım orijinal genişliği korunursa kanal patı taşması oluşmayacaktır.","D":"Apikalde küçük yara yüzeyi sağlar.","E":"Kök kanal dolgu maddelerinin apikalden taşma riski azalır."},"c":"C","e":"Apikal daralımı korumak taşma riskini azaltır ama \"kesinlikle taşma olmayacaktır\" demek mutlak ve yanlıştır. Daralım, gutta perka için dayanak (stop) ve küçük yara yüzeyi sağlar."},{"k":8,"n":12,"s":"Endodonti","q":"Strip perforasyon oluşma riski aşağıdaki durumlardan hangisinde artar?","o":{"A":"Ni-Ti eğe kullanılması","B":"Pasif step-back uygulanması","C":"Küçük eğeler kullanılması","D":"Eğri kanalların aşırı genişletilmesi","E":"Ucu aktif K tipi eğelerin kullanılması"},"c":"D","e":"Strip perforasyon, eğri kanalın iç (furkasyona bakan) duvarının aşırı inceltilmesiyle oluşur — buraya \"tehlikeli bölge\" denir. Aşırı genişletme bu zaten ince duvarı deler."},{"k":8,"n":13,"s":"Endodonti","q":"Çalışma boyu tespitinde parmak hassasiyeti ile ilgili aşağıdakilerden hangisi yanlıştır?","o":{"A":"Tek başına kullanılmamalı, yardımcı bir teknik olarak kabul edilmelidir.","B":"Deneyimli hekimler bu teknikle %60'lara ulaşan oranda başarı elde edebiliyorlar.","C":"Farklı tiplerde daralımlar nedeniyle parmak hassasiyeti ile çalışma boyu ölçülmesi güvensiz bir yöntemdir.","D":"Kullanılan aletin tipi ve kalınlığı sonucu etkiliyor.","E":"Önden koronal genişletme yapılması bu yöntemin doğruluk payını artırmaz."},"c":"E","e":"Önceden koronal genişletme yapmak eğe stresini azaltır ve apikal daralımı parmakla hissetmeyi kolaylaştırır — yani doğruluğu artırır. \"Artırmaz\" demek yanlıştır."},{"k":8,"n":14,"s":"Endodonti","q":"Aşağıdakilerden hangisi kanal preparasyonunun biyolojik hedeflerinden biridir?","o":{"A":"Servikal dentini tamamen kaldırmak","B":"Forameni büyütmek","C":"Nekrotik debrisin apikale itilmesini önlemek","D":"Kanalı mümkün olduğunca düzleştirmek","E":"Kanalı aşırı genişletmek"},"c":"C","e":"Biyolojik hedef = enfekte debrisi apeksten dışarı taşırmamak (periapikal dokuyu korumak). Forameni büyütmek, düzleştirmek ve aşırı genişletmek ise mekanik aşırılık/hatadır."},{"k":8,"n":15,"s":"Endodonti","q":"Endodontik giriş kavitesi preparasyonunun temel amaçlarından biri aşağıdakilerden hangisidir?","o":{"A":"Mine dokusunu tamamen kaldırmak","B":"Düz giriş yolu sağlamak","C":"Furkasyonu genişletmek","D":"Kanal eğimini artırmak","E":"Kanal ağızlarını daraltmak"},"c":"B","e":"Giriş kavitesinin amacı kanal ağızlarına engelsiz, düz (straight-line) giriş yolu sağlamaktır. Böylece eğe stresi azalır, tüm kanal ağızları rahat bulunur."},{"k":8,"n":16,"s":"Endodonti","q":"Kanal preparasyonu sırasında ledge (basamak) oluşumunun önlenmesi ile ilgili aşağıdakilerden hangisi yanlıştır?","o":{"A":"Aletlerin numara sırasıyla kullanılması gerekir.","B":"Esnek NiTi eğelerin kullanılması basamak oluşması ihtimalini azaltır.","C":"Lastik stoperin eğe üzerinde kayması farkedilmez ise basamak oluşumuna yol açabilir.","D":"Mümkün olduğunca küçük numaralı eğe ile preparasyona başlamak gerekir.","E":"Kanal eğriliğinin yarıçapı küçüldükçe basamak oluşması ihtimali artar."},"c":"E","e":"Orijinal cevap anahtarında işaretli şık E'dir: A–D seçenekleri basamak oluşumunu önlemeye yönelik doğru kurallardır; E ise bir önlem değil yalnızca risk ifadesi olduğu için \"yanlış\" olarak işaretlenmiştir."},{"k":8,"n":17,"s":"Endodonti","q":"Eğri bir kanalda kalın ve rijit eğelerin kullanılması aşağıdaki komplikasyonlardan hangisine yol açabilir?","o":{"A":"İrrigasyon etkinliğinin artması","B":"Kanal merkezlenmesinin iyileşmesi","C":"Apikal daralımın korunması","D":"Kanal sterilizasyonunun artması","E":"Kanal transportasyonu"},"c":"E","e":"Rijit eğe, eğri kanalda dış duvarı düzeltmeye çalışır ve orijinal kanal yolundan saptırır = transportasyon (zip / elbow oluşumu). Esnek Ni-Ti bunu önler."},{"k":8,"n":18,"s":"Endodonti","q":"Kanal Patları ve Dolgu Maddeleri Aşağıdakilerden hangisi kalsiyum hidroksit esaslı kanal patlarındandır?","o":{"A":"Sealapex","B":"AH Plus","C":"Kloroperka","D":"Endomethasone","E":"Tubli Seal"},"c":"A","e":"Sealapex= Ca(OH)2 esaslı. Diğerleri:AH Plus→ epoksi rezin; Endomethasone& Tubli Seal → çinko oksit öjenol; Kloroperka → gutta perka çözeltisi. Esasları ezberle!"},{"k":8,"n":19,"s":"Endodonti","q":"Aşağıdakilerden hangisi gutta perkanın özelliklerinden değildir?","o":{"A":"Adezyon özelliği yoktur","B":"Antimikrobiyel etkisi yüksektir","C":"Gutta perka hacimsel olarak sıkıştırılamaz","D":"Biyouyumludur","E":"Radyoopaktır"},"c":"B","e":"Gutta perkanın antimikrobiyal etkisi yoktur; bu yüzden yanına mutlaka pat (sealer) gerekir. Adezyonu yoktur, biyouyumlu ve radyoopaktır — bunlar gerçek özellikleridir."},{"k":8,"n":20,"s":"Endodonti","q":"Aşağıdakilerden hangisi ideal bir kanal patının özellikleri arasında sayılmayabilir?","o":{"A":"Yavaş sertleşmeli","B":"Herhangi bir çözücüde çözünmemeli","C":"Bakteriostatik olmalı","D":"Doku sıvılarında çözünmemeli","E":"Kanalda hermetik tıkama sağlamalı"},"c":"B","e":"Pat, doku sıvılarında çözünmemeli AMA gerektiğinde (retreatment için) uygun çözücüyle çıkarılabilmelidir. \"Hiçbir çözücüde çözünmemeli\" istenmeyen bir özelliktir."},{"k":8,"n":21,"s":"Endodonti","q":"Kalsiyum hidroksitin kanal içinde kısa sürede tam etkili olamamasının temel","o":{"A":"Yüksek çözünürlüğü nedeniyle hızla yıkanması","B":"Düşük çözünürlüğü ve hidroksil iyonlarının dentinde yavaş difüze olması","C":"Antibakteriyel etkisinin olmaması","D":"Kanı pıhtılaştırması","E":"Serbest klor açığa çıkarması"},"c":"B","e":"Ca(OH)az çözünür;OH- iyonları dentine yavaş difüze olurve dentin tarafından 2 tamponlanır. Bu yüzden etkisini tam göstermesi için kanalda uzun süre (1–2 hafta) kalması gerekir.","note":"Bu sorunun şıkları orijinal fotoğrafta görünmüyordu; konuya uygun şekilde yeniden oluşturuldu. Beklenen"},{"k":8,"n":22,"s":"Endodonti","q":"doğru cevap ders bilgisine göre işaretlenmiştir. Kalsiyum hidroksitin bakteriler üzerindeki temel etkisi aşağıdakilerden hangisine bağlıdır?","o":{"A":"Düşük pH","B":"Tetrasiklin salınımı","C":"Yüksek ozmolarite","D":"Serbest klor salınımı","E":"Hidroksil iyonlarının oluşturduğu yüksek pH"},"c":"E","e":"Ca(OH) suda ayrışıpOH- verir→pH ~12.5.Bu yüksek alkali ortam bakterinin 2 membranını, proteinlerini ve DNA'sını bozar. Serbest klor ise NaOCl'ye özgüdür."},{"k":8,"n":23,"s":"Endodonti","q":"Pulpa — Fizyoloji, Histoloji ve Patoloji 60 yaşındaki bir hastada derin çürüğe rağmen ağrı minimaldir. Bu durumun en olası nedeni aşağıdakilerden hangisidir?","o":{"A":"Sekonder dentin oluşumu ile pulpanın korunması","B":"Sinir liflerinin artması","C":"Odontoblast aktivitesinin artması","D":"Pulpa kan akımının tamamen artması","E":"Dentin geçirgenliğinin artması"},"c":"A","e":"Yaşla birlikte sekonder/tersiyer dentin birikir, pulpa küçülür ve uyaranların pulpaya iletimi azalır. Sonuç: yaşlı hastada derin çürükte bile ağrı az olur."},{"k":8,"n":24,"s":"Endodonti","q":"Aşağıdakilerden hangisi reversibl (geri dönüşümlü) pulpitisin klinik/histolojik özelliğini doğru tanımlar?","o":{"A":"Ağrı spontan ortaya çıkar, zonklar ve perküsyona belirgin duyarlılık vardır.","B":"Histolojik olarak odontoblast tabakası normaldir ve irritasyon dentini görülmez.","C":"Ağrı kendiliğinden ortaya çıkar ve uzun süreli devam eder, radyografta periodontal aralık genişlemiştir.","D":"Soğuk ve tatlı gibi uyaranlarla kısa süreli ağrı oluşur, uyaran ortadan kalktığında ağrı geçer ve radyografik bulgu yoktur.","E":"Ağrı spontan ve süreklidir, palpasyon ve perküsyona duyarlıdır."},"c":"D","e":"Reversibl pulpitiste ağrı uyarana bağlıdır (soğuk/tatlı), uyaran kalkınca geçer ve radyografi normaldir. Spontan + sürekli ağrı = irreversibl pulpitis.","note":"A şıkkı orijinal fotoğrafta okunamadığı için konuya uygun çeldirici olarak eklenmiştir; doğru cevap (D) orijinalde"},{"k":8,"n":25,"s":"Endodonti","q":"işaretliydi. Derin çürüğü olan bir hastada ağrı giderek artmaktadır. Sinir uçlarından Substance P ve CGRP salınımı olduğu bilinmektedir. Bu medyatörlerin temel etkisi aşağıdakilerden hangisidir?","o":{"A":"Dentin geçirgenliğinin azalması","B":"Sinir iletiminin durması","C":"Vazodilatasyon ve inflamasyonun artması","D":"Vazokonstriksiyon","E":"Pulpa nekrozunun engellenmesi"},"c":"C","e":"Substance P ve CGRP nöropeptidlerdir; nörojenik inflamasyon yaparlar → vazodilatasyon, damar geçirgenliği ve inflamasyon artar. (CGRP güçlü bir vazodilatatördür.)"},{"k":8,"n":26,"s":"Endodonti","q":"Hasta soğukta kısa süreli, keskin bir ağrı tarif ediyor. Uyaran kaldırıldığında ağrı hemen geçiyor. Bu durumda hangi sinir lifleri aktive olmuştur?","o":{"A":"B lifleri","B":"A-delta lifleri","C":"Sempatik postganglionik lifler","D":"C lifleri","E":"A-alfa lifleri"},"c":"B","e":"A-delta lifleri miyelinli ve hızlıdır; keskin, kısa süreli ağrıyı taşır (reversibl pulpitis). C lifleri ise miyelinsiz, yavaş; künt, zonklayıcı, uzun süreli ağrıyı taşır (irreversibl)."},{"k":8,"n":27,"s":"Endodonti","q":"Akut pulpitis durumunda baskın hücre tipi hangisidir?","o":{"A":"B lenfosit","B":"T lenfosit","C":"Nötrofil","D":"Osteoklast","E":"Fibroblast"},"c":"C","e":"Akut inflamasyonun karakteristik hücresi nötrofildir (PMN). Lenfositler (B/T) ise kronik inflamasyon ve immün yanıtta öne çıkar."},{"k":8,"n":28,"s":"Endodonti","q":"Pulpanın en büyük hücre grubu hangi hücre grubudur?","o":{"A":"Makrofaj","B":"Odontoblast","C":"Eozinofil","D":"Fibroblast","E":"Dendritik hücre"},"c":"D","e":"Fibroblast, pulpanın en bol bulunan hücresidir; bağ doku matriksini (kollajen, ara madde) üretir. Odontoblast pulpa periferinde dizilir ve dentin yapar."},{"k":8,"n":29,"s":"Endodonti","q":"Kanal Morfolojisi ve Anatomisi Weine sınıflamasında Tip II olan kanal morfolojisi Vertucci sınıflamasında hangi tipe eşdir?","o":{"A":"Tip IV","B":"Tip III","C":"Tip II","D":"Tip V","E":"Tip VI"},"c":"C","e":"Weine Tip II = iki ayrı kanal ağzı tek foramende birleşir (2-1). Bu, Vertucci Tip II (yine 2-1) ile birebir aynıdır."},{"k":8,"n":30,"s":"Endodonti","q":"Radix entomolaris en çok hangi dişte görülür?","o":{"A":"Maksiller 1. premolar","B":"Maksiller 1. molar","C":"Mandibular 1. premolar","D":"Mandibular 1. molar","E":"Maksiller 2. molar"},"c":"D","e":"Radix entomolaris = mandibular 1. moların distolingual bölgesinde görülen fazladan (ekstra) köktür. Distobukkaldekine ise radix paramolaris denir."},{"k":8,"n":31,"s":"Endodonti","q":"Alt keser dişlerde ikinci kanalın sıklıkla kaçırılmasının temel nedeni aşağıdakilerden hangisidir?","o":{"A":"Mine kalınlığının fazla olması","B":"Kanalın yalnızca
